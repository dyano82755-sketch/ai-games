<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にゃんこサバイバー</title>
<style>
  :root {
    --ink: #5c4b37;
    --muted: #9e8e75;
    --panel: #fff8e7;
    --panel-2: #ffe4b5;
    --line: #ffb6c1;
    --gold: #ffaa00;
    --red: #ff5e5e;
    --blue: #5cb8ff;
    --green: #6add6d;
    --violet: #b678ff;
    --shadow: rgba(200, 150, 100, 0.3);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; min-height: 100%;
  }

  body {
    min-height: 100dvh;
    overflow: hidden;
    color: var(--ink);
    background:
      radial-gradient(circle at 50% 50%, #e0f7ff, #bce6ff);
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Rounded Gothic", "Meiryo", sans-serif;
  }

  button { font: inherit; touch-action: manipulation; }

  .app {
    width: min(1220px, 100%);
    height: 100dvh;
    min-height: 100dvh;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    padding: 8px;
  }

  .hud, .screen, .controls, .modal-card, .upgrade-card {
    border: 4px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 8px 16px var(--shadow);
  }

  .hud {
    min-height: 70px;
    display: grid;
    grid-template-columns: minmax(240px, 1fr) repeat(7, auto);
    gap: 8px;
    align-items: center;
    padding: 8px 12px;
    background: var(--panel);
  }

  .brand {
    min-width: 0; display: flex; align-items: center; gap: 10px;
  }

  .star-mark {
    font-size: 2.5rem;
    line-height: 1;
    user-select: none;
  }

  .brand-title {
    min-width: 0; display: grid; gap: 2px;
  }
  .brand-title strong { font-size: 1.2rem; color: #ff8c00; }
  .brand-title span { color: var(--muted); font-size: 0.85rem; font-weight: bold; }

  .stat {
    min-width: 74px; min-height: 46px;
    display: grid; align-content: center; gap: 2px;
    padding: 5px 8px; text-align: center;
    border: 2px solid #ffe4b5; border-radius: 12px;
    background: #fff;
  }
  .stat span { color: var(--muted); font-size: 0.65rem; font-weight: bold; }
  .stat b { font-size: 1.1rem; color: var(--ink); }

  .bar-stat { min-width: 122px; display: grid; gap: 5px; }

  .bar {
    width: 100%; height: 16px; overflow: hidden;
    border: 2px solid var(--line); border-radius: 8px;
    background: #eee;
  }
  .bar i {
    display: block; width: 100%; height: 100%;
    background: linear-gradient(90deg, #ff7e7e, #ffbaba);
    transition: width 120ms linear;
  }
  .bar.xp i {
    width: 0%;
    background: linear-gradient(90deg, #5cb8ff, #ffec5c);
  }

  .btn, .pad-btn {
    border: 3px solid var(--line); border-radius: 12px;
    color: var(--ink); font-weight: 900; cursor: pointer;
    background: #fff;
    box-shadow: 0 4px 0 var(--line);
  }
  .btn { min-height: 44px; padding: 0 16px; }
  .btn.icon { width: 46px; padding: 0; }
  .btn.play {
    color: #fff;
    background: #ff9d00;
    border-color: #e67e00;
    box-shadow: 0 4px 0 #cc7000;
  }

  .btn:active, .pad-btn:active, .upgrade-card:active {
    transform: translateY(4px); box-shadow: 0 0 0 transparent;
  }

  .screen {
    position: relative; min-height: 0; overflow: hidden;
    background: #eef9ff;
  }

  #gameCanvas {
    display: block; width: 100%; height: 100%; min-height: 340px;
  }

  .message {
    position: absolute; left: 50%; bottom: 10px;
    width: min(760px, calc(100% - 24px)); min-height: 44px;
    transform: translateX(-50%); display: grid; place-items: center;
    padding: 7px 12px; border: 3px solid #ffcc00; border-radius: 12px;
    background: #fff; color: #ff8c00; font-size: 1.1rem; font-weight: 900;
    pointer-events: none;
  }

  .controls {
    min-height: 118px; display: grid;
    grid-template-columns: minmax(190px, 1fr) auto auto minmax(190px, 1fr);
    gap: 10px; align-items: center; padding: 8px;
    background: var(--panel);
  }

  .mini-panel { min-width: 0; display: grid; gap: 5px; font-weight: 800; }
  .mini-panel small { color: var(--muted); font-size: 0.8rem; }

  .dpad {
    width: 174px; height: 96px; display: grid;
    grid-template-columns: repeat(3, 54px); grid-template-rows: repeat(2, 44px); gap: 6px;
  }
  .pad-btn { font-size: 1.2rem; background: #fff; color: #ff8c00;}
  .pad-btn.up { grid-column: 2; grid-row: 1; }
  .pad-btn.left { grid-column: 1; grid-row: 2; }
  .pad-btn.down { grid-column: 2; grid-row: 2; }
  .pad-btn.right { grid-column: 3; grid-row: 2; }

  .action-panel { display: grid; grid-template-columns: repeat(2, 92px); gap: 8px; }

  .upgrade-layer, .modal {
    position: fixed; inset: 0; z-index: 30; display: none; place-items: center;
    padding: 16px; background: rgba(255, 255, 255, 0.8);
  }
  .upgrade-layer.show, .modal.show { display: grid; }

  .modal-card {
    width: min(590px, 100%); padding: 24px;
    background: #fff; text-align: center; border-color: #ffaa00;
  }
  .modal-card h1, .upgrade-box h2 {
    margin: 0; font-size: 2rem; color: #ff8c00;
  }
  .modal-card p, .upgrade-box p {
    margin: 10px auto 0; max-width: 520px; color: var(--ink);
    line-height: 1.6; font-weight: 700; font-size: 1.1rem;
  }
  .modal-actions {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-top: 20px;
  }

  .upgrade-box {
    width: min(820px, 100%); display: grid; gap: 14px; padding: 24px;
    border: 4px solid #ffaa00; border-radius: 16px; background: #fff;
    box-shadow: 0 12px 32px rgba(255,170,0,0.3); text-align: center;
  }
  .upgrade-list { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }

  .upgrade-card {
    min-height: 150px; display: grid; align-content: center; gap: 8px;
    padding: 16px; border: 3px solid #ffcc00; border-radius: 12px;
    background: #fff9e6; cursor: pointer; text-align: left;
    box-shadow: 0 6px 0 #ffcc00; transition: transform 0.1s, box-shadow 0.1s;
  }
  .upgrade-card:hover { background: #fff; border-color: #ffaa00; }
  .upgrade-card strong { font-size: 1.2rem; color: #ff8c00; }
  .upgrade-card span { color: var(--ink); font-size: 0.9rem; line-height: 1.4; font-weight: bold;}

  @media (max-width: 980px) {
    body { overflow: auto; }
    .app { height: auto; min-height: 100dvh; grid-template-rows: auto minmax(430px, 1fr) auto; }
    .hud { grid-template-columns: minmax(210px, 1fr) repeat(4, auto); }
    .hud .stat:nth-of-type(n+4), .hud .bar-stat:nth-of-type(n+3) { display: none; }
    .controls { grid-template-columns: 1fr auto auto; }
  }

  @media (max-width: 620px) {
    .app { gap: 7px; padding: 7px; grid-template-rows: auto minmax(390px, 1fr) auto; }
    .hud { grid-template-columns: repeat(4, minmax(0, 1fr)); min-height: 0; padding: 6px; }
    .brand { grid-column: 1 / -1; }
    .star-mark { font-size: 2rem; }
    .brand-title strong { font-size: 1.1rem; }
    .brand-title span { font-size: 0.75rem; }
    .stat { min-width: 0; min-height: 38px; padding: 4px 3px; border-width: 1px;}
    .stat span { font-size: 0.6rem; }
    .stat b { font-size: 0.9rem; }
    .btn { min-height: 40px; padding: 0 10px; font-size: 0.9rem; }
    .btn.icon { width: 40px; }
    .controls { grid-template-columns: 1fr; min-height: 0; gap: 8px; }
    .mini-panel { display: none; }
    .dpad { justify-self: center; width: 168px; height: 92px; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(2, 42px); }
    .action-panel { justify-self: center; grid-template-columns: repeat(2, 86px); }
    .message { bottom: 8px; min-height: 36px; padding: 6px 8px; font-size: 0.9rem; }
    .upgrade-list { grid-template-columns: 1fr; }
    .modal-card h1, .upgrade-box h2 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="hud">
    <div class="brand">
      <div class="star-mark">🐱</div>
      <div class="brand-title">
        <strong>にゃんこサバイバー</strong>
        <span id="statusText">オバケをやっつけて キャンディをあつめよう！</span>
      </div>
    </div>
    <div class="stat"><span>じかん</span><b id="timeText">02:00</b></div>
    <div class="stat"><span>レベル</span><b id="levelText">1</b></div>
    <div class="stat"><span>たおした数</span><b id="killText">0</b></div>
    <div class="stat"><span>スコア</span><b id="scoreText">0</b></div>
    <div class="bar-stat">
      <div class="stat"><span>たいりょく</span><b id="hpText">200/200</b></div>
      <div class="bar"><i id="hpBar"></i></div>
    </div>
    <div class="bar-stat">
      <div class="stat"><span>キャンディ</span><b id="xpText">0/6</b></div>
      <div class="bar xp"><i id="xpBar"></i></div>
    </div>
    <button class="btn icon" id="muteBtn" type="button" aria-label="音を切り替え">♪</button>
    <button class="btn play" id="startBtn" type="button">スタート</button>
  </header>

  <main class="screen" aria-label="ゲーム画面">
    <canvas id="gameCanvas"></canvas>
    <div class="message" id="messageText">スタートをおしてね！</div>
  </main>

  <footer class="controls">
    <div class="mini-panel">
      <b>あそびかた</b>
      <small id="missionText">2ふんかん生き残ろう。こうげきは自動だよ！</small>
    </div>
    <div class="dpad" aria-label="移動ボタン">
      <button class="pad-btn up" type="button" data-move="up">▲</button>
      <button class="pad-btn left" type="button" data-move="left">◀</button>
      <button class="pad-btn down" type="button" data-move="down">▼</button>
      <button class="pad-btn right" type="button" data-move="right">▶</button>
    </div>
    <div class="action-panel">
      <button class="btn play" id="pauseBtn" type="button">ストップ</button>
      <button class="btn" id="dashBtn" type="button">ダッシュ</button>
    </div>
    <div class="mini-panel">
      <b id="weaponText">キラキラ星 Lv1</b>
      <small id="bestText">最高スコア 0</small>
    </div>
  </footer>
</div>

<div class="modal show" id="modal">
  <div class="modal-card">
    <h1 id="modalTitle">にゃんこサバイバー</h1>
    <p id="modalText">いどうするだけで遊べるゲームだよ。<br>星の魔法は自動でオバケをとんでいくよ。<br>キャンディ（🍬）をひろって、どんどん強くなろう！</p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="upgrade-layer" id="upgradeLayer">
  <div class="upgrade-box">
    <h2>レベルアップ！</h2>
    <p>パワーアップを ひとつ えらんでね。</p>
    <div class="upgrade-list" id="upgradeList"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const el = {
    time: document.getElementById("timeText"),
    level: document.getElementById("levelText"),
    kills: document.getElementById("killText"),
    score: document.getElementById("scoreText"),
    hp: document.getElementById("hpText"),
    hpBar: document.getElementById("hpBar"),
    xp: document.getElementById("xpText"),
    xpBar: document.getElementById("xpBar"),
    status: document.getElementById("statusText"),
    message: document.getElementById("messageText"),
    mission: document.getElementById("missionText"),
    weapon: document.getElementById("weaponText"),
    best: document.getElementById("bestText"),
    start: document.getElementById("startBtn"),
    pause: document.getElementById("pauseBtn"),
    dash: document.getElementById("dashBtn"),
    mute: document.getElementById("muteBtn"),
    modal: document.getElementById("modal"),
    modalTitle: document.getElementById("modalTitle"),
    modalText: document.getElementById("modalText"),
    modalActions: document.getElementById("modalActions"),
    upgradeLayer: document.getElementById("upgradeLayer"),
    upgradeList: document.getElementById("upgradeList")
  };

  const WORLD = { width: 2000, height: 1600 };
  const ROUND_SECONDS = 120; // キッズ向けに2分に変更
  const colors = {
    bg: "#eef9ff",
    bolt: "#ffaa00"
  };

  const state = {
    running: false,
    paused: false,
    choosing: false,
    muted: false,
    time: 0,
    lastTime: 0,
    spawnTimer: 0,
    eliteTimer: 0,
    messageTimer: 0,
    kills: 0,
    score: 0,
    level: 1,
    xp: 0,
    xpNeed: 6, // 初期レベルアップを早く
    best: Number(localStorage.getItem("nyankoSurvivorBest") || 0),
    keys: { left: false, right: false, up: false, down: false },
    player: {
      x: WORLD.width / 2,
      y: WORLD.height / 2,
      r: 24, // 見た目の当たり判定サイズ
      hp: 200,
      maxHp: 200,
      speed: 260,
      dashReady: 0,
      invincible: 0,
      damage: 30, // 初期攻撃力高め
      fireRate: 0.65,
      fireTimer: 0,
      projectileCount: 1,
      magnet: 160, // 最初から吸い込み範囲広め
      orbit: 0,
      regen: 2.0, // 最初から自動回復あり
      xpBonus: 1.0
    },
    camera: { x: 0, y: 0, w: 900, h: 560 },
    enemies: [],
    projectiles: [],
    gems: [],
    pickups: [],
    particles: [],
    floatTexts: [],
    audio: null
  };

  // キッズ向けの分かりやすいアップグレード名と効果
  const upgrades = [
    { id: "damage", name: "つよいつめ", desc: "星のダメージが 大きくなるよ", apply: () => state.player.damage += 12 },
    { id: "rate", name: "はやうち", desc: "星をうつのが はやくなるよ", apply: () => state.player.fireRate = Math.max(0.2, state.player.fireRate * 0.8) },
    { id: "multi", name: "いっぱい魔法", desc: "いっぺんに撃つ星が ＋１こ", apply: () => state.player.projectileCount = Math.min(6, state.player.projectileCount + 1) },
    { id: "speed", name: "ダッシュシューズ", desc: "あるくスピードが はやくなるよ", apply: () => state.player.speed += 30 },
    { id: "heart", name: "ハートのケーキ", desc: "たいりょくの最大がアップ！回復もするよ", apply: () => { state.player.maxHp += 30; heal(50); } },
    { id: "magnet", name: "スイーツじしゃく", desc: "キャンディを とおくから吸いよせるよ", apply: () => state.player.magnet += 60 },
    { id: "orbit", name: "ぐるぐるシールド", desc: "まわりをまわる お星さまを追加", apply: () => state.player.orbit = Math.min(5, state.player.orbit + 1) },
    { id: "regen", name: "おひるね", desc: "たいりょくが どんどん回復するよ", apply: () => state.player.regen += 2.0 },
    { id: "xp", name: "かしこいネコ", desc: "レベルアップしやすくなるよ", apply: () => state.player.xpBonus += 0.25 }
  ];

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.camera.w = rect.width;
    state.camera.h = rect.height;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function angleTo(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
  }

  function randomSpawnAroundPlayer(margin = 90) {
    const p = state.player;
    const w = state.camera.w || 900;
    const h = state.camera.h || 560;
    const side = Math.floor(Math.random() * 4);
    let x = p.x, y = p.y;
    if (side === 0) {
      x = p.x + (Math.random() - 0.5) * w; y = p.y - h / 2 - margin;
    } else if (side === 1) {
      x = p.x + w / 2 + margin; y = p.y + (Math.random() - 0.5) * h;
    } else if (side === 2) {
      x = p.x + (Math.random() - 0.5) * w; y = p.y + h / 2 + margin;
    } else {
      x = p.x - w / 2 - margin; y = p.y + (Math.random() - 0.5) * h;
    }
    return {
      x: clamp(x, 30, WORLD.width - 30),
      y: clamp(y, 30, WORLD.height - 30)
    };
  }

  function resetGame() {
    state.running = true;
    state.paused = false;
    state.choosing = false;
    state.time = 0;
    state.spawnTimer = 1.0;
    state.eliteTimer = 30; // 30秒ごとに中ボス
    state.messageTimer = 3.0;
    state.kills = 0;
    state.score = 0;
    state.level = 1;
    state.xp = 0;
    state.xpNeed = 6;
    state.enemies = [];
    state.projectiles = [];
    state.gems = [];
    state.pickups = [];
    state.particles = [];
    state.floatTexts = [];
    Object.assign(state.player, {
      x: WORLD.width / 2, y: WORLD.height / 2,
      hp: 200, maxHp: 200, speed: 260, dashReady: 0, invincible: 0,
      damage: 30, fireRate: 0.65, fireTimer: 0, projectileCount: 1,
      magnet: 160, orbit: 0, regen: 2.0, xpBonus: 1.0
    });
    hideModal();
    hideUpgrades();
    setMessage("2ふんかん がんばって！ こうげきは自動だよ！");
    for (let i = 0; i < 3; i++) spawnEnemy(true);
    state.lastTime = performance.now();
    requestAnimationFrame(loop);
    playTone(520, 0.08, "square");
    playTone(780, 0.12, "square", 0.06);
  }

  function spawnEnemy(soft = false) {
    const elapsed = state.time;
    const p = randomSpawnAroundPlayer(soft ? 230 : 170);
    // 時間経過で敵が強く（絵文字が変化）なる
    const tier = elapsed > 80 && Math.random() < 0.3 ? 3 : elapsed > 40 && Math.random() < 0.4 ? 2 : 1;
    const hp = tier === 3 ? 100 + elapsed * 0.5 : tier === 2 ? 50 + elapsed * 0.2 : 20 + elapsed * 0.1;
    const speed = tier === 3 ? 60 : tier === 2 ? 80 : 90; // 全体的に遅め
    const emoji = tier === 3 ? "🦇" : tier === 2 ? "👻" : "👾";
    
    state.enemies.push({
      x: clamp(p.x, -160, WORLD.width + 160),
      y: clamp(p.y, -160, WORLD.height + 160),
      r: tier === 3 ? 24 : tier === 2 ? 22 : 18,
      hp, maxHp: hp,
      speed: speed + Math.random() * 10,
      damage: tier === 3 ? 15 : tier === 2 ? 10 : 5, // ダメージ低め
      tier, emoji, elite: false,
      wobble: Math.random() * Math.PI * 2, hit: 0
    });
  }

  function spawnElite() {
    const p = randomSpawnAroundPlayer(145);
    const hp = 250 + state.time * 2.0;
    state.enemies.push({
      x: p.x, y: p.y, r: 36, hp, maxHp: hp, speed: 50, damage: 20,
      tier: 4, emoji: "👿", elite: true, wobble: Math.random() * Math.PI * 2, hit: 0
    });
    setMessage("でかオバケが きたよ！");
  }

  function update(dt) {
    if (!state.running || state.paused || state.choosing) return;
    state.time += dt;
    state.messageTimer = Math.max(0, state.messageTimer - dt);
    if (state.time >= ROUND_SECONDS) {
      winGame();
      return;
    }

    updatePlayer(dt);
    updateSpawns(dt);
    updateProjectiles(dt);
    updateEnemies(dt);
    updateGems(dt);
    updatePickups(dt);
    updateParticles(dt);
    updateCamera();
    updateHud();
  }

  function updatePlayer(dt) {
    const p = state.player;
    let dx = (state.keys.right ? 1 : 0) - (state.keys.left ? 1 : 0);
    let dy = (state.keys.down ? 1 : 0) - (state.keys.up ? 1 : 0);
    const len = Math.hypot(dx, dy);
    if (len) { dx /= len; dy /= len; p.x += dx * p.speed * dt; p.y += dy * p.speed * dt; }
    
    p.x = clamp(p.x, 30, WORLD.width - 30);
    p.y = clamp(p.y, 30, WORLD.height - 30);
    p.invincible = Math.max(0, p.invincible - dt);
    p.dashReady = Math.max(0, p.dashReady - dt);
    
    if (p.regen > 0 && p.hp < p.maxHp) heal(p.regen * dt);

    p.fireTimer -= dt;
    if (p.fireTimer <= 0) {
      autoFire();
      p.fireTimer = p.fireRate;
    }

    if (p.orbit > 0) updateOrbitDamage(dt);
  }

  function updateSpawns(dt) {
    const pressure = 0.6 + state.time / 60;
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      const count = 1 + Math.floor(state.time / 30);
      for (let i = 0; i < count; i++) spawnEnemy();
      state.spawnTimer = Math.max(0.3, 1.0 / pressure);
    }
    state.eliteTimer -= dt;
    if (state.eliteTimer <= 0) {
      spawnElite();
      state.eliteTimer = 25;
    }
  }

  function autoFire() {
    if (!state.enemies.length) return;
    const p = state.player;
    const nearest = [...state.enemies].sort((a, b) => distance(p, a) - distance(p, b)).slice(0, p.projectileCount);
    
    nearest.forEach((enemy, index) => {
      const a = angleTo(p, enemy) + (index - (nearest.length - 1) / 2) * 0.2;
      state.projectiles.push({
        x: p.x, y: p.y, vx: Math.cos(a) * 500, vy: Math.sin(a) * 500,
        r: 12, damage: p.damage, life: 1.5, pierce: p.projectileCount >= 4 ? 1 : 0
      });
    });
    playTone(620 + Math.random() * 80, 0.035, "triangle");
  }

  function updateProjectiles(dt) {
    for (let i = state.projectiles.length - 1; i >= 0; i--) {
      const shot = state.projectiles[i];
      shot.x += shot.vx * dt; shot.y += shot.vy * dt; shot.life -= dt;
      let remove = shot.life <= 0;
      for (let j = state.enemies.length - 1; j >= 0 && !remove; j--) {
        const enemy = state.enemies[j];
        if (Math.hypot(shot.x - enemy.x, shot.y - enemy.y) < shot.r + enemy.r) {
          damageEnemy(enemy, shot.damage);
          burst(shot.x, shot.y, colors.bolt, 3);
          if (shot.pierce > 0) shot.pierce--; else remove = true;
        }
      }
      if (remove) state.projectiles.splice(i, 1);
    }
  }

  function updateEnemies(dt) {
    const p = state.player;
    for (let i = state.enemies.length - 1; i >= 0; i--) {
      const enemy = state.enemies[i];
      enemy.hit = Math.max(0, enemy.hit - dt);
      const a = angleTo(enemy, p);
      enemy.wobble += dt * 4;
      enemy.x += Math.cos(a) * enemy.speed * dt + Math.sin(enemy.wobble) * 8 * dt;
      enemy.y += Math.sin(a) * enemy.speed * dt + Math.cos(enemy.wobble) * 8 * dt;
      
      const d = Math.hypot(enemy.x - p.x, enemy.y - p.y);
      if (d < enemy.r + p.r - 8 && p.invincible <= 0) { // 当たり判定を少し甘めに
        p.hp -= enemy.damage;
        p.invincible = 1.0; // 無敵時間長め
        burst(p.x, p.y, "#ff5e5e", 10);
        setMessage("いてっ！ にげよう！");
        playTone(150, 0.15, "sawtooth");
        if (p.hp <= 0) { gameOver(); return; }
      }
      if (enemy.hp <= 0) killEnemy(enemy, i);
    }
  }

  function updateOrbitDamage(dt) {
    const p = state.player;
    const t = state.time * 3.0;
    for (let o = 0; o < p.orbit; o++) {
      const a = t + (Math.PI * 2 * o) / p.orbit;
      const ox = p.x + Math.cos(a) * 80;
      const oy = p.y + Math.sin(a) * 80;
      state.enemies.forEach(enemy => {
        if (Math.hypot(enemy.x - ox, enemy.y - oy) < enemy.r + 15) {
          enemy.hp -= (20 + p.damage * 0.3) * dt;
          enemy.hit = 0.1;
        }
      });
    }
  }

  function updateGems(dt) {
    const p = state.player;
    for (let i = state.gems.length - 1; i >= 0; i--) {
      const gem = state.gems[i];
      const d = distance(gem, p);
      if (d < p.magnet) {
        const a = angleTo(gem, p);
        gem.x += Math.cos(a) * (350 + (p.magnet - d) * 2) * dt; // 吸い込み速度アップ
        gem.y += Math.sin(a) * (350 + (p.magnet - d) * 2) * dt;
      }
      if (d < p.r + 15) {
        gainXp(gem.value);
        state.gems.splice(i, 1);
      }
    }
  }

  function updatePickups(dt) {
    const p = state.player;
    for (let i = state.pickups.length - 1; i >= 0; i--) {
      const item = state.pickups[i];
      if (distance(item, p) < p.r + 20) {
        if (item.type === "food") {
          heal(50);
          setMessage("ケーキで かいふく！🍰");
          playTone(600, 0.1, "triangle");
        } else {
          state.gems.forEach(gem => { gem.x += (p.x - gem.x)*0.9; gem.y += (p.y - gem.y)*0.9; });
          setMessage("キャンディを ぜんぶすいよせた！🍬");
        }
        state.pickups.splice(i, 1);
      }
    }
  }

  function updateParticles(dt) {
    state.particles = state.particles.filter(p => {
      p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 150 * dt; p.life -= dt;
      return p.life > 0;
    });
    state.floatTexts = state.floatTexts.filter(t => {
      t.y -= 40 * dt; t.life -= dt;
      return t.life > 0;
    });
  }

  function updateCamera() {
    const p = state.player;
    state.camera.x = clamp(p.x - state.camera.w / 2, 0, WORLD.width - state.camera.w);
    state.camera.y = clamp(p.y - state.camera.h / 2, 0, WORLD.height - state.camera.h);
  }

  function damageEnemy(enemy, amount) {
    enemy.hp -= amount; enemy.hit = 0.1;
  }

  function killEnemy(enemy, index) {
    state.enemies.splice(index, 1);
    state.kills++;
    const value = enemy.elite ? 15 : enemy.tier === 3 ? 5 : enemy.tier === 2 ? 3 : 2;
    state.gems.push({ x: enemy.x, y: enemy.y, value }); // r削除、絵文字で描画
    if (Math.random() < (enemy.elite ? 1.0 : 0.05)) { // エリートは必ずアイテムドロップ
      state.pickups.push({ x: enemy.x, y: enemy.y, type: Math.random() < 0.7 ? "food" : "magnet" });
    }
    state.score += enemy.elite ? 300 : enemy.tier * 20;
    burst(enemy.x, enemy.y, "#ffcc00", enemy.elite ? 20 : 8);
  }

  function gainXp(value) {
    state.xp += Math.ceil(value * state.player.xpBonus);
    state.score += value * 10;
    while (state.xp >= state.xpNeed) {
      state.xp -= state.xpNeed;
      state.level++;
      state.xpNeed = Math.floor(state.xpNeed * 1.3 + 8); // レベルアップしやすく調整
      showUpgrades();
      playTone(800, 0.1, "triangle"); playTone(1000, 0.15, "triangle", 0.1);
      break;
    }
  }

  function heal(amount) {
    state.player.hp = Math.min(state.player.maxHp, state.player.hp + amount);
  }

  function dash() {
    if (!state.running || state.paused || state.choosing) return;
    const p = state.player;
    if (p.dashReady > 0) return;
    let dx = (state.keys.right ? 1 : 0) - (state.keys.left ? 1 : 0);
    let dy = (state.keys.down ? 1 : 0) - (state.keys.up ? 1 : 0);
    if (!dx && !dy) dy = -1;
    const len = Math.hypot(dx, dy); dx /= len; dy /= len;
    p.x = clamp(p.x + dx * 180, 30, WORLD.width - 30);
    p.y = clamp(p.y + dy * 180, 30, WORLD.height - 30);
    p.invincible = 0.5; p.dashReady = 2.0; // ダッシュ使いやすく
    burst(p.x, p.y, "#5cb8ff", 15);
    playTone(500, 0.1, "square");
  }

  function showUpgrades() {
    state.choosing = true;
    el.upgradeList.innerHTML = "";
    const choices = [...upgrades].sort(() => Math.random() - 0.5).slice(0, 3);
    choices.forEach(choice => {
      const card = document.createElement("button");
      card.type = "button"; card.className = "upgrade-card";
      card.innerHTML = `<strong>${choice.name}</strong><span>${choice.desc}</span>`;
      card.addEventListener("click", () => {
        choice.apply(); hideUpgrades(); state.choosing = false;
        setMessage(`${choice.name} をゲットした！`); updateHud();
      });
      el.upgradeList.appendChild(card);
    });
    el.upgradeLayer.classList.add("show");
  }

  function hideUpgrades() { el.upgradeLayer.classList.remove("show"); }

  function gameOver() {
    state.running = false; saveBest();
    showModal("ゲームオーバー", `スコア ${state.score}、やっつけた数 ${state.kills}。\nもういっかい チャレンジしよう！`, [
      { label: "もういっかい", className: "play", action: resetGame }
    ]);
    setMessage("ゲームオーバー");
  }

  function winGame() {
    state.running = false; state.score += 5000 + state.kills * 5; saveBest();
    showModal("クリア！！", `2ふんかん よくがんばったね！\nスコア ${state.score}、やっつけた数 ${state.kills}。`, [
      { label: "もういっかい", className: "play", action: resetGame }
    ]);
    setMessage("クリアおめでとう！");
    playTone(660, 0.1, "triangle"); playTone(880, 0.2, "triangle", 0.1);
  }

  function saveBest() {
    if (state.score <= state.best) return;
    state.best = state.score; localStorage.setItem("nyankoSurvivorBest", String(state.best));
  }

  function togglePause() {
    if (!state.running) { resetGame(); return; }
    if (state.choosing) return;
    state.paused = !state.paused;
    setMessage(state.paused ? "ストップちゅう" : "スタート！");
    state.lastTime = performance.now();
    updateHud();
  }

  function updateHud() {
    const remaining = Math.max(0, ROUND_SECONDS - state.time);
    const minutes = Math.floor(remaining / 60);
    const seconds = Math.floor(remaining % 60);
    el.time.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    el.level.textContent = state.level;
    el.kills.textContent = state.kills;
    el.score.textContent = state.score;
    el.hp.textContent = `${Math.max(0, Math.ceil(state.player.hp))}/${state.player.maxHp}`;
    el.hpBar.style.width = `${Math.max(0, state.player.hp / state.player.maxHp) * 100}%`;
    el.xp.textContent = `${state.xp}/${state.xpNeed}`;
    el.xpBar.style.width = `${Math.min(1, state.xp / state.xpNeed) * 100}%`;
    el.best.textContent = `最高スコア ${state.best}`;
    el.weapon.textContent = `キラキラ星 Lv${state.level} / ${state.player.projectileCount}発`;
    el.start.textContent = state.running ? (state.paused ? "スタート" : "ストップ") : "スタート";
    el.pause.textContent = state.paused ? "スタート" : "ストップ";
    el.status.textContent = state.time > 100 ? "さいごの ラッシュだ！ がんばれ！" : "オバケをやっつけて キャンディをあつめよう！";
  }

  function setMessage(text) { el.message.textContent = text; state.messageTimer = 3.0; }

  // 描画関連
  function drawEmoji(emoji, x, y, size) {
    ctx.font = `${size}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(emoji, x, y);
  }

  function draw() {
    const cam = state.camera;
    ctx.clearRect(0, 0, cam.w, cam.h);
    
    // 背景グラデーション
    ctx.fillStyle = "#eef9ff";
    ctx.fillRect(0, 0, cam.w, cam.h);
    
    ctx.save();
    ctx.translate(-cam.x, -cam.y);
    drawWorldGrid();
    drawGems();
    drawPickups();
    drawProjectiles();
    drawEnemies();
    drawOrbit();
    drawPlayer();
    drawParticles();
    drawFloatTexts();
    ctx.restore();
    
    if (state.paused) drawCenterText("ストップ");
  }

  function drawWorldGrid() {
    const cam = state.camera;
    const startX = Math.floor(cam.x / 100) * 100;
    const startY = Math.floor(cam.y / 100) * 100;
    ctx.strokeStyle = "rgba(100, 150, 255, 0.15)";
    ctx.lineWidth = 2;
    for (let x = startX; x < cam.x + cam.w + 100; x += 100) {
      ctx.beginPath(); ctx.moveTo(x, cam.y); ctx.lineTo(x, cam.y + cam.h); ctx.stroke();
    }
    for (let y = startY; y < cam.y + cam.h + 100; y += 100) {
      ctx.beginPath(); ctx.moveTo(cam.x, y); ctx.lineTo(cam.x + cam.w, y); ctx.stroke();
    }
    ctx.strokeStyle = "rgba(100, 150, 255, 0.4)";
    ctx.strokeRect(0, 0, WORLD.width, WORLD.height);
  }

  function drawPlayer() {
    const p = state.player;
    const blink = p.invincible > 0 && Math.floor(performance.now() / 100) % 2 === 0;
    ctx.save();
    if (blink) ctx.globalAlpha = 0.5;
    
    // 影
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.beginPath(); ctx.ellipse(p.x, p.y + 15, 18, 6, 0, 0, Math.PI * 2); ctx.fill();
    
    // プレイヤー 絵文字
    drawEmoji("🐱", p.x, p.y, 42);
    ctx.restore();
  }

  function drawEnemies() {
    state.enemies.forEach(e => {
      ctx.save();
      // 影
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.beginPath(); ctx.ellipse(e.x, e.y + e.r - 4, e.r * 0.8, e.r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
      
      // ダメージ点滅
      if (e.hit > 0) {
        ctx.globalAlpha = 0.5;
      }
      
      drawEmoji(e.emoji, e.x, e.y, e.r * 2.2);
      
      // HPバー
      const hpPct = Math.max(0, e.hp / e.maxHp);
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = "#fff";
      ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 6);
      ctx.fillStyle = "#ff5e5e";
      ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * hpPct, 6);
      ctx.strokeStyle = "#aaa"; ctx.lineWidth = 1;
      ctx.strokeRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 6);
      ctx.restore();
    });
  }

  function drawProjectiles() {
    state.projectiles.forEach(shot => {
      drawEmoji("🌟", shot.x, shot.y, 24);
    });
  }

  function drawOrbit() {
    const p = state.player;
    if (!p.orbit) return;
    const t = state.time * 3.0;
    for (let i = 0; i < p.orbit; i++) {
      const a = t + (Math.PI * 2 * i) / p.orbit;
      const x = p.x + Math.cos(a) * 80;
      const y = p.y + Math.sin(a) * 80;
      drawEmoji("💫", x, y, 28);
    }
  }

  function drawGems() {
    state.gems.forEach(gem => {
      drawEmoji("🍬", gem.x, gem.y, 24);
    });
  }

  function drawPickups() {
    state.pickups.forEach(item => {
      drawEmoji(item.type === "food" ? "🍰" : "🧲", item.x, item.y, 32);
    });
  }

  function drawParticles() {
    state.particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function drawFloatTexts() {
    state.floatTexts.forEach(t => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, t.life / 0.8);
      ctx.font = "900 18px ui-monospace, sans-serif";
      ctx.textAlign = "center";
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
      ctx.strokeText(t.text, t.x, t.y);
      ctx.fillStyle = t.color;
      ctx.fillText(t.text, t.x, t.y);
      ctx.restore();
    });
  }

  function drawCenterText(text) {
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillRect(0, 0, state.camera.w, state.camera.h);
    ctx.fillStyle = "#ff8c00";
    ctx.font = "900 48px ui-monospace, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(text, state.camera.w / 2, state.camera.h / 2);
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
    ctx.strokeText(text, state.camera.w / 2, state.camera.h / 2);
    ctx.fillText(text, state.camera.w / 2, state.camera.h / 2);
    ctx.restore();
  }

  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 120;
      state.particles.push({
        x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed,
        size: 4 + Math.random() * 5, life: 0.4 + Math.random() * 0.3, maxLife: 0.7, color
      });
    }
  }

  function showModal(title, text, actions) {
    el.modalTitle.textContent = title;
    el.modalText.innerText = text;
    el.modalActions.innerHTML = "";
    actions.forEach(action => {
      const button = document.createElement("button");
      button.type = "button"; button.className = `btn ${action.className || ""}`;
      button.textContent = action.label; button.addEventListener("click", action.action);
      el.modalActions.appendChild(button);
    });
    el.modal.classList.add("show");
  }

  function hideModal() { el.modal.classList.remove("show"); }

  function ensureAudio() {
    if (state.muted) return null;
    if (!state.audio) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      state.audio = new AudioContext();
    }
    if (state.audio.state === "suspended") state.audio.resume();
    return state.audio;
  }

  function playTone(freq, duration, type = "square", delay = 0) {
    const audio = ensureAudio(); if (!audio) return;
    const start = audio.currentTime + delay;
    const osc = audio.createOscillator(); const gain = audio.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.05, start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain); gain.connect(audio.destination);
    osc.start(start); osc.stop(start + duration + 0.03);
  }

  function keyToMove(key) {
    if (key === "arrowleft" || key === "a") return "left";
    if (key === "arrowright" || key === "d") return "right";
    if (key === "arrowup" || key === "w") return "up";
    if (key === "arrowdown" || key === "s") return "down";
    return "";
  }

  document.addEventListener("keydown", event => {
    const key = event.key.toLowerCase();
    const move = keyToMove(key);
    if (move) { event.preventDefault(); state.keys[move] = true; return; }
    if (key === " " || key === "shift") { event.preventDefault(); dash(); return; }
    if (key === "enter" || key === "escape") { event.preventDefault(); togglePause(); }
  }, { passive: false });

  document.addEventListener("keyup", event => {
    const move = keyToMove(event.key.toLowerCase());
    if (move) state.keys[move] = false;
  });

  document.querySelectorAll("[data-move]").forEach(button => {
    const move = button.dataset.move;
    button.addEventListener("pointerdown", event => { event.preventDefault(); state.keys[move] = true; });
    button.addEventListener("pointerup", () => state.keys[move] = false);
    button.addEventListener("pointercancel", () => state.keys[move] = false);
    button.addEventListener("click", () => { state.keys[move] = true; setTimeout(() => state.keys[move] = false, 140); });
  });

  el.start.addEventListener("click", () => { if (!state.running) resetGame(); });
  el.pause.addEventListener("click", togglePause);
  el.dash.addEventListener("click", dash);
  el.mute.addEventListener("click", () => {
    state.muted = !state.muted; el.mute.textContent = state.muted ? "×" : "♪";
  });
  window.addEventListener("resize", resizeCanvas);

  function loop(now) {
    const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
    state.lastTime = now;
    update(dt); draw();
    if (state.running) requestAnimationFrame(loop);
  }

  showModal("にゃんこサバイバー", "いどうするだけで遊べるゲームだよ！\nオバケをやっつけて キャンディをあつめよう！\n2ふんかん 生き残れるかな？", [
    { label: "スタート！", className: "play", action: resetGame }
  ]);
  resizeCanvas(); updateHud(); draw();
})();
</script>
</body>
</html>
