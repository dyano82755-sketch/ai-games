<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ポーカー・役作りチャレンジ</title>
<style>
  :root {
    --bg-color: #0b2b1a;
    --panel-bg: #114227;
    --text-main: #f0f4f8;
    --text-muted: #a3c4b1;
    --accent: #f6c945;
    --card-bg: #ffffff;
    --red-suit: #df5142;
    --black-suit: #1a1a24;
    --btn-primary: #45a4e8;
    --btn-danger: #df5142;
    --btn-success: #5cc66e;
    --shadow: rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at 50% 30%, #155230, var(--bg-color));
    color: var(--text-main);
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Rounded Gothic", "Meiryo", sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
  }

  .app-container {
    width: min(900px, 100%);
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
  }

  /* --- ヘッダー・スコアボード --- */
  .hud {
    background: var(--panel-bg);
    border: 3px solid #1f6b3e;
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 6px 16px var(--shadow);
  }

  .hud-stats {
    display: flex;
    gap: 20px;
  }

  .stat-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: bold;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--accent);
  }

  .round-box {
    text-align: right;
  }

  /* --- メインエリア（カード表示） --- */
  .play-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    position: relative;
  }

  .info-text {
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
    min-height: 1.5em;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
  }

  .cards-container {
    display: flex;
    justify-content: center;
    gap: 12px;
    perspective: 1000px;
    width: 100%;
  }

  .card-slot {
    flex: 1;
    max-width: 140px;
    aspect-ratio: 2.5 / 3.5;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    background: var(--card-bg);
    border-radius: 10px;
    border: 2px solid #ccc;
    box-shadow: 0 8px 16px var(--shadow);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, filter 0.2s;
    position: absolute;
    top: 0;
    left: 0;
    backface-visibility: hidden;
  }

  /* 選択時（交換予定）のアニメーション */
  .card.selected {
    transform: translateY(-20px);
    border-color: var(--btn-danger);
    box-shadow: 0 15px 20px rgba(223, 81, 66, 0.4);
    filter: brightness(0.85);
  }

  .card.hidden {
    opacity: 0;
    pointer-events: none;
    transform: rotateY(180deg);
  }

  .card-top {
    font-size: 1.4rem;
    font-weight: 900;
    line-height: 1;
  }

  .card-center {
    font-size: 3rem;
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-bottom {
    font-size: 1.4rem;
    font-weight: 900;
    line-height: 1;
    transform: rotate(180deg);
    text-align: left;
  }

  .suit-hearts, .suit-diams { color: var(--red-suit); }
  .suit-spades, .suit-clubs { color: var(--black-suit); }

  .exchange-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    background: var(--btn-danger);
    color: white;
    padding: 4px 12px;
    border-radius: 4px;
    font-weight: 900;
    font-size: 1.2rem;
    border: 2px solid #fff;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
  }

  .card.selected .exchange-badge {
    opacity: 1;
  }

  /* --- コントロールエリア --- */
  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px 0;
  }

  .btn {
    padding: 14px 28px;
    font-size: 1.2rem;
    font-weight: 900;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: #fff;
    box-shadow: 0 6px 0 rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: inherit;
  }

  .btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 transparent;
  }

  .btn:disabled {
    background: #555;
    color: #888;
    box-shadow: 0 6px 0 #333;
    cursor: not-allowed;
    transform: none;
  }

  .btn-exchange { background: linear-gradient(180deg, var(--btn-primary), #2974a6); }
  .btn-score { background: linear-gradient(180deg, var(--btn-success), #3a8a47); }
  
  /* --- モーダル --- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--panel-bg);
    border: 4px solid var(--accent);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    max-width: 450px;
    width: 90%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }

  .modal-title {
    font-size: 2rem;
    color: var(--accent);
    margin: 0 0 10px 0;
  }

  .modal-score {
    font-size: 3rem;
    font-weight: 900;
    color: #fff;
    margin: 10px 0 20px 0;
  }

  /* スマホ対応 */
  @media (max-width: 600px) {
    .cards-container { gap: 6px; }
    .card-slot { aspect-ratio: 2 / 3.2; }
    .card { padding: 6px; border-radius: 6px; }
    .card-top, .card-bottom { font-size: 1rem; }
    .card-center { font-size: 2rem; }
    .exchange-badge { font-size: 0.9rem; padding: 2px 6px; }
    .btn { padding: 12px 20px; font-size: 1rem; }
    .stat-value { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="app-container">
  <header class="hud">
    <div class="hud-stats">
      <div class="stat-box">
        <span class="stat-label">TOTAL SCORE</span>
        <span class="stat-value" id="score-display">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">交換チャンス</span>
        <span class="stat-value" id="exchanges-display">2 / 2</span>
      </div>
    </div>
    <div class="round-box">
      <div class="stat-label">ROUND</div>
      <div class="stat-value" id="round-display">1 / 5</div>
    </div>
  </header>

  <main class="play-area">
    <div class="info-text" id="info-text">交換するカードを選んでください</div>
    
    <div class="cards-container" id="cards-container">
      </div>
  </main>

  <footer class="controls">
    <button class="btn btn-exchange" id="btn-exchange" onclick="exchangeCards()">交換する</button>
    <button class="btn btn-score" id="btn-score" onclick="scoreHand()">勝負する！</button>
  </footer>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal-box">
    <h2 class="modal-title" id="modal-hand-name">役名</h2>
    <div class="stat-label">獲得スコア</div>
    <div class="modal-score" id="modal-score-value">+0</div>
    <div id="modal-final-text" style="margin-bottom: 20px; color: var(--text-muted); display: none;"></div>
    <button class="btn btn-score" id="btn-next-round" onclick="startRound()" style="width: 100%;">次のラウンドへ</button>
  </div>
</div>

<script>
// --- オーディオ設定 (レトロな効果音) ---
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
  ensureAudio();
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  if (type === 'deal') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  } else if (type === 'select') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  } else if (type === 'exchange') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
  } else if (type === 'score') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
    osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  }
}

// --- ゲームロジック ---
const SUITS = [
  { id: 'hearts', symbol: '♥', colorClass: 'suit-hearts' },
  { id: 'diams', symbol: '♦', colorClass: 'suit-diams' },
  { id: 'spades', symbol: '♠', colorClass: 'suit-spades' },
  { id: 'clubs', symbol: '♣', colorClass: 'suit-clubs' }
];
const RANKS = [
  { label: '2', value: 2 }, { label: '3', value: 3 }, { label: '4', value: 4 },
  { label: '5', value: 5 }, { label: '6', value: 6 }, { label: '7', value: 7 },
  { label: '8', value: 8 }, { label: '9', value: 9 }, { label: '10', value: 10 },
  { label: 'J', value: 11 }, { label: 'Q', value: 12 }, { label: 'K', value: 13 },
  { label: 'A', value: 14 }
];

let state = {
  deck: [],
  hand: [],
  selectedForExchange: [false, false, false, false, false],
  exchangesLeft: 2,
  round: 1,
  maxRounds: 5,
  totalScore: 0,
  gameState: 'playing' // 'playing', 'scored', 'gameover'
};

function createDeck() {
  let deck = [];
  for (let suit of SUITS) {
    for (let rank of RANKS) {
      deck.push({ ...suit, ...rank });
    }
  }
  // シャッフル (Fisher-Yates)
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function initGame() {
  state.totalScore = 0;
  state.round = 1;
  document.getElementById('score-display').textContent = '0';
  startRound();
}

function startRound() {
  document.getElementById('result-modal').classList.remove('show');
  
  if (state.round > state.maxRounds) {
    // 全ラウンド終了
    showFinalResult();
    return;
  }

  state.deck = createDeck();
  state.hand = [];
  for (let i = 0; i < 5; i++) {
    state.hand.push(state.deck.pop());
  }
  
  state.selectedForExchange = [false, false, false, false, false];
  state.exchangesLeft = 2;
  state.gameState = 'playing';
  
  updateUI();
  renderCards(true);
  
  setTimeout(() => playSound('deal'), 100);
}

function toggleCard(index) {
  if (state.gameState !== 'playing' || state.exchangesLeft <= 0) return;
  
  state.selectedForExchange[index] = !state.selectedForExchange[index];
  playSound('select');
  renderCards(false);
  updateButtons();
}

function exchangeCards() {
  if (state.gameState !== 'playing' || state.exchangesLeft <= 0) return;
  
  const anySelected = state.selectedForExchange.some(v => v);
  if (!anySelected) {
    alert("交換するカードを選んでください（タップで選択）");
    return;
  }

  playSound('exchange');
  
  // 新しいカードを引く
  for (let i = 0; i < 5; i++) {
    if (state.selectedForExchange[i]) {
      state.hand[i] = state.deck.pop();
      state.selectedForExchange[i] = false; // 選択解除
    }
  }
  
  state.exchangesLeft--;
  updateUI();
  renderCards(true); // アニメーション付きで再描画
}

// 役判定ロジック
function evaluateHand(hand) {
  const values = hand.map(c => c.value).sort((a, b) => b - a);
  const suits = hand.map(c => c.suit);
  
  const isFlush = new Set(suits).size === 1;
  
  let isStraight = false;
  // 通常のストレート (例: 10, 9, 8, 7, 6)
  if (values[0] - values[4] === 4 && new Set(values).size === 5) {
    isStraight = true;
  }
  // A, 5, 4, 3, 2 の特別なストレート
  if (values[0] === 14 && values[1] === 5 && values[2] === 4 && values[3] === 3 && values[4] === 2) {
    isStraight = true;
  }

  // 同じ数字のカウント
  const counts = {};
  values.forEach(v => counts[v] = (counts[v] || 0) + 1);
  const frequencies = Object.values(counts).sort((a, b) => b - a); // 多い順 (例: フォーカードなら [4, 1])

  if (isFlush && isStraight) {
    if (values[0] === 14 && values[1] === 13) return { name: "ロイヤルストレートフラッシュ", score: 1000 };
    return { name: "ストレートフラッシュ", score: 500 };
  }
  if (frequencies[0] === 4) return { name: "フォーカード", score: 250 };
  if (frequencies[0] === 3 && frequencies[1] === 2) return { name: "フルハウス", score: 150 };
  if (isFlush) return { name: "フラッシュ", score: 100 };
  if (isStraight) return { name: "ストレート", score: 70 };
  if (frequencies[0] === 3) return { name: "スリーカード", score: 40 };
  if (frequencies[0] === 2 && frequencies[1] === 2) return { name: "ツーペア", score: 20 };
  if (frequencies[0] === 2) return { name: "ワンペア", score: 10 };
  
  return { name: "ハイカード (役なし)", score: 0 };
}

function scoreHand() {
  if (state.gameState !== 'playing') return;
  state.gameState = 'scored';
  
  // 選択状態をリセットして見やすくする
  state.selectedForExchange = [false, false, false, false, false];
  renderCards(false);
  playSound('score');

  const result = evaluateHand(state.hand);
  state.totalScore += result.score;
  
  // UI更新
  document.getElementById('score-display').textContent = state.totalScore;
  
  // モーダル表示
  setTimeout(() => {
    document.getElementById('modal-hand-name').textContent = result.name;
    document.getElementById('modal-score-value').textContent = `+${result.score}`;
    
    const nextBtn = document.getElementById('btn-next-round');
    if (state.round >= state.maxRounds) {
      nextBtn.textContent = "最終結果を見る";
    } else {
      nextBtn.textContent = "次のラウンドへ";
    }
    
    document.getElementById('result-modal').classList.add('show');
    state.round++;
  }, 500);
}

function showFinalResult() {
  document.getElementById('modal-hand-name').textContent = "チャレンジ終了！";
  document.getElementById('modal-hand-name').style.color = "#fff";
  document.getElementById('modal-score-value').textContent = `合計: ${state.totalScore}点`;
  document.getElementById('modal-score-value').style.color = "var(--accent)";
  
  const textEl = document.getElementById('modal-final-text');
  textEl.style.display = "block";
  if (state.totalScore >= 500) textEl.textContent = "神業！プロのポーカープレイヤーです！";
  else if (state.totalScore >= 200) textEl.textContent = "素晴らしい！かなりの豪運の持ち主です。";
  else if (state.totalScore >= 50) textEl.textContent = "ナイスプレイ！堅実に役を作りました。";
  else textEl.textContent = "残念！次はもっと良いカードが来るはず。";

  const nextBtn = document.getElementById('btn-next-round');
  nextBtn.textContent = "もう一度遊ぶ";
  nextBtn.onclick = () => {
    textEl.style.display = "none";
    document.getElementById('modal-hand-name').style.color = "var(--accent)";
    document.getElementById('modal-score-value').style.color = "#fff";
    nextBtn.onclick = startRound; // クリックイベントを元に戻す
    initGame();
  };
  
  document.getElementById('result-modal').classList.add('show');
}

// --- UI描画 ---
function updateUI() {
  document.getElementById('exchanges-display').textContent = `${state.exchangesLeft} / 2`;
  document.getElementById('round-display').textContent = `${state.round} / ${state.maxRounds}`;
  
  const infoText = document.getElementById('info-text');
  if (state.exchangesLeft > 0) {
    infoText.textContent = `交換するカードを選んでください（あと ${state.exchangesLeft} 回）`;
  } else {
    infoText.textContent = "交換終了！「勝負する！」を押してください";
  }
  
  updateButtons();
}

function updateButtons() {
  const btnExchange = document.getElementById('btn-exchange');
  const btnScore = document.getElementById('btn-score');
  
  const anySelected = state.selectedForExchange.some(v => v);
  
  btnExchange.disabled = state.exchangesLeft <= 0 || !anySelected || state.gameState !== 'playing';
  btnScore.disabled = state.gameState !== 'playing';
}

function renderCards(animate = false) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  
  state.hand.forEach((card, index) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    
    const cardEl = document.createElement('div');
    cardEl.className = `card ${card.colorClass}`;
    if (state.selectedForExchange[index]) cardEl.classList.add('selected');
    
    // アニメーション用
    if (animate) {
      cardEl.style.transform = 'translateY(-100px) rotateY(180deg)';
      cardEl.style.opacity = '0';
      setTimeout(() => {
        cardEl.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        cardEl.style.transform = state.selectedForExchange[index] ? 'translateY(-20px)' : 'translateY(0) rotateY(0)';
        cardEl.style.opacity = '1';
      }, index * 100);
    }
    
    cardEl.innerHTML = `
      <div class="card-top">${card.label} ${card.symbol}</div>
      <div class="card-center">${card.symbol}</div>
      <div class="card-bottom">${card.label} ${card.symbol}</div>
      <div class="exchange-badge">CHANGE</div>
    `;
    
    cardEl.onclick = () => toggleCard(index);
    
    slot.appendChild(cardEl);
    container.appendChild(slot);
  });
}

// アプリ起動
window.onload = initGame;

</script>
</body>
</html>
