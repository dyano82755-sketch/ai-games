<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>シンプルパズルゲーム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    #game-container {
      width: 100%;
      max-width: 500px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      position: absolute;
      top: 0;
      left: 0;
      transition: opacity 0.5s ease;
    }

    .hidden {
      display: none;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      background: linear-gradient(to right, #ff6b6b, #ffa502);
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      color: white;
      font-weight: bold;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(1px);
    }

    #game-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 300px;
      aspect-ratio: 1/1;
      margin: 20px 0;
    }

    .cell {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .cell:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .cell.empty {
      background: transparent;
      cursor: default;
      transform: none;
    }

    .cell.empty:hover {
      background: transparent;
      transform: none;
    }

    #score {
      font-size: 1.5rem;
      margin: 20px 0;
      font-weight: bold;
    }

    #moves {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .instructions {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 0.9rem;
    }

    .emoji {
      font-size: 2rem;
      margin: 0 5px;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }
      
      h2 {
        font-size: 1.5rem;
      }
      
      .cell {
        font-size: 2rem;
      }
      
      .btn {
        padding: 12px 30px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- スタート画面 -->
    <div id="start-screen" class="screen">
      <h1>🌟 シンプルパズルゲーム 🌟</h1>
      <p>数字を並び替えて、1から8の順番に並べよう！</p>
      
      <div class="instructions">
        <p>🎯 タップまたはクリックで数字を移動</p>
        <p>🔄 空白の隣の数字をクリックして交換</p>
        <p>🏁 目標：1,2,3,4,5,6,7,8の順番に並べる</p>
      </div>
      
      <button id="start-btn" class="btn">🎮 ゲーム開始</button>
      
      <div style="margin-top: 20px; font-size: 0.9rem;">
        <p>✨ スマホでもPCでも遊べます</p>
        <p>📱 タッチ操作に対応しています</p>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-screen" class="screen hidden">
      <h2>🎮 ゲーム中</h2>
      <div id="score">スコア: <span id="score-value">0</span></div>
      <div id="moves">手数: <span id="moves-value">0</span></div>
      
      <div id="game-board"></div>
      
      <button id="reset-btn" class="btn">🔄 もう一度</button>
      <button id="back-btn" class="btn">🏠 ホームに戻る</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="game-over-screen" class="screen hidden">
      <h2>🎉 クリア！</h2>
      <p>おめでとうございます！</p>
      
      <div id="final-score">
        <p>最終スコア: <span id="final-score-value">0</span></p>
        <p>手数: <span id="final-moves-value">0</span></p>
      </div>
      
      <div style="margin: 20px 0;">
        <p class="emoji">🏆</p>
        <p>素晴らしいパズルスキル！</p>
      </div>
      
      <button id="restart-btn" class="btn">🔄 もう一度遊ぶ</button>
      <button id="home-btn" class="btn">🏠 ホームに戻る</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ゲーム状態
      const gameState = {
        board: [],
        emptyIndex: 0,
        moves: 0,
        score: 0,
        isPlaying: false
      };

      // DOM要素
      const startScreen = document.getElementById('start-screen');
      const gameScreen = document.getElementById('game-screen');
      const gameOverScreen = document.getElementById('game-over-screen');
      const gameBoard = document.getElementById('game-board');
      const startBtn = document.getElementById('start-btn');
      const resetBtn = document.getElementById('reset-btn');
      const backBtn = document.getElementById('back-btn');
      const restartBtn = document.getElementById('restart-btn');
      const homeBtn = document.getElementById('home-btn');
      const scoreValue = document.getElementById('score-value');
      const movesValue = document.getElementById('moves-value');
      const finalScoreValue = document.getElementById('final-score-value');
      const finalMovesValue = document.getElementById('final-moves-value');

      // ゲーム初期化
      function initGame() {
        gameState.board = [1, 2, 3, 4, 5, 6, 7, 8, 0]; // 0は空きマス
        gameState.emptyIndex = 8;
        gameState.moves = 0;
        gameState.score = 0;
        gameState.isPlaying = true;
        
        updateScore();
        renderBoard();
        shuffleBoard();
        renderBoard();
      }

      // ボードをシャッフル
      function shuffleBoard() {
        const board = gameState.board;
        const emptyIndex = 8;
        
        // 100回ランダムに移動
        for (let i = 0; i < 100; i++) {
          const neighbors = getNeighbors(emptyIndex);
          const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
          
          // 交換
          [board[emptyIndex], board[randomNeighbor]] = [board[randomNeighbor], board[emptyIndex]];
          gameState.emptyIndex = randomNeighbor;
        }
      }

      // 隣接するマスを取得
      function getNeighbors(index) {
        const neighbors = [];
        const row = Math.floor(index / 3);
        const col = index % 3;
        
        if (row > 0) neighbors.push(index - 3); // 上
        if (row < 2) neighbors.push(index + 3); // 下
        if (col > 0) neighbors.push(index - 1); // 左
        if (col < 2) neighbors.push(index + 1); // 右
        
        return neighbors;
      }

      // ボード描画
      function renderBoard() {
        gameBoard.innerHTML = '';
        
        gameState.board.forEach((value, index) => {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.index = index;
          
          if (value === 0) {
            cell.classList.add('empty');
            cell.innerHTML = '';
          } else {
            cell.textContent = value;
            cell.addEventListener('click', () => handleCellClick(index));
          }
          
          gameBoard.appendChild(cell);
        });
      }

      // セルクリック処理
      function handleCellClick(index) {
        if (!gameState.isPlaying) return;
        
        const neighbors = getNeighbors(gameState.emptyIndex);
        
        if (neighbors.includes(index)) {
          // 交換
          [gameState.board[gameState.emptyIndex], gameState.board[index]] = 
           [gameState.board[index], gameState.board[gameState.emptyIndex]];
          
          gameState.emptyIndex = index;
          gameState.moves++;
          gameState.score += 10;
          
          updateScore();
          renderBoard();
          
          // ゲームクリア判定
          if (isGameComplete()) {
            gameState.isPlaying = false;
            showGameOver();
          }
        }
      }

      // ゲームクリア判定
      function isGameComplete() {
        for (let i = 0; i < 8; i++) {
          if (gameState.board[i] !== i + 1) {
            return false;
          }
        }
        return true;
      }

      // スコア更新
      function updateScore() {
        scoreValue.textContent = gameState.score;
        movesValue.textContent = gameState.moves;
      }

      // ゲームオーバー画面表示
      function showGameOver() {
        finalScoreValue.textContent = gameState.score;
        finalMovesValue.textContent = gameState.moves;
        
        gameScreen.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
      }

      // スタート画面表示
      function showStartScreen() {
        startScreen.classList.remove('hidden');
        gameScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
      }

      // ゲーム画面表示
      function showGameScreen() {
        startScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        gameOverScreen.classList.add('hidden');
      }

      // イベントリスナー
      startBtn.addEventListener('click', () => {
        initGame();
        showGameScreen();
      });

      resetBtn.addEventListener('click', () => {
        initGame();
        showGameScreen();
      });

      backBtn.addEventListener('click', showStartScreen);
      restartBtn.addEventListener('click', () => {
        initGame();
        showGameScreen();
      });
      homeBtn.addEventListener('click', showStartScreen);

      // 初期画面表示
      showStartScreen();
    });
  </script>
</body>
</html>
