<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>海賊船アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #1e5799, #207cca, #2989d8, #1e5799);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* スタート画面 */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #startScreen h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }

        #startScreen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        #startButton {
            background: linear-gradient(to bottom, #ff8c00, #ff4500);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            margin-top: 20px;
        }

        #startButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }

        /* ゲーム画面 */
        #gameScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        #gameHeader {
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
        }

        #score, #lives {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #gameBoard {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB, #4682B4);
            overflow: hidden;
        }

        /* 海賊船 */
        #ship {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            z-index: 5;
            transition: left 0.2s;
        }

        /* 敵 */
        .enemy {
            position: absolute;
            top: -50px;
            font-size: 3rem;
            animation: fall linear forwards;
        }

        /* 弾 */
        .bullet {
            position: absolute;
            top: 0;
            font-size: 1.5rem;
            animation: shoot linear forwards;
        }

        /* ゲームオーバー画面 */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            text-align: center;
        }

        #gameOverScreen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff4500;
        }

        #finalScore {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        #restartButton {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        #restartButton:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }

        /* アニメーション */
        @keyframes fall {
            to {
                transform: translateY(calc(100vh - 100px));
            }
        }

        @keyframes shoot {
            to {
                transform: translateY(-100px);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* タッチ操作用のヒント */
        #touchHint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            opacity: 0.7;
        }

        /* レスポンシブ対応 */
        @media (max-width: 500px) {
            #startScreen h1 {
                font-size: 2rem;
            }
            
            #startScreen p {
                font-size: 1rem;
            }
            
            #startButton, #restartButton {
                padding: 12px 30px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- スタート画面 -->
        <div id="startScreen">
            <h1>🏴‍☠️ 海賊船アプリ 🏴‍☠️</h1>
            <p>海賊船で敵を撃ち落とせ！<br>左右にスワイプして移動、タップして弾を発射！</p>
            <button id="startButton">スタート</button>
            <p>📱 タッチ操作でプレイできます</p>
        </div>

        <!-- ゲーム画面 -->
        <div id="gameScreen">
            <div id="gameHeader">
                <div id="score">💰 スコア: <span id="scoreValue">0</span></div>
                <div id="lives">❤️ 残機: <span id="livesValue">3</span></div>
            </div>
            <div id="gameBoard">
                <div id="ship">⛵</div>
                <div id="touchHint">スワイプで移動、タップで攻撃</div>
            </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameOverScreen">
            <h2>💀 ゲームオーバー 💀</h2>
            <div id="finalScore">最終スコア: 0</div>
            <button id="restartButton">もう一度プレイ</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲーム状態
            const gameState = {
                score: 0,
                lives: 3,
                isPlaying: false,
                shipPosition: 50,
                enemies: [],
                bullets: [],
                gameSpeed: 1000,
                lastEnemyTime: 0,
                lastBulletTime: 0
            };

            // DOM要素
            const startScreen = document.getElementById('startScreen');
            const gameScreen = document.getElementById('gameScreen');
            const gameOverScreen = document.getElementById('gameOverScreen');
            const startButton = document.getElementById('startButton');
            const restartButton = document.getElementById('restartButton');
            const scoreValue = document.getElementById('scoreValue');
            const livesValue = document.getElementById('livesValue');
            const finalScore = document.getElementById('finalScore');
            const ship = document.getElementById('ship');
            const gameBoard = document.getElementById('gameBoard');

            // ゲーム開始
            startButton.addEventListener('click', startGame);
            restartButton.addEventListener('click', startGame);

            function startGame() {
                gameState.score = 0;
                gameState.lives = 3;
                gameState.isPlaying = true;
                gameState.shipPosition = 50;
                gameState.enemies = [];
                gameState.bullets = [];
                
                updateUI();
                startScreen.style.display = 'none';
                gameScreen.style.display = 'flex';
                gameOverScreen.style.display = 'none';
                
                // ゲームループ開始
                requestAnimationFrame(gameLoop);
            }

            function gameLoop(timestamp) {
                if (!gameState.isPlaying) return;

                // 敵の生成
                if (timestamp - gameState.lastEnemyTime > gameState.gameSpeed) {
                    createEnemy();
                    gameState.lastEnemyTime = timestamp;
                }

                // 敵の移動
                moveEnemies();

                // 弾の移動
                moveBullets();

                // 衝突判定
                checkCollisions();

                // ゲームスピードの調整
                if (gameState.score > 0 && gameState.score % 100 === 0) {
                    gameState.gameSpeed = Math.max(300, 1000 - Math.floor(gameState.score / 10));
                }

                requestAnimationFrame(gameLoop);
            }

            function createEnemy() {
                const enemy = document.createElement('div');
                enemy.className = 'enemy';
                enemy.textContent = '👹';
                enemy.style.left = Math.random() * 90 + '%';
                gameBoard.appendChild(enemy);
                gameState.enemies.push({
                    element: enemy,
                    x: parseFloat(enemy.style.left),
                    y: -50
                });
            }

            function moveEnemies() {
                for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                    const enemy = gameState.enemies[i];
                    const currentY = parseInt(enemy.element.style.transform?.replace('translateY(', '').replace('px)', '') || 0);
                    const newY = currentY + 2;
                    enemy.element.style.transform = `translateY(${newY}px)`;
                    enemy.y = newY;

                    // 画面外に出たら削除
                    if (newY > gameBoard.offsetHeight) {
                        enemy.element.remove();
                        gameState.enemies.splice(i, 1);
                    }
                }
            }

            function moveBullets() {
                for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                    const bullet = gameState.bullets[i];
                    const currentY = parseInt(bullet.element.style.transform?.replace('translateY(', '').replace('px)', '') || 0);
                    const newY = currentY - 10;
                    bullet.element.style.transform = `translateY(${newY}px)`;
                    bullet.y = newY;

                    // 画面外に出たら削除
                    if (newY < 0) {
                        bullet.element.remove();
                        gameState.bullets.splice(i, 1);
                    }
                }
            }

            function checkCollisions() {
                // 弾と敵の衝突
                for (let i = gameState.bullets.length - 1; i >= 0; i--) {
                    const bullet = gameState.bullets[i];
                    for (let j = gameState.enemies.length - 1; j >= 0; j--) {
                        const enemy = gameState.enemies[j];
                        if (Math.abs(bullet.x - enemy.x) < 10 && Math.abs(bullet.y - enemy.y) < 10) {
                            // 衝突
                            bullet.element.remove();
                            enemy.element.remove();
                            gameState.bullets.splice(i, 1);
                            gameState.enemies.splice(j, 1);
                            gameState.score += 10;
                            updateUI();
                            break;
                        }
                    }
                }

                // 海賊船と敵の衝突
                for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                    const enemy = gameState.enemies[i];
                    if (Math.abs(enemy.x - gameState.shipPosition) < 15 && enemy.y > gameBoard.offsetHeight - 150) {
                        // 衝突
                        enemy.element.remove();
                        gameState.enemies.splice(i, 1);
                        gameState.lives--;
                        updateUI();
                        if (gameState.lives <= 0) {
                            gameOver();
                        }
                    }
                }
            }

            function updateUI() {
                scoreValue.textContent = gameState.score;
                livesValue.textContent = gameState.lives;
            }

            function gameOver() {
                gameState.isPlaying = false;
                finalScore.textContent = `最終スコア: ${gameState.score}`;
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'flex';
            }

            // タッチ操作
            let touchStartX = 0;
            let touchStartY = 0;
            let isTouching = false;

            gameBoard.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isTouching = true;
                
                // 弾を発射
                if (gameState.isPlaying) {
                    shootBullet();
                }
            });

            gameBoard.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isTouching || !gameState.isPlaying) return;
                
                const touchX = e.touches[0].clientX;
                const deltaX = touchX - touchStartX;
                
                // 海賊船の移動
                gameState.shipPosition = Math.max(10, Math.min(90, gameState.shipPosition + deltaX / 10));
                ship.style.left = `${gameState.shipPosition}%`;
                
                touchStartX = touchX;
            });

            gameBoard.addEventListener('touchend', () => {
                isTouching = false;
            });

            // マウス操作
            gameBoard.addEventListener('mousedown', (e) => {
                if (!gameState.isPlaying) return;
                const rect = gameBoard.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                gameState.shipPosition = Math.max(10, Math.min(90, x));
                ship.style.left = `${gameState.shipPosition}%`;
                
                // 弾を発射
                shootBullet();
            });

            gameBoard.addEventListener('mousemove', (e) => {
                if (!gameState.isPlaying) return;
                const rect = gameBoard.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                gameState.shipPosition = Math.max(10, Math.min(90, x));
                ship.style.left = `${gameState.shipPosition}%`;
            });

            // 弾の発射
            function shootBullet() {
                const bullet = document.createElement('div');
                bullet.className = 'bullet';
                bullet.textContent = '🔥';
                bullet.style.left = `${gameState.shipPosition}%`;
                bullet.style.bottom = '100px';
                gameBoard.appendChild(bullet);
                
                gameState.bullets.push({
                    element: bullet,
                    x: gameState.shipPosition,
                    y: gameBoard.offsetHeight - 100
                });
            }

            // 初期位置設定
            ship.style.left = '50%';
        });
    </script>
</body>
</html>
