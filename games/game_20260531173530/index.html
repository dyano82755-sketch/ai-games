<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レトロ・アイスクライマー DX</title>
<style>
  :root {
    --ink: #f6e8b4;
    --muted: #b7a878;
    --bg: #050910;
    --panel: #111827;
    --panel-2: #1d2b3a;
    --line: #f0d878;
    --gold: #f6c945;
    --red: #df5142;
    --blue: #45a4e8;
    --ice: #a0e6ff;
    --cloud: #ffffff;
    --shadow: rgba(0, 0, 0, 0.42);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; touch-action: none; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SFMono-Regular", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .app {
    width: min(800px, 100%);
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    padding: 8px;
  }

  .hud, .controls {
    border: 2px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    padding: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat {
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--muted);
  }

  .stat span { font-size: 0.7rem; color: var(--muted); display: block; }
  .stat b { font-size: 1.2rem; }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border: 2px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: linear-gradient(180deg, #1a2a40 0%, #050910 100%);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
  }

  .dpad, .action-pad {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    width: 60px;
    height: 60px;
    border: 2px solid var(--line);
    border-radius: 50%;
    background: linear-gradient(180deg, #2c3e52, #162334);
    color: var(--ink);
    font-size: 1.5rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.5);
    user-select: none;
  }
  .btn:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 rgba(0,0,0,0);
  }
  .btn.jump {
    background: linear-gradient(180deg, #df5142, #8b2d23);
    width: 80px;
    border-radius: 12px;
  }

  #message {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border: 2px solid var(--line);
    text-align: center;
    border-radius: 8px;
    display: block;
    z-index: 10;
  }

  #msgTitle { margin: 0 0 10px 0; font-size: 1.8rem; color: var(--gold); }
  #msgSub { color: var(--ice); font-size: 0.9rem; margin-bottom: 20px;}
</style>
</head>
<body>

<div class="app">
  <div class="hud">
    <div class="stat"><span>SCORE</span><b id="scoreDisplay">0</b></div>
    <div class="stat"><span>FLOOR</span><b id="floorDisplay">1</b></div>
  </div>

  <div class="screen">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="message">
      <h2 id="msgTitle">ICE CLIMBER DX</h2>
      <div id="msgSub">左右移動: Arrow / ボタン<br>ジャンプ: Space / JUMP</div>
      <button class="btn jump" onclick="startGame()" style="font-size:1rem; height:40px;">START</button>
    </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="btn" id="btnLeft">◀</button>
      <button class="btn" id="btnRight">▶</button>
    </div>
    <div style="text-align:center; font-size:0.8rem; color:var(--muted)">滑る氷に注意！<br>頂上のコンドルを狙え</div>
    <div class="action-pad">
      <button class="btn jump" id="btnJump">JUMP</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 遊びやすく調整した物理演算定数 ---
const GRAVITY = 0.35;
const JUMP_FORCE = -8.5;  // ジャンプ力を少し上げて余裕を持たせた
const MAX_SPEED = 3.5;    // 少しだけ移動を速く
const ACCEL = 0.4;        // 歩き出しを機敏に（元0.25）
const FRICTION = 0.85;    // ツルツル滑りすぎないように摩擦を強化（元0.96）
const AIR_CONTROL = 0.25; // 空中でもかなり左右に動けるように緩和（元0.05）
const TILE_SIZE = 32;

// 階層設定
const MOUNTAIN_FLOORS = 8; // 氷の山
const BONUS_FLOORS = 4;    // 雲のボーナスステージ
const TOTAL_FLOORS = MOUNTAIN_FLOORS + BONUS_FLOORS;
const FLOOR_HEIGHT = 100;

let state = {
  running: false,
  score: 0,
  cameraY: 0,
  maxFloorReached: 1,
  keys: { left: false, right: false, jump: false },
  frame: 0
};

let player = { x: 200, y: 0, vx: 0, vy: 0, width: 24, height: 32, isGrounded: false, dir: 1 };
let blocks = [];
let particles = [];
let enemies = []; 
let birds = [];   
let condor = null;

function generateMap() {
  blocks = [];
  enemies = [];
  birds = [];
  condor = null;
  
  const groundY = 560;
  player.y = groundY - player.height;
  player.x = canvas.width / 2;
  player.vx = 0;
  player.vy = 0;
  state.cameraY = 0;

  for (let floor = 0; floor <= TOTAL_FLOORS; floor++) {
    const floorY = groundY - (floor * FLOOR_HEIGHT);
    const isBonus = floor >= MOUNTAIN_FLOORS;
    
    // 穴の位置を決定
    const gapStart = Math.floor(Math.random() * 8) + 1;
    
    // --- 難易度緩和：序盤の穴を小さくする ---
    let gapWidth = 1; 
    if (floor >= 4) gapWidth = 2; // 4階から穴が2マスに
    if (floor >= 6) gapWidth = Math.floor(Math.random() * 2) + 2; // 上層はランダム

    for (let i = 0; i < Math.ceil(canvas.width / TILE_SIZE); i++) {
      // 0階（最下層）は穴なし。それ以外は穴を空ける。
      if (floor > 0 && i >= gapStart && i < gapStart + gapWidth) {
         if (isBonus && Math.random() > 0.5) continue;
         if (!isBonus) continue;
      }
      
      blocks.push({
        x: i * TILE_SIZE,
        y: floorY,
        width: TILE_SIZE,
        height: 16,
        type: isBonus ? 'cloud' : 'breakable'
      });
    }

    // 敵の配置 (難易度緩和：3階から出現させ、速度を遅くする)
    if (floor >= 3 && floor < MOUNTAIN_FLOORS && Math.random() > 0.3) {
      enemies.push({
        x: (gapStart > 6 ? 2 : 10) * TILE_SIZE,
        y: floorY - 24,
        vx: gapStart > 6 ? 1.0 : -1.0, // 元1.5から遅くした
        width: 28,
        height: 24,
        type: 'topi',
        state: 'walk'
      });
    }

    // 鳥の配置 (難易度緩和：5階から出現させる)
    if (floor >= 5 && Math.random() > 0.5) {
      birds.push({
        x: Math.random() > 0.5 ? 0 : canvas.width,
        y: floorY - 50,
        baseY: floorY - 50,
        vx: Math.random() > 0.5 ? 1.5 : -1.5, // 少し遅くした
        width: 24,
        height: 16,
        time: Math.random() * 100
      });
    }
  }

  // 頂上のコンドル
  condor = {
    x: 0,
    y: groundY - (TOTAL_FLOORS * FLOOR_HEIGHT) - 80,
    width: 60,
    height: 40,
    vx: 3,
    time: 0
  };
}

function startGame() {
  document.getElementById('message').style.display = 'none';
  state.score = 0;
  state.maxFloorReached = 1;
  state.frame = 0;
  updateScore();
  generateMap();
  state.running = true;
  requestAnimationFrame(gameLoop);
}

function gameOver(isClear = false) {
  state.running = false;
  document.getElementById('msgTitle').innerText = isClear ? "STAGE CLEAR!" : "GAME OVER";
  document.getElementById('msgTitle').style.color = isClear ? "var(--gold)" : "var(--red)";
  document.getElementById('message').style.display = 'block';
}

function updateScore() {
  document.getElementById('scoreDisplay').innerText = state.score;
  document.getElementById('floorDisplay').innerText = state.maxFloorReached;
}

function createParticles(x, y, isCloud) {
  const color = isCloud ? '#ffffff' : '#a0e6ff';
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1) * 6,
      life: 25,
      color: color
    });
  }
}

// 矩形交差判定
function rectIntersect(r1, r2) {
  return !(r2.x >= r1.x + r1.width || 
           r2.x + r2.width <= r1.x || 
           r2.y >= r1.y + r1.height || 
           r2.y + r2.height <= r1.y);
}

function update() {
  if (!state.running) return;
  state.frame++;

  // --- プレイヤーの物理演算 ---
  const currentAccel = player.isGrounded ? ACCEL : AIR_CONTROL;
  
  if (state.keys.left) {
    player.vx -= currentAccel;
    player.dir = -1;
  } else if (state.keys.right) {
    player.vx += currentAccel;
    player.dir = 1;
  } else {
    // 摩擦
    if (player.isGrounded) {
      const isCloudFloor = state.maxFloorReached > MOUNTAIN_FLOORS;
      player.vx *= (isCloudFloor ? 0.7 : FRICTION);
    } else {
       // 空中でもボタンを離せば少しだけ減速する（遊びやすさアップ）
       player.vx *= 0.98;
    }
  }

  if (player.vx > MAX_SPEED) player.vx = MAX_SPEED;
  if (player.vx < -MAX_SPEED) player.vx = -MAX_SPEED;

  player.x += player.vx;
  if (player.x < -player.width) player.x = canvas.width;
  if (player.x > canvas.width) player.x = -player.width;

  player.vy += GRAVITY;
  player.y += player.vy;
  player.isGrounded = false;

  // --- 衝突判定 ---
  for (let i = blocks.length - 1; i >= 0; i--) {
    let b = blocks[i];
    
    if (rectIntersect(player, b)) {
      // 上から乗った場合
      if (player.vy > 0 && player.y + player.height - player.vy <= b.y + 10) {
        player.y = b.y - player.height;
        player.vy = 0;
        player.isGrounded = true;
      } 
      // 下から突き上げた場合（当たり判定を少し広くして割りやすくした）
      else if (player.vy < 0 && player.y - player.vy >= b.y + b.height - 14) {
        player.y = b.y + b.height;
        player.vy = 1; 
        
        if (b.type === 'breakable') {
          createParticles(b.x + b.width/2, b.y + b.height/2, false);
          blocks.splice(i, 1);
          state.score += 10;
          updateScore();
        } else if (b.type === 'cloud') {
           player.vy = 2;
        }
      }
    }
  }

  // --- トッピー（敵）のブロック修復AI ---
  enemies.forEach(e => {
    e.x += e.vx;
    
    if (e.x < 0 || e.x + e.width > canvas.width) {
       e.vx *= -1;
    }

    const checkX = e.vx > 0 ? e.x + e.width + 5 : e.x - 5;
    const blockUnder = blocks.find(b => 
       b.y === e.y + e.height && 
       checkX >= b.x && checkX <= b.x + b.width
    );

    if (!blockUnder) {
        const gridX = Math.floor(checkX / TILE_SIZE) * TILE_SIZE;
        if (!blocks.some(b => b.x === gridX && b.y === e.y + e.height)) {
            blocks.push({
                x: gridX,
                y: e.y + e.height,
                width: TILE_SIZE,
                height: 16,
                type: 'breakable'
            });
            createParticles(gridX + 16, e.y + e.height + 8, false);
        }
        e.vx *= -1;
    }

    if (rectIntersect(player, e)) gameOver();
  });

  // --- ニットピッカー（鳥）の挙動 ---
  birds.forEach(b => {
    b.time += 0.05;
    b.x += b.vx;
    b.y = b.baseY + Math.sin(b.time) * 30; 

    if (b.x < -50) b.x = canvas.width + 20;
    if (b.x > canvas.width + 50) b.x = -20;

    if (rectIntersect(player, b)) gameOver();
  });

  // --- コンドルの挙動 ---
  if (condor) {
      condor.time += 0.03;
      condor.x += condor.vx;
      condor.y += Math.sin(condor.time) * 1.5;
      
      if (condor.x < 50 || condor.x > canvas.width - 50 - condor.width) condor.vx *= -1;

      if (rectIntersect(player, condor)) {
          state.score += 3000;
          updateScore();
          gameOver(true);
      }
  }

  // --- パーティクル ---
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += GRAVITY;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // --- カメラと階層の進行 ---
  const targetCameraY = 400 - player.y;
  if (targetCameraY > state.cameraY) {
    state.cameraY += (targetCameraY - state.cameraY) * 0.15;
  }

  const currentFloor = Math.floor((560 - player.y) / FLOOR_HEIGHT) + 1;
  if (currentFloor > state.maxFloorReached) {
    state.maxFloorReached = currentFloor;
    state.score += (currentFloor > MOUNTAIN_FLOORS) ? 50 : 20;
    updateScore();
  }

  if (player.y > 600 - state.cameraY + 50) {
    gameOver();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.save();
  ctx.translate(0, state.cameraY);

  // 山のシルエット
  ctx.fillStyle = '#0a1526';
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 560 - (TOTAL_FLOORS * FLOOR_HEIGHT) - 200);
  ctx.lineTo(canvas.width + 100, 600);
  ctx.lineTo(-100, 600);
  ctx.fill();

  // ブロック
  blocks.forEach(b => {
    if (b.type === 'breakable') {
      ctx.fillStyle = 'var(--ice)'; 
      ctx.fillRect(b.x, b.y, b.width, b.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x, b.y, b.width, 2); 
      ctx.strokeStyle = 'var(--blue)';
      ctx.strokeRect(b.x, b.y, b.width, b.height);
    } else {
      ctx.fillStyle = 'var(--cloud)';
      ctx.beginPath();
      ctx.arc(b.x + 8, b.y + 8, 8, 0, Math.PI*2);
      ctx.arc(b.x + b.width - 8, b.y + 8, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillRect(b.x + 8, b.y, b.width - 16, 16);
    }
  });

  // 敵
  enemies.forEach(e => {
    const walkAnim = (Math.floor(state.frame / 8) % 2 === 0) ? 2 : 0;
    ctx.fillStyle = 'var(--muted)';
    ctx.fillRect(e.x, e.y + walkAnim, e.width, e.height - walkAnim);
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + (e.vx > 0 ? 18 : 6), e.y + 6 + walkAnim, 4, 4);
  });

  // 鳥
  birds.forEach(b => {
    const flap = (Math.floor(state.frame / 5) % 2 === 0);
    ctx.fillStyle = 'var(--red)';
    ctx.beginPath();
    ctx.arc(b.x + b.width/2, b.y + b.height/2, b.height/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff8888';
    if (flap) {
        ctx.fillRect(b.x + 4, b.y - 8, 16, 8);
    } else {
        ctx.fillRect(b.x + 4, b.y + b.height, 16, 8);
    }
  });

  // コンドル
  if (condor) {
      const flap = (Math.floor(state.frame / 10) % 2 === 0);
      ctx.fillStyle = '#d89b42';
      ctx.fillRect(condor.x + 10, condor.y + 10, 40, 20);
      ctx.fillStyle = 'var(--cloud)';
      if (flap) {
          ctx.fillRect(condor.x, condor.y, 60, 10);
      } else {
          ctx.fillRect(condor.x, condor.y + 30, 60, 10);
      }
      ctx.fillStyle = 'var(--red)';
      ctx.fillRect(condor.x + (condor.vx > 0 ? 50 : 0), condor.y + 10, 10, 10);
  }

  // プレイヤー
  ctx.fillStyle = 'var(--blue)'; 
  ctx.fillRect(player.x, player.y, player.width, player.height);
  ctx.fillStyle = '#ffccaa';
  ctx.fillRect(player.x + (player.dir > 0 ? 12 : 4), player.y + 8, 8, 8);
  ctx.fillStyle = 'var(--red)';
  ctx.fillRect(player.x + (player.dir > 0 ? 18 : -2), player.y + (player.isGrounded ? 16 : 4), 8, 14);

  // パーティクル
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 25;
    ctx.fillRect(p.x, p.y, 4, 4);
  });
  ctx.globalAlpha = 1.0;

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  if (state.running) requestAnimationFrame(gameLoop);
}

// --- 入力制御 ---
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft') state.keys.left = true;
  if (e.code === 'ArrowRight') state.keys.right = true;
  if (e.code === 'Space' && player.isGrounded) { 
      state.keys.jump = true; 
      player.vy = JUMP_FORCE; 
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft') state.keys.left = false;
  if (e.code === 'ArrowRight') state.keys.right = false;
  if (e.code === 'Space') state.keys.jump = false;
});

// スマホ用ボタン制御
const bindBtn = (id, key) => {
  const btn = document.getElementById(id);
  const press = (e) => { 
      e.preventDefault(); 
      if (key === 'jump' && player.isGrounded) { 
          player.vy = JUMP_FORCE; 
      } 
      state.keys[key] = true; 
  };
  const release = (e) => { 
      e.preventDefault(); 
      state.keys[key] = false; 
  };
  btn.addEventListener('touchstart', press, {passive: false});
  btn.addEventListener('touchend', release, {passive: false});
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
};

bindBtn('btnLeft', 'left');
bindBtn('btnRight', 'right');
bindBtn('btnJump', 'jump');

// --- 初期表示のセットアップ ---
document.getElementById('message').style.display = 'block';
generateMap(); 
draw();
</script>
</body>
</html>
