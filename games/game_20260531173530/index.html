<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>アイスクライマー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(to bottom, #0066cc, #003366);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }
        
        /* スタート画面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        
        #start-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
            animation: pulse 1.5s infinite;
        }
        
        #start-screen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }
        
        #start-button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        #start-button:hover {
            background: #ff3333;
            transform: scale(1.05);
        }
        
        /* ゲーム画面 */
        #game-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        #game-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            z-index: 5;
        }
        
        #score, #level {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        #game-board {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1px;
            background: #000;
        }
        
        .ice-block {
            background: #00aaff;
            border-radius: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            animation: ice-fade 2s infinite;
        }
        
        .player {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            z-index: 3;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        
        .goal {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffff00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            z-index: 2;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.7);
        }
        
        /* ゲームオーバー画面 */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        
        #game-over-screen h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        
        #final-score {
            font-size: 1.8rem;
            margin-bottom: 30px;
        }
        
        #restart-button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        
        #restart-button:hover {
            background: #33ff33;
            transform: scale(1.05);
        }
        
        /* アニメーション */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes ice-fade {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        /* タッチ操作用のヒント */
        #touch-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        /* レスポンシブ対応 */
        @media (max-width: 500px) {
            #game-container {
                height: 90vh;
            }
            
            #start-screen h1 {
                font-size: 2rem;
            }
            
            #start-screen p {
                font-size: 1rem;
                padding: 0 10px;
            }
            
            #start-button {
                padding: 12px 30px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- スタート画面 -->
        <div id="start-screen">
            <h1>アイスクライマー</h1>
            <p>アイスクリムの上を登ってゴールを目指そう！<br>タッチ操作で移動し、氷の上を登ってゴールを目指せ！</p>
            <button id="start-button">スタート</button>
        </div>
        
        <!-- ゲーム画面 -->
        <div id="game-screen">
            <div id="game-header">
                <div id="score">スコア: 0</div>
                <div id="level">レベル: 1</div>
            </div>
            <div id="game-board"></div>
            <div id="touch-hint">タッチで移動</div>
        </div>
        
        <!-- ゲームオーバー画面 -->
        <div id="game-over-screen">
            <h2>ゲームオーバー</h2>
            <div id="final-score">スコア: 0</div>
            <button id="restart-button">リスタート</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲーム状態管理
            const gameState = {
                isPlaying: false,
                score: 0,
                level: 1,
                playerX: 5,
                playerY: 14,
                goalX: 5,
                goalY: 0,
                iceBlocks: [],
                gameBoard: null,
                gameContainer: document.getElementById('game-container'),
                gameBoardElement: document.getElementById('game-board'),
                scoreElement: document.getElementById('score'),
                levelElement: document.getElementById('level'),
                finalScoreElement: document.getElementById('final-score'),
                startScreen: document.getElementById('start-screen'),
                gameScreen: document.getElementById('game-screen'),
                gameOverScreen: document.getElementById('game-over-screen'),
                startButton: document.getElementById('start-button'),
                restartButton: document.getElementById('restart-button')
            };
            
            // ゲーム初期化
            function initGame() {
                // ゲームボード初期化
                gameState.gameBoardElement.innerHTML = '';
                
                // プレイヤー初期位置
                gameState.playerX = 5;
                gameState.playerY = 14;
                
                // ゴール位置
                gameState.goalX = Math.floor(Math.random() * 10);
                gameState.goalY = 0;
                
                // レベルに応じて氷のブロックを生成
                generateIceBlocks();
                
                // プレイヤーとゴールを描画
                renderPlayer();
                renderGoal();
                
                // スコアとレベル更新
                updateScore();
            }
            
            // 氷のブロックを生成
            function generateIceBlocks() {
                gameState.iceBlocks = [];
                const blockCount = 30 + (gameState.level * 5);
                
                for (let i = 0; i < blockCount; i++) {
                    let x, y;
                    let validPosition = false;
                    
                    // 重複しない位置を確保
                    while (!validPosition) {
                        x = Math.floor(Math.random() * 10);
                        y = Math.floor(Math.random() * 15);
                        
                        // プレイヤーの位置とゴールの位置は除外
                        if ((x === gameState.playerX && y === gameState.playerY) || 
                            (x === gameState.goalX && y === gameState.goalY)) {
                            continue;
                        }
                        
                        // 他のブロックと重複しないか確認
                        let overlap = false;
                        for (const block of gameState.iceBlocks) {
                            if (block.x === x && block.y === y) {
                                overlap = true;
                                break;
                            }
                        }
                        
                        if (!overlap) {
                            validPosition = true;
                            gameState.iceBlocks.push({ x, y });
                        }
                    }
                }
                
                // ブロックを描画
                renderIceBlocks();
            }
            
            // 氷のブロックを描画
            function renderIceBlocks() {
                gameState.gameBoardElement.innerHTML = '';
                
                // ゲームボードの初期化
                for (let y = 0; y < 15; y++) {
                    for (let x = 0; x < 10; x++) {
                        const cell = document.createElement('div');
                        cell.style.gridRow = y + 1;
                        cell.style.gridColumn = x + 1;
                        gameState.gameBoardElement.appendChild(cell);
                    }
                }
                
                // 氷のブロックを描画
                for (const block of gameState.iceBlocks) {
                    const blockElement = document.createElement('div');
                    blockElement.className = 'ice-block';
                    blockElement.style.gridRow = block.y + 1;
                    blockElement.style.gridColumn = block.x + 1;
                    blockElement.textContent = '❄️';
                    gameState.gameBoardElement.appendChild(blockElement);
                }
            }
            
            // プレイヤーを描画
            function renderPlayer() {
                // 既存のプレイヤーを削除
                const existingPlayer = document.querySelector('.player');
                if (existingPlayer) existingPlayer.remove();
                
                // 新しいプレイヤーを追加
                const playerElement = document.createElement('div');
                playerElement.className = 'player';
                playerElement.style.left = (gameState.playerX * (100 / 10)) + '%';
                playerElement.style.top = (gameState.playerY * (100 / 15)) + '%';
                playerElement.textContent = '👨';
                gameState.gameBoardElement.appendChild(playerElement);
            }
            
            // ゴールを描画
            function renderGoal() {
                // 既存のゴールを削除
                const existingGoal = document.querySelector('.goal');
                if (existingGoal) existingGoal.remove();
                
                // 新しいゴールを追加
                const goalElement = document.createElement('div');
                goalElement.className = 'goal';
                goalElement.style.left = (gameState.goalX * (100 / 10)) + '%';
                goalElement.style.top = (gameState.goalY * (100 / 15)) + '%';
                goalElement.textContent = '🏁';
                gameState.gameBoardElement.appendChild(goalElement);
            }
            
            // スコアとレベルを更新
            function updateScore() {
                gameState.scoreElement.textContent = `スコア: ${gameState.score}`;
                gameState.levelElement.textContent = `レベル: ${gameState.level}`;
            }
            
            // ゲームオーバー処理
            function gameOver() {
                gameState.isPlaying = false;
                gameState.finalScoreElement.textContent = `スコア: ${gameState.score}`;
                gameState.gameOverScreen.style.display = 'flex';
            }
            
            // ゲームクリア処理
            function gameClear() {
                gameState.score += 100 * gameState.level;
                gameState.level++;
                gameState.scoreElement.textContent = `スコア: ${gameState.score}`;
                gameState.levelElement.textContent = `レベル: ${gameState.level}`;
                
                // 次のレベルへ
                setTimeout(() => {
                    initGame();
                }, 1000);
            }
            
            // プレイヤーの移動
            function movePlayer(dx, dy) {
                if (!gameState.isPlaying) return;
                
                const newX = gameState.playerX + dx;
                const newY = gameState.playerY + dy;
                
                // ゲーム領域外の移動を禁止
                if (newX < 0 || newX >= 10 || newY < 0 || newY >= 15) {
                    return;
                }
                
                // 氷のブロックとの衝突判定
                for (const block of gameState.iceBlocks) {
                    if (block.x === newX && block.y === newY) {
                        return; // 衝突した場合は移動しない
                    }
                }
                
                // 移動
                gameState.playerX = newX;
                gameState.playerY = newY;
                renderPlayer();
                
                // ゴールに到達したか判定
                if (gameState.playerX === gameState.goalX && gameState.playerY === gameState.goalY) {
                    gameClear();
                }
            }
            
            // タッチ操作対応
            let touchStartX = 0;
            let touchStartY = 0;
            
            gameState.gameBoardElement.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            });
            
            gameState.gameBoardElement.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!gameState.isPlaying) return;
                
                const touch = e.touches[0];
                const diffX = touch.clientX - touchStartX;
                const diffY = touch.clientY - touchStartY;
                
                // 移動量に応じて方向を判定
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 0) {
                        movePlayer(1, 0); // 右
                    } else {
                        movePlayer(-1, 0); // 左
                    }
                } else {
                    if (diffY > 0) {
                        movePlayer(0, 1); // 下
                    } else {
                        movePlayer(0, -1); // 上
                    }
                }
                
                // 移動量をリセット
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            });
            
            // マウス操作対応
            gameState.gameBoardElement.addEventListener('mousedown', (e) => {
                if (!gameState.isPlaying) return;
                
                const rect = gameState.gameBoardElement.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const cellWidth = rect.width / 10;
                const cellHeight = rect.height / 15;
                
                const gridX = Math.floor(x / cellWidth);
                const gridY = Math.floor(y / cellHeight);
                
                // プレイヤーの位置から移動方向を計算
                const dx = gridX - gameState.playerX;
                const dy = gridY - gameState.playerY;
                
                // 1マスだけ移動
                if (Math.abs(dx) > Math.abs(dy)) {
                    movePlayer(dx > 0 ? 1 : -1, 0);
                } else {
                    movePlayer(0, dy > 0 ? 1 : -1);
                }
            });
            
            // スタートボタン
            gameState.startButton.addEventListener('click', () => {
                gameState.startScreen.style.display = 'none';
                gameState.gameScreen.style.display = 'block';
                gameState.isPlaying = true;
                initGame();
            });
            
            // リスタートボタン
            gameState.restartButton.addEventListener('click', () => {
                gameState.gameOverScreen.style.display = 'none';
                gameState.isPlaying = true;
                gameState.score = 0;
                gameState.level = 1;
                initGame();
            });
            
            // キーボード操作対応
            document.addEventListener('keydown', (e) => {
                if (!gameState.isPlaying) return;
                
                switch (e.key) {
                    case 'ArrowUp':
                        movePlayer(0, -1);
                        break;
                    case 'ArrowDown':
                        movePlayer(0, 1);
                        break;
                    case 'ArrowLeft':
                        movePlayer(-1, 0);
                        break;
                    case 'ArrowRight':
                        movePlayer(1, 0);
                        break;
                }
            });
        });
    </script>
</body>
</html>
