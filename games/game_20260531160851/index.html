<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>マイクラ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* スタート画面 */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #start-screen h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
            animation: pulse 2s infinite;
        }

        #start-screen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.6;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }

        /* ゲーム画面 */
        #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        #game-header {
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
        }

        #score, #level {
            font-size: 1.2rem;
            font-weight: bold;
        }

        #game-board {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 2px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .block {
            background: #8B4513;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .block:hover {
            transform: scale(1.05);
        }

        .block.dirt { background: #8B4513; }
        .block.grass { background: #4CAF50; }
        .block.stone { background: #9E9E9E; }
        .block.wood { background: #795548; }
        .block.water { background: #2196F3; }
        .block.sand { background: #FFD54F; }
        .block.coal { background: #424242; }
        .block.iron { background: #B0BEC5; }
        .block.diamond { background: #00BCD4; }
        .block.lava { background: #F44336; }

        /* ゲームオーバー画面 */
        #game-over-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #game-over-screen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #f44336;
            text-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }

        #final-score {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        #restart-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(to bottom, #2196F3, #0D47A1);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.4);
        }

        /* アニメーション */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* タッチ用のヒットエリア */
        .block {
            min-height: 30px;
            min-width: 30px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 600px) {
            #start-screen h1 {
                font-size: 2rem;
            }
            
            #game-header {
                padding: 10px;
            }
            
            #game-board {
                padding: 5px;
            }
            
            .block {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- スタート画面 -->
        <div id="start-screen">
            <h1>🎮 マイクラ</h1>
            <p>タップしてブロックを破壊しよう！<br>同じ色のブロックを3つ以上つなげるとスコアが獲得できます。</p>
            <button id="start-btn">スタート</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen">
            <div id="game-header">
                <div id="score">スコア: 0</div>
                <div id="level">レベル: 1</div>
            </div>
            <div id="game-board"></div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="game-over-screen">
            <h2>ゲームオーバー</h2>
            <div id="final-score">最終スコア: 0</div>
            <button id="restart-btn">再挑戦</button>
        </div>
    </div>

    <script>
        // ゲーム状態管理
        const gameState = {
            score: 0,
            level: 1,
            board: [],
            isPlaying: false,
            gameBoard: document.getElementById('game-board'),
            scoreElement: document.getElementById('score'),
            levelElement: document.getElementById('level'),
            finalScoreElement: document.getElementById('final-score')
        };

        // ブロックの種類と絵文字
        const blockTypes = [
            { type: 'dirt', emoji: '🟫', points: 10 },
            { type: 'grass', emoji: '🟩', points: 15 },
            { type: 'stone', emoji: '⬜', points: 20 },
            { type: 'wood', emoji: '🟫', points: 25 },
            { type: 'water', emoji: '🟦', points: 30 },
            { type: 'sand', emoji: '🟨', points: 35 },
            { type: 'coal', emoji: '⚫', points: 40 },
            { type: 'iron', emoji: '⚪', points: 50 },
            { type: 'diamond', emoji: '🔷', points: 100 },
            { type: 'lava', emoji: '🔴', points: 150 }
        ];

        // ゲーム初期化
        function initGame() {
            gameState.board = [];
            gameState.score = 0;
            gameState.level = 1;
            updateScore();
            
            // ゲームボード作成
            gameState.gameBoard.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const block = document.createElement('div');
                block.className = 'block';
                block.dataset.index = i;
                block.addEventListener('click', handleBlockClick);
                block.addEventListener('touchstart', handleBlockClick);
                gameState.gameBoard.appendChild(block);
            }
            
            // ランダムにブロックを配置
            updateBoard();
        }

        // ボード更新
        function updateBoard() {
            const blocks = document.querySelectorAll('.block');
            blocks.forEach((block, index) => {
                const randomType = blockTypes[Math.floor(Math.random() * blockTypes.length)];
                block.textContent = randomType.emoji;
                block.className = 'block ' + randomType.type;
                block.dataset.type = randomType.type;
                block.dataset.points = randomType.points;
            });
        }

        // ブロッククリック処理
        function handleBlockClick(event) {
            if (!gameState.isPlaying) return;
            
            const block = event.target;
            const blockType = block.dataset.type;
            const points = parseInt(block.dataset.points);
            
            // ブロックを消す
            block.style.opacity = '0';
            block.style.transform = 'scale(0)';
            
            // スコア加算
            gameState.score += points;
            updateScore();
            
            // 一定スコアでレベルアップ
            if (gameState.score >= gameState.level * 1000) {
                gameState.level++;
                updateScore();
            }
            
            // 一定時間後に新しいブロックを生成
            setTimeout(() => {
                const randomType = blockTypes[Math.floor(Math.random() * blockTypes.length)];
                block.textContent = randomType.emoji;
                block.className = 'block ' + randomType.type;
                block.dataset.type = randomType.type;
                block.dataset.points = randomType.points;
                block.style.opacity = '1';
                block.style.transform = 'scale(1)';
            }, 200);
        }

        // スコア更新
        function updateScore() {
            gameState.scoreElement.textContent = `スコア: ${gameState.score}`;
            gameState.levelElement.textContent = `レベル: ${gameState.level}`;
        }

        // ゲーム開始
        function startGame() {
            gameState.isPlaying = true;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            initGame();
        }

        // ゲームオーバー
        function gameOver() {
            gameState.isPlaying = false;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'flex';
            gameState.finalScoreElement.textContent = `最終スコア: ${gameState.score}`;
        }

        // 再挑戦
        function restartGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        }

        // イベントリスナー
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', restartGame);

        // 一定時間ごとにゲームを終了（デモ用）
        setTimeout(() => {
            if (gameState.isPlaying) {
                gameOver();
            }
        }, 60000); // 60秒後にゲーム終了
    </script>
</body>
</html>
