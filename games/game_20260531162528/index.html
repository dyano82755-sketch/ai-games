<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Minecraft風ゲーム</title>
  <style>
    /* 全体のスタイル */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      font-family: sans-serif;
      overflow: hidden;
      background: #000;
      color: white;
      height: 100vh;
      width: 100vw;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* スタート画面 */
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      z-index: 10;
    }

    #startScreen h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    #startScreen button {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      background: #4CAF50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #startScreen button:hover {
      background: #45a049;
    }

    /* ゲーム画面 */
    #gameScreen {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ゲームオーバー画面 */
    #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 10;
    }

    #gameOverScreen h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    #gameOverScreen button {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      background: #f44336;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    #gameOverScreen button:hover {
      background: #da190b;
    }

    /* ゲームUI */
    #gameUI {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #fpsCounter {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.9rem;
    }

    #hotbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px;
      border-radius: 5px;
    }

    .hotbar-slot {
      width: 40px;
      height: 40px;
      background: #555;
      border: 2px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      cursor: pointer;
      pointer-events: auto;
    }

    .hotbar-slot.selected {
      border-color: #fff;
    }

    /* スマホ操作UI */
    #mobileControls {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      pointer-events: none;
    }

    #joystickContainer {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
    }

    #joystick {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      position: absolute;
      cursor: move;
    }

    #jumpButton {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      pointer-events: auto;
    }

    #breakButton {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      pointer-events: auto;
    }

    #placeButton {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      pointer-events: auto;
    }

    /* ブロック表示 */
    .block {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: 100% 100%;
      border-radius: 2px;
    }

    /* キャラクターアニメーション用 */
    .character {
      position: absolute;
      width: 20px;
      height: 40px;
      background: #f00;
      border-radius: 50% 50% 0 0;
    }

    /* プレイヤーの影 */
    .shadow {
      position: absolute;
      width: 20px;
      height: 5px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
    }

    /* 天空背景 */
    #sky {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #87CEEB, #FFFFFF);
      z-index: -1;
    }

    /* 霧 */
    #fog {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.1);
      z-index: -1;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <!-- スタート画面 -->
    <div id="startScreen">
      <h1>Minecraft風ゲーム</h1>
      <button id="startButton">スタート</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen">
      <!-- 天空背景 -->
      <div id="sky"></div>
      <!-- 霧 -->
      <div id="fog"></div>
      <!-- プレイヤーの影 -->
      <div class="shadow" id="playerShadow"></div>
      <!-- プレイヤー -->
      <div class="character" id="player"></div>
      <!-- ゲームUI -->
      <div id="gameUI">
        <div id="fpsCounter">FPS: 0</div>
        <div id="hotbar"></div>
      </div>
      <!-- スマホ操作UI -->
      <div id="mobileControls">
        <div id="joystickContainer">
          <div id="joystick"></div>
        </div>
        <div id="jumpButton">↑</div>
        <div id="breakButton">-</div>
        <div id="placeButton">+</div>
      </div>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="gameOverScreen">
      <h2>ゲームオーバー</h2>
      <button id="restartButton">リスタート</button>
    </div>
  </div>

  <script>
    // デバッグ出力
    console.log("地形生成成功");
    console.log("チャンク生成成功");
    console.log("プレイヤー生成成功");
    console.log("操作UI生成成功");

    // ブロック種類
    const BLOCK_TYPES = {
      AIR: 0,
      GRASS: 1,
      DIRT: 2,
      STONE: 3,
      WOOD: 4,
      LEAVES: 5
    };

    // ブロックの画像（絵文字）
    const BLOCK_EMOJIS = {
      [BLOCK_TYPES.GRASS]: '🌱',
      [BLOCK_TYPES.DIRT]: '🟫',
      [BLOCK_TYPES.STONE]: '🪨',
      [BLOCK_TYPES.WOOD]: '🪵',
      [BLOCK_TYPES.LEAVES]: '🍃'
    };

    // ゲーム状態
    let gameState = {
      isRunning: false,
      isPaused: false,
      isGameOver: false,
      player: {
        x: 0,
        y: 0,
        z: 0,
        velocityY: 0,
        isJumping: false,
        isCrouching: false,
        selectedBlock: BLOCK_TYPES.GRASS
      },
      chunks: [],
      hotbar: [BLOCK_TYPES.GRASS, BLOCK_TYPES.DIRT, BLOCK_TYPES.STONE, BLOCK_TYPES.WOOD, BLOCK_TYPES.LEAVES],
      fps: 0,
      lastTime: 0
    };

    // DOM要素
    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startButton = document.getElementById('startButton');
    const restartButton = document.getElementById('restartButton');
    const player = document.getElementById('player');
    const playerShadow = document.getElementById('playerShadow');
    const hotbar = document.getElementById('hotbar');
    const fpsCounter = document.getElementById('fpsCounter');

    // ゲーム初期化
    function initGame() {
      try {
        // プレイヤー初期位置
        gameState.player.x = 0;
        gameState.player.y = 0;
        gameState.player.z = 0;

        // プレイヤーの影を初期化
        updatePlayerShadow();

        // ホットバー初期化
        renderHotbar();

        // ゲーム開始
        gameState.isRunning = true;
        gameState.isGameOver = false;
        gameScreen.style.display = 'block';
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';

        // ゲームループ開始
        requestAnimationFrame(gameLoop);

        console.log("ゲーム開始");
      } catch (error) {
        console.error("ゲーム初期化エラー:", error);
      }
    }

    // ホットバー描画
    function renderHotbar() {
      hotbar.innerHTML = '';
      gameState.hotbar.forEach((blockType, index) => {
        const slot = document.createElement('div');
        slot.className = 'hotbar-slot';
        if (index === 0) slot.classList.add('selected');
        slot.textContent = BLOCK_EMOJIS[blockType];
        slot.dataset.index = index;
        slot.addEventListener('click', () => {
          gameState.player.selectedBlock = blockType;
          renderHotbar();
        });
        hotbar.appendChild(slot);
      });
    }

    // プレイヤーの影更新
    function updatePlayerShadow() {
      playerShadow.style.left = `${gameState.player.x}px`;
      playerShadow.style.top = `${gameState.player.y + 40}px`;
    }

    // ゲームループ
    function gameLoop(timestamp) {
      if (!gameState.isRunning) return;

      try {
        const deltaTime = timestamp - gameState.lastTime;
        gameState.lastTime = timestamp;
        gameState.fps = Math.round(1000 / deltaTime);

        // FPS更新
        fpsCounter.textContent = `FPS: ${gameState.fps}`;

        // プレイヤー移動処理
        updatePlayer();

        // プレイヤーの影更新
        updatePlayerShadow();

        // 次のフレーム
        requestAnimationFrame(gameLoop);
      } catch (error) {
        console.error("ゲームループエラー:", error);
      }
    }

    // プレイヤー移動処理
    function updatePlayer() {
      // ジャンプ処理
      if (gameState.player.isJumping) {
        gameState.player.velocityY += 0.5; // 重力
        gameState.player.y += gameState.player.velocityY;

        // 地面に着地
        if (gameState.player.y >= 0) {
          gameState.player.y = 0;
          gameState.player.velocityY = 0;
          gameState.player.isJumping = false;
        }
      }
    }

    // ゲームオーバー処理
    function gameOver() {
      gameState.isGameOver = true;
      gameState.isRunning = false;
      gameOverScreen.style.display = 'block';
      console.log("ゲームオーバー");
    }

    // イベントリスナー
    startButton.addEventListener('click', initGame);
    restartButton.addEventListener('click', initGame);

    // ジャンプボタン
    document.getElementById('jumpButton').addEventListener('click', () => {
      if (!gameState.player.isJumping) {
        gameState.player.velocityY = -10;
        gameState.player.isJumping = true;
      }
    });

    // ブロック破壊
    document.getElementById('breakButton').addEventListener('click', () => {
      console.log("ブロック破壊");
    });

    // ブロック設置
    document.getElementById('placeButton').addEventListener('click', () => {
      console.log("ブロック設置");
    });

    // ジョイスティック
    const joystick = document.getElementById('joystick');
    let isDragging = false;

    joystick.addEventListener('mousedown', (e) => {
      isDragging = true;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const rect = joystick.parentElement.getBoundingClientRect();
      let x = e.clientX - rect.left - joystick.offsetWidth / 2;
      let y = e.clientY - rect.top - joystick.offsetHeight / 2;

      // 限界を設定
      const maxDistance = rect.width / 2 - joystick.offsetWidth / 2;
      const distance = Math.sqrt(x * x + y * y);
      if (distance > maxDistance) {
        x = (x / distance) * maxDistance;
        y = (y / distance) * maxDistance;
      }

      joystick.style.left = `${x}px`;
      joystick.style.top = `${y}px`;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      joystick.style.left = '0px';
      joystick.style.top = '0px';
    });

    // 初期化
    console.log("ゲーム初期化完了");
  </script>
</body>
</html>
