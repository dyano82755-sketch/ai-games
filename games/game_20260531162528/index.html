<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ボクセルたからハント</title>
<style>
  :root {
    --ink: #15202b;
    --muted: #5f6f7b;
    --panel: #fff8e7;
    --panel-strong: #ffe7a8;
    --line: #1a2b35;
    --sky-top: #70c9f4;
    --sky-low: #d8f8ff;
    --grass: #43b86d;
    --blue: #2477c7;
    --aqua: #24a7b9;
    --coral: #e65d51;
    --gold: #f3b73d;
    --violet: #7b62d9;
    --shadow: rgba(21, 32, 43, 0.24);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    min-height: 100dvh;
    color: var(--ink);
    background:
      linear-gradient(180deg, var(--sky-top), var(--sky-low) 58%, #a9df78 58%, #75bd58);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    overflow: hidden;
  }

  button {
    font: inherit;
    touch-action: manipulation;
  }

  .app {
    width: min(1280px, 100%);
    height: 100dvh;
    min-height: 100dvh;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    padding: 8px;
  }

  .hud,
  .play-area,
  .touch-pad,
  .modal-box {
    border: 2px solid rgba(26, 43, 53, 0.85);
    border-radius: 8px;
    box-shadow: 0 10px 24px var(--shadow);
  }

  .hud {
    min-height: 70px;
    display: grid;
    grid-template-columns: minmax(220px, 1fr) repeat(6, auto);
    gap: 8px;
    align-items: center;
    padding: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.18)),
      var(--panel);
  }

  .brand {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cube-mark {
    position: relative;
    width: 50px;
    height: 50px;
    flex: 0 0 auto;
  }

  .cube-mark span {
    position: absolute;
    inset: 10px 7px 6px;
    border: 2px solid var(--line);
    background: var(--aqua);
    transform: skewY(-16deg);
  }

  .cube-mark::before,
  .cube-mark::after {
    content: "";
    position: absolute;
    border: 2px solid var(--line);
  }

  .cube-mark::before {
    left: 11px;
    top: 3px;
    width: 31px;
    height: 18px;
    background: #75d9df;
    transform: skewX(-34deg);
  }

  .cube-mark::after {
    right: 0;
    top: 13px;
    width: 13px;
    height: 31px;
    background: #16889a;
    transform: skewY(32deg);
  }

  .brand-title {
    min-width: 0;
    display: grid;
    gap: 2px;
  }

  .brand-title strong {
    font-size: 1.22rem;
    line-height: 1.08;
  }

  .brand-title span {
    max-width: 100%;
    color: var(--muted);
    font-size: 0.84rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stat {
    min-width: 76px;
    min-height: 46px;
    display: grid;
    align-content: center;
    gap: 2px;
    padding: 5px 8px;
    text-align: center;
    border: 1px solid rgba(26, 43, 53, 0.18);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.54);
  }

  .stat span {
    color: var(--muted);
    font-size: 0.68rem;
    line-height: 1;
  }

  .stat b {
    font-size: 1.04rem;
    line-height: 1.1;
  }

  .icon-btn,
  .primary-btn {
    min-height: 44px;
    border: 2px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    background: linear-gradient(180deg, #ffffff, var(--panel-strong));
    cursor: pointer;
    font-weight: 860;
    box-shadow: 0 4px 0 rgba(26, 43, 53, 0.34);
  }

  .icon-btn {
    width: 46px;
    display: grid;
    place-items: center;
    font-size: 1.1rem;
  }

  .primary-btn {
    padding: 0 14px;
  }

  .primary-btn.play {
    color: #fff;
    background: linear-gradient(180deg, #58c98d, #258a57);
  }

  .icon-btn:active,
  .primary-btn:active,
  .pad-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(26, 43, 53, 0.34);
  }

  .play-area {
    position: relative;
    min-height: 0;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0) 42%),
      linear-gradient(180deg, #8fe7ff, #cef7ff 48%, #78c95d 48%, #5fad4e);
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 300px;
  }

  .message {
    position: absolute;
    left: 50%;
    bottom: 14px;
    width: min(680px, calc(100% - 24px));
    transform: translateX(-50%);
    display: grid;
    place-items: center;
    min-height: 42px;
    padding: 8px 12px;
    border: 2px solid rgba(26, 43, 53, 0.78);
    border-radius: 8px;
    color: var(--ink);
    background: rgba(255, 248, 231, 0.92);
    text-align: center;
    font-weight: 820;
    box-shadow: 0 8px 18px rgba(21, 32, 43, 0.2);
  }

  .touch-pad {
    display: grid;
    grid-template-columns: minmax(150px, 1fr) auto minmax(150px, 1fr);
    gap: 10px;
    align-items: center;
    min-height: 112px;
    padding: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.16)),
      #d6f2b4;
  }

  .mini-panel {
    min-width: 0;
    display: grid;
    gap: 5px;
    color: #253441;
    font-weight: 780;
    line-height: 1.28;
  }

  .mini-panel small {
    color: var(--muted);
    font-size: 0.78rem;
  }

  .dpad {
    width: 174px;
    height: 96px;
    display: grid;
    grid-template-columns: repeat(3, 54px);
    grid-template-rows: repeat(2, 44px);
    gap: 6px;
  }

  .pad-btn {
    border: 2px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, #ffffff, #cbeefa);
    color: var(--ink);
    cursor: pointer;
    font-size: 1.25rem;
    font-weight: 900;
    box-shadow: 0 4px 0 rgba(26, 43, 53, 0.32);
  }

  .pad-btn.up {
    grid-column: 2;
    grid-row: 1;
  }

  .pad-btn.left {
    grid-column: 1;
    grid-row: 2;
  }

  .pad-btn.down {
    grid-column: 2;
    grid-row: 2;
  }

  .pad-btn.right {
    grid-column: 3;
    grid-row: 2;
  }

  .progress {
    width: min(240px, 100%);
    justify-self: end;
    display: grid;
    gap: 6px;
  }

  .bar {
    width: 100%;
    height: 16px;
    overflow: hidden;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.58);
  }

  .bar span {
    display: block;
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--gold), var(--grass));
    transition: width 160ms ease;
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    place-items: center;
    padding: 16px;
    background: rgba(20, 32, 40, 0.48);
  }

  .modal.show {
    display: grid;
  }

  .modal-box {
    width: min(560px, 100%);
    padding: 18px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.2)),
      var(--panel);
    text-align: center;
  }

  .modal-box h1 {
    margin: 0;
    font-size: 2rem;
    line-height: 1.08;
  }

  .modal-box p {
    margin: 10px auto 0;
    max-width: 460px;
    color: #485966;
    line-height: 1.55;
    font-weight: 700;
  }

  .modal-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  @media (max-width: 900px) {
    body {
      overflow: auto;
    }

    .app {
      height: auto;
      min-height: 100dvh;
      grid-template-rows: auto minmax(430px, 1fr) auto;
    }

    .hud {
      grid-template-columns: minmax(190px, 1fr) repeat(4, auto);
    }

    .hud .stat:nth-of-type(n+4) {
      display: none;
    }

    .touch-pad {
      grid-template-columns: 1fr auto;
    }

    .progress {
      grid-column: 1 / -1;
      width: 100%;
      justify-self: stretch;
    }
  }

  @media (max-width: 560px) {
    .app {
      gap: 7px;
      padding: 7px;
    }

    .hud {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      min-height: 0;
    }

    .brand {
      grid-column: 1 / -1;
    }

    .cube-mark {
      width: 42px;
      height: 42px;
    }

    .brand-title strong {
      font-size: 1.06rem;
    }

    .brand-title span {
      font-size: 0.76rem;
    }

    .stat {
      min-width: 0;
      min-height: 38px;
      padding: 4px 3px;
    }

    .stat span {
      font-size: 0.62rem;
    }

    .stat b {
      font-size: 0.88rem;
    }

    .icon-btn,
    .primary-btn {
      min-height: 38px;
    }

    .primary-btn {
      padding: 0 8px;
      font-size: 0.86rem;
    }

    .icon-btn {
      width: 40px;
    }

    .app {
      grid-template-rows: auto minmax(380px, 1fr) auto;
    }

    .message {
      bottom: 8px;
      min-height: 38px;
      padding: 6px 8px;
      font-size: 0.86rem;
    }

    .touch-pad {
      grid-template-columns: 1fr;
      min-height: 0;
      gap: 8px;
    }

    .mini-panel {
      display: none;
    }

    .dpad {
      justify-self: center;
      width: 168px;
      height: 92px;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 42px);
    }

    .modal-box h1 {
      font-size: 1.52rem;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header class="hud">
    <div class="brand">
      <div class="cube-mark" aria-hidden="true"><span></span></div>
      <div class="brand-title">
        <strong>ボクセルたからハント</strong>
        <span id="statusText">きらきらブロックを集めよう</span>
      </div>
    </div>
    <div class="stat"><span>LEVEL</span><b id="levelText">1</b></div>
    <div class="stat"><span>STAR</span><b id="gemText">0/0</b></div>
    <div class="stat"><span>HEART</span><b id="heartText">3</b></div>
    <div class="stat"><span>SCORE</span><b id="scoreText">0</b></div>
    <button class="icon-btn" id="muteBtn" type="button" aria-label="音を切り替え">♪</button>
    <button class="primary-btn play" id="startBtn" type="button">あそぶ</button>
  </header>

  <main class="play-area" aria-label="ボクセルゲームのステージ">
    <canvas id="gameCanvas"></canvas>
    <div class="message" id="messageText">あそぶを押してスタート</div>
  </main>

  <footer class="touch-pad">
    <div class="mini-panel">
      <b>ミッション</b>
      <small id="missionText">スターを全部集めたら、旗のブロックへ。</small>
    </div>
    <div class="dpad" aria-label="移動ボタン">
      <button class="pad-btn up" type="button" data-move="0,-1" aria-label="上へ">▲</button>
      <button class="pad-btn left" type="button" data-move="-1,0" aria-label="左へ">◀</button>
      <button class="pad-btn down" type="button" data-move="0,1" aria-label="下へ">▼</button>
      <button class="pad-btn right" type="button" data-move="1,0" aria-label="右へ">▶</button>
    </div>
    <div class="progress">
      <div class="mini-panel">
        <b id="bonusText">コンボ 0</b>
        <small id="bestText">ベスト 0</small>
      </div>
      <div class="bar" aria-label="スターの集まり具合"><span id="progressBar"></span></div>
    </div>
  </footer>
</div>

<div class="modal show" id="modal">
  <div class="modal-box">
    <h1 id="modalTitle">ボクセルたからハント</h1>
    <p id="modalText">矢印キーか下のボタンで動いて、スターを全部集めます。ころころブロックに当たらないように、最後は旗へ向かいましょう。</p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const el = {
    status: document.getElementById("statusText"),
    level: document.getElementById("levelText"),
    gems: document.getElementById("gemText"),
    hearts: document.getElementById("heartText"),
    score: document.getElementById("scoreText"),
    message: document.getElementById("messageText"),
    mission: document.getElementById("missionText"),
    bonus: document.getElementById("bonusText"),
    best: document.getElementById("bestText"),
    progress: document.getElementById("progressBar"),
    start: document.getElementById("startBtn"),
    mute: document.getElementById("muteBtn"),
    modal: document.getElementById("modal"),
    modalTitle: document.getElementById("modalTitle"),
    modalText: document.getElementById("modalText"),
    modalActions: document.getElementById("modalActions")
  };

  const colors = {
    grass: ["#69d47f", "#40ae60", "#2f814c"],
    flower: ["#6fd786", "#4ebf6c", "#3a9153"],
    sand: ["#f6d47b", "#d9ae55", "#ad7f37"],
    water: ["#5cc8ff", "#298ccf", "#17669d"],
    stone: ["#aeb8be", "#7f8e96", "#5a6970"],
    bridge: ["#d79a59", "#a66c36", "#7b4f29"],
    exit: ["#ffdf5c", "#e6a83e", "#ac7228"],
    player: ["#39c7d5", "#1c8da4", "#126879"],
    playerAlt: ["#ffd45f", "#f59d3b", "#b96a2d"],
    gem: ["#fff486", "#ffc533", "#d47a24"],
    hazard: ["#ff7770", "#d9443d", "#94312e"],
    shadow: "rgba(16, 30, 42, 0.25)"
  };

  const state = {
    running: false,
    paused: false,
    muted: false,
    level: 1,
    score: 0,
    hearts: 3,
    combo: 0,
    best: Number(localStorage.getItem("voxelTreasureBest") || 0),
    size: 8,
    tiles: [],
    gems: [],
    hazards: [],
    particles: [],
    floatTexts: [],
    player: {
      x: 0,
      y: 0,
      drawX: 0,
      drawY: 0,
      invincibleUntil: 0,
      bounce: 0
    },
    exit: { x: 0, y: 0 },
    collected: 0,
    totalGems: 0,
    moves: 0,
    lastMoveAt: 0,
    startedAt: 0,
    layout: {
      width: 0,
      height: 0,
      tileW: 74,
      tileH: 38,
      depth: 18,
      originX: 0,
      originY: 0
    },
    audio: null
  };

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function rand(seed) {
    let t = seed + 0x6D2B79F5;
    return () => {
      t += 0x6D2B79F5;
      let x = Math.imul(t ^ (t >>> 15), 1 | t);
      x ^= x + Math.imul(x ^ (x >>> 7), 61 | x);
      return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
    };
  }

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    state.layout.width = rect.width;
    state.layout.height = rect.height;
    computeLayout();
  }

  function computeLayout() {
    const size = state.size || 8;
    const availableW = Math.max(320, state.layout.width - 42);
    const availableH = Math.max(260, state.layout.height - 66);
    const tileByW = availableW / (size + 1.2);
    const tileByH = availableH / (size * 0.57 + 1.8);
    const tileW = clamp(Math.min(tileByW, tileByH * 2), 42, 86);
    state.layout.tileW = tileW;
    state.layout.tileH = tileW * 0.52;
    state.layout.depth = tileW * 0.24;
    state.layout.originX = state.layout.width / 2;
    state.layout.originY = Math.max(48, (state.layout.height - size * state.layout.tileH) / 2 + 16);
  }

  function inBounds(x, y) {
    return x >= 0 && y >= 0 && x < state.size && y < state.size;
  }

  function tileAt(x, y) {
    if (!inBounds(x, y)) return "void";
    return state.tiles[y][x];
  }

  function isPassable(x, y) {
    const tile = tileAt(x, y);
    return tile !== "water" && tile !== "stone" && tile !== "void";
  }

  function keyOf(x, y) {
    return `${x},${y}`;
  }

  function generateLevel() {
    const size = clamp(7 + Math.floor(state.level / 2), 8, 10);
    const rnd = rand(1200 + state.level * 91);
    const tiles = Array.from({ length: size }, () => Array.from({ length: size }, () => "grass"));
    const safe = new Set();
    const path = [];
    let x = 0;
    let y = 0;
    path.push([x, y]);
    safe.add(keyOf(x, y));

    while (x < size - 1 || y < size - 1) {
      if (x === size - 1) y++;
      else if (y === size - 1) x++;
      else if (rnd() < 0.52) x++;
      else y++;
      path.push([x, y]);
      safe.add(keyOf(x, y));
    }

    for (let i = 0; i < size; i++) {
      safe.add(keyOf(i, 0));
      safe.add(keyOf(0, i));
    }

    const waterCount = clamp(5 + state.level, 6, 15);
    const stoneCount = clamp(4 + Math.floor(state.level * 1.15), 5, 18);
    placeTiles("water", waterCount, rnd, tiles, safe, size);
    placeTiles("stone", stoneCount, rnd, tiles, safe, size);
    placeTiles("flower", clamp(8 + state.level, 9, 18), rnd, tiles, safe, size, true);
    placeTiles("sand", clamp(4 + Math.floor(state.level / 2), 4, 10), rnd, tiles, safe, size, true);

    state.size = size;
    state.tiles = tiles;
    state.player.x = 0;
    state.player.y = 0;
    state.player.drawX = 0;
    state.player.drawY = 0;
    state.player.invincibleUntil = performance.now() + 900;
    state.exit = { x: size - 1, y: size - 1 };
    state.collected = 0;
    state.moves = 0;
    state.gems = [];
    state.hazards = [];
    state.particles = [];
    state.floatTexts = [];

    const gemCount = clamp(4 + state.level, 5, 10);
    const candidates = [];
    for (let row = 0; row < size; row++) {
      for (let col = 0; col < size; col++) {
        if ((col === 0 && row === 0) || (col === size - 1 && row === size - 1)) continue;
        if (!isBlockedIn(tiles, col, row) && manhattan(col, row, 0, 0) > 2) {
          candidates.push({ x: col, y: row, weight: manhattan(col, row, 0, 0) + rnd() * 3 });
        }
      }
    }
    candidates.sort((a, b) => b.weight - a.weight);
    state.gems = candidates.slice(0, gemCount).map((item, index) => ({
      x: item.x,
      y: item.y,
      id: index,
      got: false,
      pulse: rnd() * Math.PI * 2
    }));
    state.totalGems = state.gems.length;

    const hazardCount = clamp(Math.floor(state.level / 2) + 1, 1, 4);
    const hazardSpots = candidates.slice(gemCount + 1).filter(item => manhattan(item.x, item.y, 0, 0) > 3);
    for (let i = 0; i < hazardCount && hazardSpots.length; i++) {
      const spot = hazardSpots.splice(Math.floor(rnd() * hazardSpots.length), 1)[0];
      const horizontal = rnd() > 0.5;
      state.hazards.push({
        x: spot.x,
        y: spot.y,
        drawX: spot.x,
        drawY: spot.y,
        dx: horizontal ? (rnd() > 0.5 ? 1 : -1) : 0,
        dy: horizontal ? 0 : (rnd() > 0.5 ? 1 : -1),
        spin: rnd() * Math.PI * 2
      });
    }

    computeLayout();
    updateHud();
    setMessage(`レベル${state.level}、スタート！スターを${state.totalGems}こ集めよう。`);
  }

  function placeTiles(type, count, rnd, tiles, safe, size, decorative = false) {
    let placed = 0;
    let tries = 0;
    while (placed < count && tries < 800) {
      tries++;
      const x = Math.floor(rnd() * size);
      const y = Math.floor(rnd() * size);
      const key = keyOf(x, y);
      if (safe.has(key)) continue;
      if (tiles[y][x] !== "grass") continue;
      if (!decorative && wouldSealArea(tiles, x, y, type, size)) continue;
      tiles[y][x] = type;
      placed++;
    }
  }

  function isBlockedIn(tiles, x, y) {
    return tiles[y][x] === "water" || tiles[y][x] === "stone";
  }

  function wouldSealArea(tiles, x, y, type, size) {
    tiles[y][x] = type;
    const ok = canReachExit(tiles, size);
    tiles[y][x] = "grass";
    return !ok;
  }

  function canReachExit(tiles, size) {
    const queue = [[0, 0]];
    const seen = new Set([keyOf(0, 0)]);
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    while (queue.length) {
      const [x, y] = queue.shift();
      if (x === size - 1 && y === size - 1) return true;
      dirs.forEach(([dx, dy]) => {
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= size || ny >= size) return;
        if (isBlockedIn(tiles, nx, ny)) return;
        const key = keyOf(nx, ny);
        if (seen.has(key)) return;
        seen.add(key);
        queue.push([nx, ny]);
      });
    }
    return false;
  }

  function manhattan(ax, ay, bx, by) {
    return Math.abs(ax - bx) + Math.abs(ay - by);
  }

  function startGame() {
    state.running = true;
    state.paused = false;
    state.level = 1;
    state.score = 0;
    state.hearts = 3;
    state.combo = 0;
    state.startedAt = performance.now();
    hideModal();
    generateLevel();
    updateHud();
    playTone(523, 0.08, "triangle");
    playTone(784, 0.12, "triangle", 0.06);
  }

  function nextLevel() {
    const levelBonus = state.hearts * 120 + Math.max(0, 80 - state.moves) * 5;
    state.score += levelBonus;
    state.level++;
    state.combo = 0;
    generateLevel();
    burst(state.player.x, state.player.y, "#ffdf5c", 24);
    playTone(659, 0.09, "triangle");
    playTone(880, 0.16, "triangle", 0.08);
  }

  function restartAfterMiss() {
    if (state.hearts <= 0) {
      gameOver();
      return;
    }
    state.player.x = 0;
    state.player.y = 0;
    state.player.drawX = 0;
    state.player.drawY = 0;
    state.player.invincibleUntil = performance.now() + 1200;
    state.combo = 0;
    setMessage("ハートがひとつ減ったよ。もう一回いこう。");
    updateHud();
  }

  function gameOver() {
    state.running = false;
    state.paused = false;
    saveBest();
    showModal("もう一回あそぶ？", `スコアは ${state.score}。ベストは ${state.best} です。`, [
      { label: "もう一度", className: "play", action: startGame },
      { label: "ながめる", className: "", action: hideModal }
    ]);
    setMessage("あそぶを押すと、またスタートできます。");
  }

  function togglePause() {
    if (!state.running) {
      startGame();
      return;
    }
    state.paused = !state.paused;
    el.start.textContent = state.paused ? "つづき" : "一時停止";
    setMessage(state.paused ? "一時停止中" : "再開！");
  }

  function tryMove(dx, dy) {
    if (!state.running) {
      startGame();
      return;
    }
    if (state.paused) return;
    const now = performance.now();
    if (now - state.lastMoveAt < 92) return;
    state.lastMoveAt = now;
    const nx = state.player.x + dx;
    const ny = state.player.y + dy;
    if (!inBounds(nx, ny)) {
      bumpPlayer(dx, dy);
      setMessage("そこは島のはしっこだよ。");
      playTone(180, 0.05, "square");
      return;
    }
    if (!isPassable(nx, ny)) {
      bumpPlayer(dx, dy);
      setMessage(tileAt(nx, ny) === "water" ? "水のブロックは渡れないよ。" : "岩のブロックは通れないよ。");
      playTone(150, 0.06, "square");
      return;
    }
    state.player.x = nx;
    state.player.y = ny;
    state.moves++;
    state.player.bounce = 1;
    collectAt(nx, ny);
    moveHazards();
    checkHazardHit();
    checkExit();
    updateHud();
  }

  function bumpPlayer(dx, dy) {
    state.player.drawX -= dx * 0.12;
    state.player.drawY -= dy * 0.12;
    state.player.bounce = 0.5;
  }

  function collectAt(x, y) {
    const gem = state.gems.find(item => !item.got && item.x === x && item.y === y);
    if (!gem) return;
    gem.got = true;
    state.collected++;
    state.combo++;
    const add = 100 + state.combo * 20;
    state.score += add;
    state.player.invincibleUntil = performance.now() + 360;
    burst(x, y, "#ffc533", 18);
    floatText(x, y, `+${add}`, "#9b5c00");
    setMessage(state.collected === state.totalGems ? "スターがそろった！旗へゴー！" : `いいね！あと${state.totalGems - state.collected}こ。`);
    playTone(660 + state.combo * 38, 0.08, "triangle");
  }

  function checkExit() {
    if (state.player.x !== state.exit.x || state.player.y !== state.exit.y) return;
    if (state.collected < state.totalGems) {
      setMessage(`旗はまだ待ってるよ。スターあと${state.totalGems - state.collected}こ。`);
      playTone(260, 0.05, "sine");
      return;
    }
    setMessage("レベルクリア！");
    saveBest();
    setTimeout(() => {
      if (state.running) nextLevel();
    }, 520);
  }

  function moveHazards() {
    state.hazards.forEach(hazard => {
      let nx = hazard.x + hazard.dx;
      let ny = hazard.y + hazard.dy;
      if (!inBounds(nx, ny) || !isPassable(nx, ny) || (nx === state.exit.x && ny === state.exit.y)) {
        hazard.dx *= -1;
        hazard.dy *= -1;
        nx = hazard.x + hazard.dx;
        ny = hazard.y + hazard.dy;
      }
      if (inBounds(nx, ny) && isPassable(nx, ny) && !(nx === 0 && ny === 0)) {
        hazard.x = nx;
        hazard.y = ny;
      }
      hazard.spin += 0.45;
    });
  }

  function checkHazardHit() {
    const now = performance.now();
    if (now < state.player.invincibleUntil) return;
    const hit = state.hazards.some(hazard => hazard.x === state.player.x && hazard.y === state.player.y);
    if (!hit) return;
    state.hearts--;
    state.player.invincibleUntil = now + 1300;
    burst(state.player.x, state.player.y, "#ff7770", 18);
    floatText(state.player.x, state.player.y, "-1", "#94312e");
    playTone(130, 0.12, "sawtooth");
    restartAfterMiss();
  }

  function updateHud() {
    el.level.textContent = state.level;
    el.gems.textContent = `${state.collected}/${state.totalGems}`;
    el.hearts.textContent = "♥".repeat(Math.max(0, state.hearts)) || "0";
    el.score.textContent = state.score;
    el.bonus.textContent = `コンボ ${state.combo}`;
    el.best.textContent = `ベスト ${state.best}`;
    el.progress.style.width = state.totalGems ? `${(state.collected / state.totalGems) * 100}%` : "0%";
    el.start.textContent = state.running ? (state.paused ? "つづき" : "一時停止") : "あそぶ";
    const readyForExit = state.running && state.totalGems > 0 && state.collected === state.totalGems;
    el.status.textContent = readyForExit ? "旗のブロックへ向かおう" : "きらきらブロックを集めよう";
    el.mission.textContent = readyForExit ? "スターがそろいました。旗へ向かいましょう。" : "スターを全部集めたら、旗のブロックへ。";
  }

  function setMessage(text) {
    el.message.textContent = text;
  }

  function saveBest() {
    if (state.score <= state.best) return;
    state.best = state.score;
    localStorage.setItem("voxelTreasureBest", String(state.best));
  }

  function isoPoint(x, y, z = 0) {
    const { tileW, tileH, depth, originX, originY } = state.layout;
    return {
      x: originX + (x - y) * tileW * 0.5,
      y: originY + (x + y) * tileH * 0.5 - z * depth
    };
  }

  function drawDiamond(cx, cy, w, h, fill, stroke = "rgba(26,43,53,0.55)") {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + w / 2, cy + h / 2);
    ctx.lineTo(cx, cy + h);
    ctx.lineTo(cx - w / 2, cy + h / 2);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function shade(hex, amount) {
    const value = Number.parseInt(hex.slice(1), 16);
    const r = clamp(((value >> 16) & 255) + amount, 0, 255);
    const g = clamp(((value >> 8) & 255) + amount, 0, 255);
    const b = clamp((value & 255) + amount, 0, 255);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function drawBlock(x, y, height, palette, options = {}) {
    const { tileW, tileH, depth } = state.layout;
    const top = isoPoint(x, y, height);
    const base = isoPoint(x, y, 0);
    const topColor = palette[0];
    const rightColor = palette[1];
    const leftColor = palette[2];
    ctx.save();
    ctx.globalAlpha = options.alpha ?? 1;

    ctx.beginPath();
    ctx.ellipse(base.x, base.y + tileH * 0.62, tileW * 0.34, tileH * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = colors.shadow;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(top.x + tileW / 2, top.y + tileH / 2);
    ctx.lineTo(top.x, top.y + tileH);
    ctx.lineTo(base.x, base.y + tileH);
    ctx.lineTo(base.x + tileW / 2, base.y + tileH / 2);
    ctx.closePath();
    ctx.fillStyle = rightColor;
    ctx.fill();
    ctx.strokeStyle = "rgba(26,43,53,0.48)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(top.x - tileW / 2, top.y + tileH / 2);
    ctx.lineTo(top.x, top.y + tileH);
    ctx.lineTo(base.x, base.y + tileH);
    ctx.lineTo(base.x - tileW / 2, base.y + tileH / 2);
    ctx.closePath();
    ctx.fillStyle = leftColor;
    ctx.fill();
    ctx.stroke();

    drawDiamond(top.x, top.y, tileW, tileH, topColor);

    if (options.grid) {
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = "#ffffff";
      ctx.beginPath();
      ctx.moveTo(top.x - tileW * 0.25, top.y + tileH * 0.25);
      ctx.lineTo(top.x + tileW * 0.25, top.y + tileH * 0.75);
      ctx.moveTo(top.x + tileW * 0.25, top.y + tileH * 0.25);
      ctx.lineTo(top.x - tileW * 0.25, top.y + tileH * 0.75);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGem(gem, time) {
    if (gem.got) return;
    const bob = Math.sin(time * 0.004 + gem.pulse) * 0.18;
    const p = isoPoint(gem.x, gem.y, 1.32 + bob);
    const s = state.layout.tileW * 0.22;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.PI / 4);
    ctx.fillStyle = colors.gem[0];
    ctx.strokeStyle = "#7d4d00";
    ctx.lineWidth = 1.4;
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.strokeRect(-s / 2, -s / 2, s, s);
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.fillRect(-s * 0.18, -s * 0.42, s * 0.2, s * 0.34);
    ctx.restore();
  }

  function drawExit(time) {
    const glow = state.collected === state.totalGems ? 1 : 0.45;
    const p = isoPoint(state.exit.x, state.exit.y, 1.18);
    const poleH = state.layout.tileW * 0.66;
    ctx.save();
    ctx.globalAlpha = glow;
    ctx.strokeStyle = "#5a3a12";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y + 4);
    ctx.lineTo(p.x, p.y - poleH);
    ctx.stroke();
    ctx.fillStyle = state.collected === state.totalGems ? "#ffdf5c" : "#c7d0d2";
    ctx.strokeStyle = "#5a3a12";
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(p.x + 2, p.y - poleH);
    ctx.lineTo(p.x + state.layout.tileW * 0.34, p.y - poleH + state.layout.tileH * 0.22);
    ctx.lineTo(p.x + 2, p.y - poleH + state.layout.tileH * 0.42);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    if (state.collected === state.totalGems) {
      ctx.globalAlpha = 0.26 + Math.sin(time * 0.006) * 0.08;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + state.layout.tileH * 0.4, state.layout.tileW * 0.36, state.layout.tileH * 0.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = "#fff486";
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPlayer(time) {
    const p = state.player;
    p.drawX += (p.x - p.drawX) * 0.28;
    p.drawY += (p.y - p.drawY) * 0.28;
    p.bounce *= 0.86;
    const flash = time < p.invincibleUntil && Math.floor(time / 90) % 2 === 0;
    const z = 1.42 + Math.abs(Math.sin(time * 0.012)) * 0.08 + p.bounce * 0.22;
    const point = isoPoint(p.drawX, p.drawY, z);
    const w = state.layout.tileW * 0.42;
    const h = state.layout.tileH * 0.7;
    ctx.save();
    ctx.globalAlpha = flash ? 0.54 : 1;
    ctx.translate(point.x, point.y);
    drawVoxelCube(-w / 2, -h * 0.52, w, h, colors.player);
    ctx.fillStyle = "#fff8e7";
    ctx.fillRect(-w * 0.2, -h * 0.33, w * 0.12, h * 0.12);
    ctx.fillRect(w * 0.08, -h * 0.33, w * 0.12, h * 0.12);
    ctx.fillStyle = "#12424c";
    ctx.fillRect(-w * 0.04, -h * 0.1, w * 0.16, h * 0.06);
    ctx.restore();
  }

  function drawHazard(hazard) {
    hazard.drawX += (hazard.x - hazard.drawX) * 0.22;
    hazard.drawY += (hazard.y - hazard.drawY) * 0.22;
    const p = isoPoint(hazard.drawX, hazard.drawY, 1.2);
    const w = state.layout.tileW * 0.34;
    const h = state.layout.tileH * 0.58;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.sin(hazard.spin) * 0.06);
    drawVoxelCube(-w / 2, -h * 0.5, w, h, colors.hazard);
    ctx.fillStyle = "#fff1b8";
    ctx.fillRect(-w * 0.2, -h * 0.3, w * 0.16, h * 0.12);
    ctx.fillRect(w * 0.08, -h * 0.3, w * 0.16, h * 0.12);
    ctx.restore();
  }

  function drawVoxelCube(x, y, w, h, palette) {
    ctx.fillStyle = palette[1];
    ctx.fillRect(x + w * 0.16, y + h * 0.22, w * 0.84, h * 0.7);
    ctx.fillStyle = palette[2];
    ctx.fillRect(x, y + h * 0.32, w * 0.24, h * 0.62);
    ctx.fillStyle = palette[0];
    ctx.beginPath();
    ctx.moveTo(x + w * 0.16, y + h * 0.22);
    ctx.lineTo(x + w * 0.38, y);
    ctx.lineTo(x + w, y + h * 0.12);
    ctx.lineTo(x + w * 0.78, y + h * 0.34);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(21,32,43,0.7)";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + w * 0.16, y + h * 0.22, w * 0.84, h * 0.7);
  }

  function tilePalette(type) {
    if (type === "water") return colors.water;
    if (type === "stone") return colors.stone;
    if (type === "flower") return colors.flower;
    if (type === "sand") return colors.sand;
    return colors.grass;
  }

  function drawTileExtras(x, y, type, time) {
    const p = isoPoint(x, y, 1.03);
    const scale = state.layout.tileW;
    if (type === "flower") {
      ctx.save();
      ctx.translate(p.x, p.y + state.layout.tileH * 0.4);
      ctx.fillStyle = "#e85aa2";
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(Math.cos(i * Math.PI / 2) * scale * 0.055, Math.sin(i * Math.PI / 2) * scale * 0.055, scale * 0.045, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = "#ffdf5c";
      ctx.beginPath();
      ctx.arc(0, 0, scale * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    if (type === "water") {
      ctx.save();
      ctx.globalAlpha = 0.35 + Math.sin(time * 0.004 + x + y) * 0.08;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.x - scale * 0.2, p.y + state.layout.tileH * 0.42);
      ctx.quadraticCurveTo(p.x, p.y + state.layout.tileH * 0.3, p.x + scale * 0.2, p.y + state.layout.tileH * 0.42);
      ctx.stroke();
      ctx.restore();
    }
    if (type === "sand") {
      ctx.save();
      ctx.globalAlpha = 0.42;
      ctx.fillStyle = shade(colors.sand[1], -20);
      ctx.fillRect(p.x - scale * 0.06, p.y + state.layout.tileH * 0.38, scale * 0.12, 2);
      ctx.fillRect(p.x + scale * 0.1, p.y + state.layout.tileH * 0.5, scale * 0.08, 2);
      ctx.restore();
    }
  }

  function drawBackground() {
    const w = state.layout.width;
    const h = state.layout.height;
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, "#78d7ff");
    grd.addColorStop(0.55, "#d8f8ff");
    grd.addColorStop(0.56, "#7bc85d");
    grd.addColorStop(1, "#4fa04e");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = 0.42;
    ctx.fillStyle = "#ffffff";
    drawCloud(w * 0.18, h * 0.16, 46);
    drawCloud(w * 0.78, h * 0.2, 58);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.14;
    ctx.fillStyle = "#245c36";
    for (let i = 0; i < 14; i++) {
      const x = (i * 97) % Math.max(w, 1);
      const y = h * 0.68 + (i % 4) * 26;
      ctx.fillRect(x, y, 48, 5);
    }
    ctx.restore();
  }

  function drawCloud(x, y, s) {
    ctx.beginPath();
    ctx.arc(x, y, s * 0.38, 0, Math.PI * 2);
    ctx.arc(x + s * 0.32, y - s * 0.08, s * 0.48, 0, Math.PI * 2);
    ctx.arc(x + s * 0.72, y, s * 0.34, 0, Math.PI * 2);
    ctx.rect(x - s * 0.12, y, s * 0.92, s * 0.28);
    ctx.fill();
  }

  function render(time) {
    drawBackground();
    const objects = [];
    for (let y = 0; y < state.size; y++) {
      for (let x = 0; x < state.size; x++) {
        objects.push({ sort: x + y, type: "tile", x, y });
      }
    }
    state.gems.forEach(gem => objects.push({ sort: gem.x + gem.y + 0.3, type: "gem", gem }));
    objects.push({ sort: state.exit.x + state.exit.y + 0.35, type: "exit" });
    state.hazards.forEach(hazard => objects.push({ sort: hazard.x + hazard.y + 0.6, type: "hazard", hazard }));
    objects.push({ sort: state.player.drawX + state.player.drawY + 0.75, type: "player" });

    objects.sort((a, b) => a.sort - b.sort);
    objects.forEach(item => {
      if (item.type === "tile") {
        const type = tileAt(item.x, item.y);
        const height = type === "stone" ? 1.24 : type === "water" ? 0.72 : 1;
        drawBlock(item.x, item.y, height, tilePalette(type), { grid: type !== "water" });
        drawTileExtras(item.x, item.y, type, time);
      } else if (item.type === "gem") {
        drawGem(item.gem, time);
      } else if (item.type === "exit") {
        drawExit(time);
      } else if (item.type === "hazard") {
        drawHazard(item.hazard);
      } else if (item.type === "player") {
        drawPlayer(time);
      }
    });

    updateParticles(time);
    drawFloatTexts();
    requestAnimationFrame(render);
  }

  function burst(x, y, color, count) {
    const p = isoPoint(x, y, 1.7);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count;
      const speed = 1.2 + Math.random() * 2.4;
      state.particles.push({
        x: p.x,
        y: p.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.2,
        life: 520 + Math.random() * 260,
        born: performance.now(),
        color
      });
    }
  }

  function updateParticles(time) {
    state.particles = state.particles.filter(p => time - p.born < p.life);
    state.particles.forEach(p => {
      const age = (time - p.born) / p.life;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      ctx.save();
      ctx.globalAlpha = 1 - age;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 5, 5);
      ctx.restore();
    });
  }

  function floatText(x, y, text, color) {
    const p = isoPoint(x, y, 1.9);
    state.floatTexts.push({ x: p.x, y: p.y, text, color, born: performance.now(), life: 780 });
  }

  function drawFloatTexts() {
    const now = performance.now();
    state.floatTexts = state.floatTexts.filter(item => now - item.born < item.life);
    state.floatTexts.forEach(item => {
      const age = (now - item.born) / item.life;
      ctx.save();
      ctx.globalAlpha = 1 - age;
      ctx.fillStyle = item.color;
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 4;
      ctx.font = "900 18px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.strokeText(item.text, item.x, item.y - age * 34);
      ctx.fillText(item.text, item.x, item.y - age * 34);
      ctx.restore();
    });
  }

  function showModal(title, text, actions) {
    el.modalTitle.textContent = title;
    el.modalText.textContent = text;
    el.modalActions.innerHTML = "";
    actions.forEach(action => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `primary-btn ${action.className || ""}`;
      button.textContent = action.label;
      button.addEventListener("click", action.action);
      el.modalActions.appendChild(button);
    });
    el.modal.classList.add("show");
  }

  function hideModal() {
    el.modal.classList.remove("show");
  }

  function ensureAudio() {
    if (state.muted) return null;
    if (!state.audio) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      state.audio = new AudioContext();
    }
    if (state.audio.state === "suspended") state.audio.resume();
    return state.audio;
  }

  function playTone(freq, duration, type = "sine", delay = 0) {
    const audio = ensureAudio();
    if (!audio) return;
    const start = audio.currentTime + delay;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.12, start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.start(start);
    osc.stop(start + duration + 0.02);
  }

  function handleKey(event) {
    const key = event.key.toLowerCase();
    const moves = {
      arrowup: [0, -1],
      w: [0, -1],
      arrowdown: [0, 1],
      s: [0, 1],
      arrowleft: [-1, 0],
      a: [-1, 0],
      arrowright: [1, 0],
      d: [1, 0]
    };
    if (moves[key]) {
      event.preventDefault();
      tryMove(moves[key][0], moves[key][1]);
    } else if (key === " " || key === "enter") {
      event.preventDefault();
      togglePause();
    } else if (key === "escape") {
      event.preventDefault();
      if (state.running) togglePause();
    }
  }

  document.querySelectorAll("[data-move]").forEach(button => {
    button.addEventListener("click", () => {
      const [dx, dy] = button.dataset.move.split(",").map(Number);
      tryMove(dx, dy);
    });
  });

  el.start.addEventListener("click", togglePause);
  el.mute.addEventListener("click", () => {
    state.muted = !state.muted;
    el.mute.textContent = state.muted ? "×" : "♪";
    el.mute.setAttribute("aria-label", state.muted ? "音を出す" : "音を消す");
  });
  document.addEventListener("keydown", handleKey, { passive: false });
  window.addEventListener("resize", resizeCanvas);

  showModal("ボクセルたからハント", "スターを集めて、光った旗へ向かいます。矢印キー、WASD、下のボタンで遊べます。", [
    { label: "あそぶ", className: "play", action: startGame }
  ]);

  state.tiles = Array.from({ length: state.size }, () => Array.from({ length: state.size }, () => "grass"));
  state.exit = { x: state.size - 1, y: state.size - 1 };
  updateHud();
  resizeCanvas();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
