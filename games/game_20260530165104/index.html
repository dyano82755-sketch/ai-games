<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>釣りゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #4682B4);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: #87CEEB;
        }

        /* スタート画面 */
        #startScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(135, 206, 235, 0.9);
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #startScreen h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #startScreen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #fff;
            max-width: 80%;
        }

        #startButton {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #FFD700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            color: #333;
            font-weight: bold;
        }

        #startButton:hover {
            background: #FFA500;
            transform: scale(1.05);
        }

        /* ゲーム画面 */
        #gameScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        #gameHeader {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid #333;
        }

        #score, #time {
            font-size: 1.5rem;
            font-weight: bold;
        }

        #fishContainer {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #4682B4);
        }

        /* 釣り竿 */
        #fishingRod {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 150px;
            background: #8B4513;
            transform-origin: top center;
            z-index: 2;
        }

        #fishingRod::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            width: 50px;
            height: 30px;
            background: #8B4513;
            border-radius: 50%;
        }

        #fishingRod::after {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            width: 20px;
            height: 20px;
            background: #FFD700;
            border-radius: 50%;
        }

        /* つり糸 */
        #fishingLine {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 0;
            background: #fff;
            z-index: 1;
            transition: height 0.1s;
        }

        /* 魚 */
        .fish {
            position: absolute;
            font-size: 3rem;
            animation: swim linear infinite;
            z-index: 0;
        }

        @keyframes swim {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(100vw) translateY(0); }
        }

        /* ゲームオーバー画面 */
        #gameOverScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20;
            text-align: center;
        }

        #gameOverScreen h2 {
            font-size: 3rem;
            color: #FF6347;
            margin-bottom: 20px;
        }

        #finalScore {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 30px;
        }

        #restartButton {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #4CAF50;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            color: white;
            font-weight: bold;
        }

        #restartButton:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        /* タッチ操作用のヒント */
        #touchHint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1rem;
            text-align: center;
            opacity: 0.7;
        }

        /* レスポンシブ対応 */
        @media (max-width: 500px) {
            #startScreen h1 {
                font-size: 2rem;
            }
            
            #startScreen p {
                font-size: 1rem;
            }
            
            #gameHeader {
                height: 60px;
                padding: 0 10px;
            }
            
            #score, #time {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- スタート画面 -->
        <div id="startScreen">
            <h1>🎣 釣りゲーム 🎣</h1>
            <p>タッチまたはクリックで釣り竿を動かして魚を釣りましょう！</p>
            <button id="startButton">スタート</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="gameScreen">
            <div id="gameHeader">
                <div id="score">スコア: 0</div>
                <div id="time">時間: 60</div>
            </div>
            <div id="fishContainer">
                <div id="fishingRod"></div>
                <div id="fishingLine"></div>
                <!-- 魚はJavaScriptで追加 -->
            </div>
            <div id="touchHint">タッチして釣り竿を動かしてください</div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameOverScreen">
            <h2>ゲームオーバー</h2>
            <div id="finalScore">最終スコア: 0</div>
            <button id="restartButton">もう一度プレイ</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲーム状態管理
            const gameState = {
                isPlaying: false,
                score: 0,
                timeLeft: 60,
                fishSpeed: 1,
                fishSpawnRate: 1000,
                fishInterval: null,
                timeInterval: null,
                rodAngle: 0,
                rodPosition: 0,
                fishList: []
            };

            // DOM要素
            const startScreen = document.getElementById('startScreen');
            const gameScreen = document.getElementById('gameScreen');
            const gameOverScreen = document.getElementById('gameOverScreen');
            const startButton = document.getElementById('startButton');
            const restartButton = document.getElementById('restartButton');
            const scoreElement = document.getElementById('score');
            const timeElement = document.getElementById('time');
            const finalScoreElement = document.getElementById('finalScore');
            const fishContainer = document.getElementById('fishContainer');
            const fishingRod = document.getElementById('fishingRod');
            const fishingLine = document.getElementById('fishingLine');

            // ゲーム開始
            startButton.addEventListener('click', startGame);
            restartButton.addEventListener('click', startGame);

            function startGame() {
                // 初期化
                gameState.isPlaying = true;
                gameState.score = 0;
                gameState.timeLeft = 60;
                gameState.fishSpeed = 1;
                gameState.fishList = [];
                
                // 画面切り替え
                startScreen.style.display = 'none';
                gameScreen.style.display = 'flex';
                gameOverScreen.style.display = 'none';
                
                // スコアと時間表示更新
                updateScore();
                updateTime();
                
                // タイマー開始
                gameState.timeInterval = setInterval(updateTime, 1000);
                
                // 魚の生成開始
                gameState.fishInterval = setInterval(spawnFish, gameState.fishSpawnRate);
                
                // マウス/タッチ操作開始
                setupInput();
                
                // 魚のアニメーション開始
                animateFish();
            }

            function updateTime() {
                if (!gameState.isPlaying) return;
                
                gameState.timeLeft--;
                timeElement.textContent = `時間: ${gameState.timeLeft}`;
                
                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }

            function updateScore() {
                scoreElement.textContent = `スコア: ${gameState.score}`;
            }

            function spawnFish() {
                if (!gameState.isPlaying) return;
                
                const fish = document.createElement('div');
                fish.className = 'fish';
                fish.textContent = getRandomFishEmoji();
                
                // 魚の位置をランダムに設定
                const containerHeight = fishContainer.clientHeight;
                const fishHeight = 50;
                const y = Math.random() * (containerHeight - fishHeight);
                
                fish.style.top = `${y}px`;
                fish.style.left = `-${fishHeight}px`;
                fish.style.animationDuration = `${Math.random() * 5 + 5}s`;
                
                fishContainer.appendChild(fish);
                gameState.fishList.push({
                    element: fish,
                    x: -fishHeight,
                    y: y,
                    width: fishHeight,
                    height: fishHeight
                });
            }

            function getRandomFishEmoji() {
                const fishEmojis = ['🐟', '🐠', '🐡', '🦈', '🐬', '🐳', '🐋', '🐟'];
                return fishEmojis[Math.floor(Math.random() * fishEmojis.length)];
            }

            function setupInput() {
                // タッチ操作
                fishContainer.addEventListener('touchmove', handleTouchMove);
                fishContainer.addEventListener('touchstart', handleTouchMove);
                
                // マウス操作
                fishContainer.addEventListener('mousemove', handleMouseMove);
                fishContainer.addEventListener('mousedown', handleMouseDown);
            }

            function handleTouchMove(e) {
                if (!gameState.isPlaying) return;
                
                e.preventDefault();
                const touch = e.touches[0];
                const rect = fishContainer.getBoundingClientRect();
                const containerWidth = rect.width;
                const containerHeight = rect.height;
                
                // 釣り竿の位置をタッチ位置に合わせる
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                // 釣り竿の角度を計算
                const rodCenterX = containerWidth / 2;
                const rodCenterY = containerHeight - 50;
                
                const angle = Math.atan2(y - rodCenterY, x - rodCenterX) * 180 / Math.PI;
                gameState.rodAngle = Math.max(-45, Math.min(45, angle));
                
                // 釣り竿の位置を更新
                const rodPosition = Math.max(0, Math.min(containerWidth, x));
                fishingRod.style.transform = `translateX(-50%) rotate(${gameState.rodAngle}deg)`;
                
                // つり糸の長さを更新
                const lineLength = Math.sqrt(Math.pow(rodCenterX - x, 2) + Math.pow(rodCenterY - y, 2));
                fishingLine.style.height = `${Math.min(lineLength, 300)}px`;
            }

            function handleMouseMove(e) {
                if (!gameState.isPlaying) return;
                
                const rect = fishContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 釣り竿の角度を計算
                const rodCenterX = rect.width / 2;
                const rodCenterY = rect.height - 50;
                
                const angle = Math.atan2(y - rodCenterY, x - rodCenterX) * 180 / Math.PI;
                gameState.rodAngle = Math.max(-45, Math.min(45, angle));
                
                // 釣り竿の位置を更新
                const rodPosition = Math.max(0, Math.min(rect.width, x));
                fishingRod.style.transform = `translateX(-50%) rotate(${gameState.rodAngle}deg)`;
                
                // つり糸の長さを更新
                const lineLength = Math.sqrt(Math.pow(rodCenterX - x, 2) + Math.pow(rodCenterY - y, 2));
                fishingLine.style.height = `${Math.min(lineLength, 300)}px`;
            }

            function handleMouseDown(e) {
                if (!gameState.isPlaying) return;
                
                // マウス操作を有効にする
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                });
            }

            function animateFish() {
                if (!gameState.isPlaying) return;
                
                gameState.fishList.forEach((fish, index) => {
                    // 魚を右へ移動
                    fish.x += gameState.fishSpeed;
                    fish.element.style.left = `${fish.x}px`;
                    
                    // 画面外に出たら削除
                    if (fish.x > fishContainer.clientWidth) {
                        fish.element.remove();
                        gameState.fishList.splice(index, 1);
                    }
                    
                    // 釣り竿との当たり判定
                    const rodRect = fishingRod.getBoundingClientRect();
                    const fishRect = fish.element.getBoundingClientRect();
                    const containerRect = fishContainer.getBoundingClientRect();
                    
                    // 釣り竿の位置を計算
                    const rodCenterX = containerRect.width / 2;
                    const rodCenterY = containerRect.height - 50;
                    
                    // 釣り竿の角度に基づいて当たり判定
                    const distance = Math.sqrt(
                        Math.pow(fishRect.left - (rodCenterX + containerRect.left), 2) +
                        Math.pow(fishRect.top - (rodCenterY + containerRect.top), 2)
                    );
                    
                    if (distance < 80 && fishRect.top > rodCenterY) {
                        // 魚を釣り上げる
                        fish.element.style.animation = 'none';
                        fish.element.textContent = '🎣';
                        fish.element.style.color = '#FFD700';
                        
                        // スコアを加算
                        gameState.score += 10;
                        updateScore();
                        
                        // 一定時間後に削除
                        setTimeout(() => {
                            fish.element.remove();
                            gameState.fishList.splice(index, 1);
                        }, 1000);
                    }
                });
                
                requestAnimationFrame(animateFish);
            }

            function endGame() {
                gameState.isPlaying = false;
                clearInterval(gameState.timeInterval);
                clearInterval(gameState.fishInterval);
                
                // 画面切り替え
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'flex';
                finalScoreElement.textContent = `最終スコア: ${gameState.score}`;
            }
        });
    </script>
</body>
</html>
