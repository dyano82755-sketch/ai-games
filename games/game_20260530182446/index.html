<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>マインスイーパー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        #start-screen, #game-over-screen {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .btn {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .cell {
            aspect-ratio: 1;
            background: linear-gradient(to bottom right, #8B4513, #5D2906);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
            user-select: none;
        }

        .cell:hover {
            background: linear-gradient(to bottom right, #A0522D, #8B4513);
        }

        .cell.revealed {
            background: #696969;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.3);
        }

        .cell.flagged::after {
            content: "🚩";
        }

        .cell.mine::after {
            content: "💣";
        }

        .cell.mine.revealed {
            background: #ff4444;
        }

        .cell-1 { color: #0000ff; }
        .cell-2 { color: #008000; }
        .cell-3 { color: #ff0000; }
        .cell-4 { color: #000080; }
        .cell-5 { color: #800000; }
        .cell-6 { color: #008080; }
        .cell-7 { color: #000000; }
        .cell-8 { color: #808080; }

        #stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2rem;
        }

        #timer, #mines-counter {
            font-weight: bold;
        }

        #instructions {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 2rem;
            }
            
            .cell {
                font-size: 1rem;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>💣 マインスイーパー 💣</h1>
        
        <div id="start-screen">
            <h2>ゲームスタート</h2>
            <p>左クリックで開く、右クリックで旗を立てる</p>
            <button id="start-btn" class="btn">スタート</button>
        </div>

        <div id="game-board"></div>

        <div id="stats">
            <span id="mines-counter"> mines: 15</span>
            <span id="timer">time: 0</span>
        </div>

        <div id="game-over-screen" class="hidden">
            <h2 id="game-result">ゲームオーバー</h2>
            <p id="game-message"></p>
            <button id="restart-btn" class="btn">再挑戦</button>
        </div>

        <div id="instructions">
            <p>💡 左クリックでマスを開く</p>
            <p>💡 右クリックで旗を立てる</p>
            <p>💡 数字は周囲8マスの地雷数</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲーム状態
            const gameState = {
                board: [],
                minePositions: [],
                revealedCount: 0,
                flaggedCount: 0,
                gameOver: false,
                gameWon: false,
                firstClick: true,
                startTime: 0,
                timerInterval: null,
                rows: 10,
                cols: 10,
                mines: 15
            };

            // DOM要素
            const gameBoard = document.getElementById('game-board');
            const startScreen = document.getElementById('start-screen');
            const gameOverScreen = document.getElementById('game-over-screen');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const timerElement = document.getElementById('timer');
            const minesCounter = document.getElementById('mines-counter');
            const gameResult = document.getElementById('game-result');
            const gameMessage = document.getElementById('game-message');

            // ゲーム初期化
            function initGame() {
                // ゲームボードのリセット
                gameBoard.innerHTML = '';
                gameState.board = [];
                gameState.minePositions = [];
                gameState.revealedCount = 0;
                gameState.flaggedCount = 0;
                gameState.gameOver = false;
                gameState.gameWon = false;
                gameState.firstClick = true;
                clearInterval(gameState.timerInterval);
                timerElement.textContent = 'time: 0';
                
                // ゲームボードの作成
                for (let i = 0; i < gameState.rows; i++) {
                    gameState.board[i] = [];
                    for (let j = 0; j < gameState.cols; j++) {
                        gameState.board[i][j] = {
                            isMine: false,
                            isRevealed: false,
                            isFlagged: false,
                            neighborMines: 0
                        };
                        
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        
                        // クリックイベント
                        cell.addEventListener('click', () => handleCellClick(i, j));
                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            handleRightClick(i, j);
                        });
                        
                        gameBoard.appendChild(cell);
                    }
                }
                
                minesCounter.textContent = `mines: ${gameState.mines}`;
                gameOverScreen.classList.add('hidden');
                startScreen.classList.add('hidden');
            }

            // 地雷配置
            function placeMines(firstRow, firstCol) {
                let minesPlaced = 0;
                gameState.minePositions = [];
                
                while (minesPlaced < gameState.mines) {
                    const row = Math.floor(Math.random() * gameState.rows);
                    const col = Math.floor(Math.random() * gameState.cols);
                    
                    // 最初のクリック位置は地雷にしない
                    if (row === firstRow && col === firstCol) continue;
                    
                    if (!gameState.board[row][col].isMine) {
                        gameState.board[row][col].isMine = true;
                        gameState.minePositions.push({row, col});
                        minesPlaced++;
                    }
                }
                
                // 周囲の地雷数を計算
                calculateNeighbors();
            }

            // 周囲の地雷数を計算
            function calculateNeighbors() {
                for (let i = 0; i < gameState.rows; i++) {
                    for (let j = 0; j < gameState.cols; j++) {
                        if (!gameState.board[i][j].isMine) {
                            let count = 0;
                            for (let di = -1; di <= 1; di++) {
                                for (let dj = -1; dj <= 1; dj++) {
                                    if (di === 0 && dj === 0) continue;
                                    const ni = i + di;
                                    const nj = j + dj;
                                    if (ni >= 0 && ni < gameState.rows && nj >= 0 && nj < gameState.cols) {
                                        if (gameState.board[ni][nj].isMine) count++;
                                    }
                                }
                            }
                            gameState.board[i][j].neighborMines = count;
                        }
                    }
                }
            }

            // セルクリック処理
            function handleCellClick(row, col) {
                if (gameState.gameOver || gameState.gameWon) return;
                
                const cell = gameState.board[row][col];
                
                if (cell.isFlagged || cell.isRevealed) return;
                
                // 最初のクリックの場合は地雷を配置
                if (gameState.firstClick) {
                    gameState.firstClick = false;
                    gameState.startTime = Date.now();
                    gameState.timerInterval = setInterval(updateTimer, 1000);
                    placeMines(row, col);
                }
                
                // 地雷を踏んだ場合
                if (cell.isMine) {
                    gameOver(false);
                    return;
                }
                
                revealCell(row, col);
                checkWin();
            }

            // 右クリック処理（旗を立てる）
            function handleRightClick(row, col) {
                if (gameState.gameOver || gameState.gameWon) return;
                
                const cell = gameState.board[row][col];
                if (cell.isRevealed) return;
                
                cell.isFlagged = !cell.isFlagged;
                updateCellDisplay(row, col);
                
                gameState.flaggedCount += cell.isFlagged ? 1 : -1;
                minesCounter.textContent = `mines: ${gameState.mines - gameState.flaggedCount}`;
            }

            // セルを開く
            function revealCell(row, col) {
                const cell = gameState.board[row][col];
                if (cell.isRevealed || cell.isFlagged) return;
                
                cell.isRevealed = true;
                gameState.revealedCount++;
                
                updateCellDisplay(row, col);
                
                // 周囲のマスを開く（0の場合は再帰的に開く）
                if (cell.neighborMines === 0) {
                    for (let di = -1; di <= 1; di++) {
                        for (let dj = -1; dj <= 1; dj++) {
                            if (di === 0 && dj === 0) continue;
                            const ni = row + di;
                            const nj = col + dj;
                            if (ni >= 0 && ni < gameState.rows && nj >= 0 && nj < gameState.cols) {
                                revealCell(ni, nj);
                            }
                        }
                    }
                }
            }

            // セル表示更新
            function updateCellDisplay(row, col) {
                const cell = gameState.board[row][col];
                const cellElement = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
                
                if (cell.isRevealed) {
                    cellElement.classList.add('revealed');
                    if (cell.isMine) {
                        cellElement.classList.add('mine');
                    } else if (cell.neighborMines > 0) {
                        cellElement.textContent = cell.neighborMines;
                        cellElement.classList.add(`cell-${cell.neighborMines}`);
                    }
                } else if (cell.isFlagged) {
                    cellElement.classList.add('flagged');
                } else {
                    cellElement.classList.remove('revealed', 'flagged');
                    cellElement.textContent = '';
                }
            }

            // タイマー更新
            function updateTimer() {
                const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                timerElement.textContent = `time: ${elapsed}`;
            }

            // 勝利判定
            function checkWin() {
                const totalCells = gameState.rows * gameState.cols;
                if (gameState.revealedCount === totalCells - gameState.mines) {
                    gameOver(true);
                }
            }

            // ゲームオーバー処理
            function gameOver(isWin) {
                gameState.gameOver = true;
                clearInterval(gameState.timerInterval);
                
                if (isWin) {
                    gameResult.textContent = '🎉 クリア！ 🎉';
                    gameMessage.textContent = `時間: ${timerElement.textContent.split(':')[1]}秒`;
                    document.querySelectorAll('.cell').forEach(cell => {
                        const row = parseInt(cell.dataset.row);
                        const col = parseInt(cell.dataset.col);
                        if (gameState.board[row][col].isMine && !gameState.board[row][col].isFlagged) {
                            cell.classList.add('flagged');
                        }
                    });
                } else {
                    gameResult.textContent = '💥 ゲームオーバー 💥';
                    gameMessage.textContent = '地雷を踏んでしまいました';
                    revealAllMines();
                }
                
                gameOverScreen.classList.remove('hidden');
            }

            // 全ての地雷を表示
            function revealAllMines() {
                gameState.minePositions.forEach(pos => {
                    const cell = gameState.board[pos.row][pos.col];
                    if (!cell.isRevealed) {
                        cell.isRevealed = true;
                        updateCellDisplay(pos.row, pos.col);
                    }
                });
            }

            // イベントリスナー
            startBtn.addEventListener('click', () => {
                initGame();
            });

            restartBtn.addEventListener('click', () => {
                initGame();
            });

            // 初期画面表示
            startScreen.classList.remove('hidden');
        });
    </script>
</body>
</html>
