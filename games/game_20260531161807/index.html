<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3Dボクセルゲーム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameContainer {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 30, 0.9);
      z-index: 10;
      transition: opacity 0.5s;
    }

    #gameOverScreen {
      display: none;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00eeff;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      max-width: 80%;
      line-height: 1.6;
    }

    button {
      background: linear-gradient(45deg, #00eeff, #0077ff);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 15px rgba(0, 238, 255, 0.5);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 238, 255, 0.8);
    }

    #gameBoard {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 4px;
      width: 300px;
      height: 300px;
      margin: 20px auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .voxel {
      background: #333;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      transition: all 0.2s;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    }

    .voxel:hover {
      transform: scale(1.1);
    }

    .voxel.active {
      background: linear-gradient(135deg, #00eeff, #0077ff);
      box-shadow: 0 0 15px rgba(0, 238, 255, 0.7);
    }

    .score {
      font-size: 1.5rem;
      margin: 20px 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
    }

    .control-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .instructions {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      max-width: 80%;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      
      h2 {
        font-size: 1.5rem;
      }
      
      #gameBoard {
        width: 250px;
        height: 250px;
      }
      
      .voxel {
        font-size: 18px;
      }
      
      button {
        padding: 12px 30px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="startScreen">
      <h1>🎮 3Dボクセルゲーム</h1>
      <p>ボクセルをクリックしてゲームを始めてください！</p>
      <p>同じ色のボクセルをつなげて消すのが目標です。</p>
      <button id="startButton">ゲーム開始</button>
      <div class="instructions">
        <p>📱 タッチで操作</p>
        <p>🖱️ マウスクリックでもプレイ可能</p>
      </div>
    </div>

    <div id="gameOverScreen">
      <h2>ゲームオーバー</h2>
      <p class="score">最終スコア: <span id="finalScore">0</span></p>
      <button id="restartButton">再挑戦</button>
    </div>

    <div class="score">スコア: <span id="currentScore">0</span></div>
    
    <div id="gameBoard"></div>
    
    <div class="controls">
      <div class="control-btn" id="upBtn">⬆️</div>
      <div class="control-btn" id="leftBtn">⬅️</div>
      <div class="control-btn" id="rightBtn">➡️</div>
      <div class="control-btn" id="downBtn">⬇️</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ゲーム状態
      const gameState = {
        score: 0,
        board: [],
        isPlaying: false,
        selectedVoxel: null,
        gameBoard: document.getElementById('gameBoard'),
        currentScore: document.getElementById('currentScore'),
        finalScore: document.getElementById('finalScore'),
        startScreen: document.getElementById('startScreen'),
        gameOverScreen: document.getElementById('gameOverScreen'),
        startButton: document.getElementById('startButton'),
        restartButton: document.getElementById('restartButton'),
        upBtn: document.getElementById('upBtn'),
        leftBtn: document.getElementById('leftBtn'),
        rightBtn: document.getElementById('rightBtn'),
        downBtn: document.getElementById('downBtn')
      };

      // ボクセルの種類
      const voxelTypes = ['🔴', '🟢', '🔵', '🟡', '🟣', '🟠'];
      
      // ゲーム初期化
      function initGame() {
        gameState.score = 0;
        gameState.board = [];
        gameState.selectedVoxel = null;
        gameState.currentScore.textContent = gameState.score;
        gameState.gameBoard.innerHTML = '';
        
        // ボード生成
        for (let i = 0; i < 25; i++) {
          const voxel = document.createElement('div');
          voxel.className = 'voxel';
          voxel.dataset.index = i;
          voxel.textContent = voxelTypes[Math.floor(Math.random() * voxelTypes.length)];
          
          // タッチ/クリックイベント
          voxel.addEventListener('click', () => handleVoxelClick(i));
          voxel.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleVoxelClick(i);
          });
          
          gameState.gameBoard.appendChild(voxel);
          gameState.board.push(voxel);
        }
        
        // ボタンイベント
        gameState.startButton.addEventListener('click', startGame);
        gameState.restartButton.addEventListener('click', startGame);
        
        // 方向ボタンイベント
        gameState.upBtn.addEventListener('click', () => moveSelection('up'));
        gameState.downBtn.addEventListener('click', () => moveSelection('down'));
        gameState.leftBtn.addEventListener('click', () => moveSelection('left'));
        gameState.rightBtn.addEventListener('click', () => moveSelection('right'));
        
        // タッチイベント用
        gameState.upBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          moveSelection('up');
        });
        gameState.downBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          moveSelection('down');
        });
        gameState.leftBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          moveSelection('left');
        });
        gameState.rightBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          moveSelection('right');
        });
      }

      // ゲーム開始
      function startGame() {
        gameState.startScreen.style.display = 'none';
        gameState.gameOverScreen.style.display = 'none';
        gameState.isPlaying = true;
        gameState.score = 0;
        gameState.currentScore.textContent = gameState.score;
        
        // ボードを再生成
        for (let i = 0; i < 25; i++) {
          gameState.board[i].textContent = voxelTypes[Math.floor(Math.random() * voxelTypes.length)];
          gameState.board[i].classList.remove('active');
        }
      }

      // ボクセルクリック処理
      function handleVoxelClick(index) {
        if (!gameState.isPlaying) return;
        
        const voxel = gameState.board[index];
        
        // 既に選択されている場合
        if (gameState.selectedVoxel === index) {
          voxel.classList.remove('active');
          gameState.selectedVoxel = null;
          return;
        }
        
        // 選択解除
        if (gameState.selectedVoxel !== null) {
          gameState.board[gameState.selectedVoxel].classList.remove('active');
        }
        
        // 新たに選択
        voxel.classList.add('active');
        gameState.selectedVoxel = index;
      }

      // 選択移動
      function moveSelection(direction) {
        if (!gameState.isPlaying || gameState.selectedVoxel === null) return;
        
        let newIndex = gameState.selectedVoxel;
        const row = Math.floor(gameState.selectedVoxel / 5);
        const col = gameState.selectedVoxel % 5;
        
        switch(direction) {
          case 'up':
            if (row > 0) newIndex = (row - 1) * 5 + col;
            break;
          case 'down':
            if (row < 4) newIndex = (row + 1) * 5 + col;
            break;
          case 'left':
            if (col > 0) newIndex = row * 5 + (col - 1);
            break;
          case 'right':
            if (col < 4) newIndex = row * 5 + (col + 1);
            break;
        }
        
        if (newIndex !== gameState.selectedVoxel) {
          gameState.board[gameState.selectedVoxel].classList.remove('active');
          gameState.board[newIndex].classList.add('active');
          gameState.selectedVoxel = newIndex;
        }
      }

      // ゲームオーバー処理
      function gameOver() {
        gameState.isPlaying = false;
        gameState.finalScore.textContent = gameState.score;
        gameState.gameOverScreen.style.display = 'flex';
      }

      // ゲーム初期化
      initGame();
      
      // ウィンドウサイズ変更時の対応
      window.addEventListener('resize', () => {
        // リサイズ時の処理は必要に応じて追加
      });
    });
  </script>
</body>
</html>
