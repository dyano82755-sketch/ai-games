<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3Dボクセルゲーム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
      color: #fff;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      z-index: 20;
      pointer-events: auto;
    }

    #gameOverScreen {
      display: none;
    }

    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.3s;
    }

    button:hover {
      background: #666;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      pointer-events: auto;
      user-select: none;
    }

    #virtualStick {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    #stick {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      pointer-events: auto;
    }

    #hotbar {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px;
      border-radius: 5px;
    }

    .hotbar-slot {
      width: 40px;
      height: 40px;
      background: #333;
      border: 2px solid #555;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      cursor: pointer;
    }

    .hotbar-slot.active {
      border-color: #fff;
    }

    #inventory {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
      display: none;
    }

    #inventory.show {
      display: block;
    }

    .inventory-slot {
      width: 40px;
      height: 40px;
      background: #333;
      margin: 5px;
      border-radius: 4px;
      display: inline-block;
      text-align: center;
      line-height: 40px;
      font-size: 20px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      pointer-events: none;
    }

    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    #loadingBar {
      width: 80%;
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }

    #loadingProgress {
      height: 100%;
      background: #00ff00;
      width: 0%;
      transition: width 0.3s;
    }

    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 12px;
      z-index: 25;
    }
  </style>
</head>
<body>
  <div id="gameCanvas"></div>

  <div id="ui">
    <div id="startScreen">
      <h1>3Dボクセルゲーム</h1>
      <p>マウスまたはタッチ操作で遊べます</p>
      <button id="startBtn">スタート</button>
    </div>

    <div id="gameOverScreen">
      <h1>ゲームオーバー</h1>
      <p>お疲れ様でした</p>
      <button id="restartBtn">リスタート</button>
    </div>

    <div id="controls">
      <div class="control-btn" id="jumpBtn">↑</div>
      <div class="control-btn" id="placeBtn">+</div>
      <div class="control-btn" id="breakBtn">-</div>
    </div>

    <div id="virtualStick">
      <div id="stick"></div>
    </div>

    <div id="hotbar">
      <div class="hotbar-slot active">🌿</div>
      <div class="hotbar-slot">🟫</div>
      <div class="hotbar-slot">🪨</div>
      <div class="hotbar-slot">🪵</div>
      <div class="hotbar-slot">🪨</div>
    </div>

    <div id="inventory">
      <div class="inventory-slot">🌿</div>
      <div class="inventory-slot">🟫</div>
      <div class="inventory-slot">🪨</div>
      <div class="inventory-slot">🪵</div>
      <div class="inventory-slot">🪨</div>
    </div>

    <div id="crosshair"></div>

    <div id="debug">FPS: 0</div>
  </div>

  <div id="loadingScreen">
    <div id="loadingBar">
      <div id="loadingProgress"></div>
    </div>
  </div>

  <script>
    // === データ ===
    const BLOCK_TYPES = {
      GRASS: '🌿',
      DIRT: '🟫',
      STONE: '🪨',
      WOOD: '🪵',
      LEAVES: '🍃'
    };

    const BLOCK_COLORS = {
      GRASS: '#4CAF50',
      DIRT: '#8B4513',
      STONE: '#9E9E9E',
      WOOD: '#8B4513',
      LEAVES: '#2E7D32'
    };

    const WORLD_SIZE = 16;
    const CHUNK_SIZE = 16;
    const CHUNK_HEIGHT = 8;
    const BLOCK_SIZE = 100;
    const GRAVITY = 0.02;
    const JUMP_FORCE = 0.4;
    const MOVE_SPEED = 0.1;

    // === グローバル変数 ===
    let gameState = 'start'; // 'start', 'playing', 'gameover'
    let player = {
      x: 0,
      y: 0,
      z: 0,
      vx: 0,
      vy: 0,
      vz: 0,
      onGround: false,
      rotationX: 0,
      rotationY: 0,
      selectedBlock: 'GRASS'
    };

    let chunks = {};
    let world = {};
    let camera = {
      x: 0,
      y: 0,
      z: 0,
      rotationX: 0,
      rotationY: 0
    };

    let touchStartX = 0;
    let touchStartY = 0;
    let isDragging = false;
    let lastTime = 0;
    let fps = 0;
    let frameCount = 0;
    let lastFpsUpdate = 0;

    // === DOM要素 ===
    const gameCanvas = document.getElementById('gameCanvas');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const jumpBtn = document.getElementById('jumpBtn');
    const placeBtn = document.getElementById('placeBtn');
    const breakBtn = document.getElementById('breakBtn');
    const virtualStick = document.getElementById('virtualStick');
    const stick = document.getElementById('stick');
    const hotbarSlots = document.querySelectorAll('.hotbar-slot');
    const inventory = document.getElementById('inventory');
    const crosshair = document.getElementById('crosshair');
    const debug = document.getElementById('debug');
    const loadingScreen = document.getElementById('loadingScreen');
    const loadingProgress = document.getElementById('loadingProgress');

    // === 初期化 ===
    function init() {
      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', startGame);
      jumpBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
      });
      jumpBtn.addEventListener('mousedown', jump);
      placeBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        placeBlock();
      });
      placeBtn.addEventListener('mousedown', placeBlock);
      breakBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        breakBlock();
      });
      breakBtn.addEventListener('mousedown', breakBlock);

      hotbarSlots.forEach((slot, index) => {
        slot.addEventListener('click', () => {
          player.selectedBlock = Object.keys(BLOCK_TYPES)[index];
          hotbarSlots.forEach(s => s.classList.remove('active'));
          slot.classList.add('active');
        });
      });

      // タッチ操作
      gameCanvas.addEventListener('touchstart', handleTouchStart);
      gameCanvas.addEventListener('touchmove', handleTouchMove);
      gameCanvas.addEventListener('touchend', handleTouchEnd);

      // マウス操作
      gameCanvas.addEventListener('mousedown', handleMouseDown);
      gameCanvas.addEventListener('mousemove', handleMouseMove);
      gameCanvas.addEventListener('mouseup', handleMouseUp);

      // キーボード操作
      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('keyup', handleKeyUp);

      // ローディング画面
      simulateLoading();
    }

    // === ゲーム開始 ===
    function startGame() {
      gameState = 'playing';
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      loadingScreen.style.display = 'none';
      player.x = 0;
      player.y = 10;
      player.z = 0;
      player.vx = 0;
      player.vy = 0;
      player.vz = 0;
      player.onGround = false;
      camera.x = 0;
      camera.y = 0;
      camera.z = 0;
      camera.rotationX = 0;
      camera.rotationY = 0;
      chunks = {};
      world = {};
      generateWorld();
      requestAnimationFrame(gameLoop);
    }

    // === ローディングシミュレーション ===
    function simulateLoading() {
      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 10;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          setTimeout(() => {
            startGame();
          }, 500);
        }
        loadingProgress.style.width = `${progress}%`;
      }, 100);
    }

    // === ワールド生成 ===
    function generateWorld() {
      const centerX = 0;
      const centerZ = 0;

      for (let x = -WORLD_SIZE; x <= WORLD_SIZE; x++) {
        for (let z = -WORLD_SIZE; z <= WORLD_SIZE; z++) {
          const chunkX = Math.floor(x / CHUNK_SIZE);
          const chunkZ = Math.floor(z / CHUNK_SIZE);
          const chunkKey = `${chunkX},${chunkZ}`;
          if (!chunks[chunkKey]) {
            chunks[chunkKey] = generateChunk(chunkX, chunkZ);
          }
        }
      }
    }

    // === チャンク生成 ===
    function generateChunk(chunkX, chunkZ) {
      const chunk = [];
      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const height = Math.floor(5 + Math.sin(x * 0.2) * 3 + Math.cos(z * 0.3) * 3);
          for (let y = 0; y < CHUNK_HEIGHT; y++) {
            if (y < height) {
              const blockType = y === height - 1 ? 'GRASS' : (y < height - 3 ? 'DIRT' : 'STONE');
              chunk.push({ x: chunkX * CHUNK_SIZE + x, y, z: chunkZ * CHUNK_SIZE + z, type: blockType });
            }
          }
        }
      }
      return chunk;
    }

    // === ゲームループ ===
    function gameLoop(timestamp) {
      if (gameState !== 'playing') return;

      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      if (deltaTime > 0) {
        fps = Math.round(1000 / deltaTime);
        frameCount++;
        if (timestamp - lastFpsUpdate > 1000) {
          debug.textContent = `FPS: ${fps}`;
          lastFpsUpdate = timestamp;
        }
      }

      updatePlayer(deltaTime);
      render();
      requestAnimationFrame(gameLoop);
    }

    // === プレイヤー更新 ===
    function updatePlayer(deltaTime) {
      player.vy -= GRAVITY;
      player.x += player.vx;
      player.y += player.vy;
      player.z += player.vz;

      // 地面との衝突判定
      const groundHeight = getGroundHeight(player.x, player.z);
      if (player.y <= groundHeight) {
        player.y = groundHeight;
        player.vy = 0;
        player.onGround = true;
      } else {
        player.onGround = false;
      }

      // カメラ位置更新
      camera.x = player.x;
      camera.y = player.y + 1;
      camera.z = player.z;
    }

    // === 地面の高さ取得 ===
    function getGroundHeight(x, z) {
      const chunkX = Math.floor(x / CHUNK_SIZE);
      const chunkZ = Math.floor(z / CHUNK_SIZE);
      const chunkKey = `${chunkX},${chunkZ}`;
      if (chunks[chunkKey]) {
        const chunk = chunks[chunkKey];
        const block = chunk.find(b => b.x === x && b.z === z);
        return block ? block.y + 1 : 0;
      }
      return 0;
    }

    // === 描画 ===
    function render() {
      gameCanvas.innerHTML = '';
      const centerX = gameCanvas.offsetWidth / 2;
      const centerY = gameCanvas.offsetHeight / 2;

      for (let x = -WORLD_SIZE; x <= WORLD_SIZE; x++) {
        for (let z = -WORLD_SIZE; z <= WORLD_SIZE; z++) {
          const chunkX = Math.floor(x / CHUNK_SIZE);
          const chunkZ = Math.floor(z / CHUNK_SIZE);
          const chunkKey = `${chunkX},${chunkZ}`;
          if (chunks[chunkKey]) {
            const chunk = chunks[chunkKey];
            const block = chunk.find(b => b.x === x && b.z === z);
            if (block && block.y > 0) {
              const screenX = centerX + (x - camera.x) * BLOCK_SIZE;
              const screenY = centerY + (z - camera.z) * BLOCK_SIZE;
              const blockEl = document.createElement('div');
              blockEl.style.position = 'absolute';
              blockEl.style.left = `${screenX}px`;
              blockEl.style.top = `${screenY}px`;
              blockEl.style.width = `${BLOCK_SIZE}px`;
              blockEl.style.height = `${BLOCK_SIZE}px`;
              blockEl.style.backgroundColor = BLOCK_COLORS[block.type];
              blockEl.style.border = '1px solid black';
              blockEl.textContent = BLOCK_TYPES[block.type];
              gameCanvas.appendChild(blockEl);
            }
          }
        }
      }
    }

    // === タッチ操作 ===
    function handleTouchStart(e) {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      isDragging = true;
      e.preventDefault();
    }

    function handleTouchMove(e) {
      if (!isDragging) return;
      const touch = e.touches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      player.rotationY += deltaX * 0.01;
      player.rotationX += deltaY * 0.01;
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      e.preventDefault();
    }

    function handleTouchEnd() {
      isDragging = false;
    }

    // === マウス操作 ===
    function handleMouseDown(e) {
      isDragging = true;
      touchStartX = e.clientX;
      touchStartY = e.clientY;
      e.preventDefault();
    }

    function handleMouseMove(e) {
      if (!isDragging) return;
      const deltaX = e.clientX - touchStartX;
      const deltaY = e.clientY - touchStartY;
      player.rotationY += deltaX * 0.01;
      player.rotationX += deltaY * 0.01;
      touchStartX = e.clientX;
      touchStartY = e.clientY;
      e.preventDefault();
    }

    function handleMouseUp() {
      isDragging = false;
    }

    // === キーボード操作 ===
    function handleKeyDown(e) {
      switch (e.key) {
        case 'ArrowUp':
        case 'w':
          player.vz = -MOVE_SPEED;
          break;
        case 'ArrowDown':
        case 's':
          player.vz = MOVE_SPEED;
          break;
        case 'ArrowLeft':
        case 'a':
          player.vx = -MOVE_SPEED;
          break;
        case 'ArrowRight':
        case 'd':
          player.vx = MOVE_SPEED;
          break;
        case ' ':
          jump();
          break;
        case 'p':
          placeBlock();
          break;
        case 'b':
          breakBlock();
          break;
      }
    }

    function handleKeyUp(e) {
      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'ArrowDown':
        case 's':
          player.vz = 0;
          break;
        case 'ArrowLeft':
        case 'a':
        case 'ArrowRight':
        case 'd':
          player.vx = 0;
          break;
      }
    }

    // === ジャンプ ===
    function jump() {
      if (player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
      }
    }

    // === ブロック設置 ===
    function placeBlock() {
      const block = {
        x: Math.floor(player.x),
        y: Math.floor(player.y),
        z: Math.floor(player.z),
        type: player.selectedBlock
      };
      const chunkX = Math.floor(block.x / CHUNK_SIZE);
      const chunkZ = Math.floor(block.z / CHUNK_SIZE);
      const chunkKey = `${chunkX},${chunkZ}`;
      if (!chunks[chunkKey]) {
        chunks[chunkKey] = generateChunk(chunkX, chunkZ);
      }
      chunks[chunkKey].push(block);
    }

    // === ブロック破壊 ===
    function breakBlock() {
      const chunkX = Math.floor(player.x / CHUNK_SIZE);
      const chunkZ = Math.floor(player.z / CHUNK_SIZE);
      const chunkKey = `${chunkX},${chunkZ}`;
      if (chunks[chunkKey]) {
        const index = chunks[chunkKey].findIndex(b => b.x === Math.floor(player.x) && b.z === Math.floor(player.z) && b.y === Math.floor(player.y));
        if (index !== -1) {
          chunks[chunkKey].splice(index, 1);
        }
      }
    }

    // === 初期化実行 ===
    window.onload = init;
  </script>
</body>
</html>
