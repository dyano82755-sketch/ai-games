<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>フライトシュミレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #1a2980, #26d0ce);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        #cockpit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            z-index: 10;
        }

        #sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB, #1E90FF);
            z-index: 1;
        }

        #aircraft {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            z-index: 20;
            transition: transform 0.1s ease;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 2;
        }

        .obstacle {
            position: absolute;
            background: #8B4513;
            z-index: 5;
        }

        .obstacle-top {
            border-bottom: 10px solid #654321;
        }

        .obstacle-bottom {
            border-top: 10px solid #654321;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 30;
            color: white;
            text-align: center;
        }

        #game-over-screen {
            display: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .score-display {
            font-size: 2rem;
            margin: 10px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px 0;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        #instructions {
            font-size: 1.2rem;
            max-width: 80%;
            line-height: 1.6;
            margin: 20px 0;
        }

        #altitude-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: white;
            z-index: 25;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
        }

        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: white;
            z-index: 25;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        #touch-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 25;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            user-select: none;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="sky">
            <div class="stars" id="stars"></div>
        </div>
        <div id="cockpit"></div>
        <div id="aircraft">✈️</div>
        <div id="altitude-display">高度: 0m</div>
        <div id="score-display">スコア: 0</div>
        <div id="touch-area"></div>
        
        <div id="start-screen">
            <h1>✈️ フライトシュミレーター ✈️</h1>
            <div id="instructions">
                <p>タップして飛行機を上昇させ、障害物を避けましょう！</p>
                <p>空中を滑空するように操作してください</p>
                <p>スコアが高くなるほどスピードが上がります！</p>
            </div>
            <button id="start-button">ゲーム開始</button>
        </div>
        
        <div id="game-over-screen">
            <h1>💥 ゲームオーバー 💥</h1>
            <div class="score-display">最終スコア: <span id="final-score">0</span></div>
            <div class="score-display">最高高度: <span id="max-altitude">0</span>m</div>
            <button id="restart-button">もう一度</button>
        </div>
        
        <div id="controls">
            <div class="control-btn" id="up-btn">↑</div>
            <div class="control-btn" id="down-btn">↓</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲーム状態管理
            const gameState = {
                isPlaying: false,
                score: 0,
                altitude: 0,
                maxAltitude: 0,
                aircraftY: 0,
                aircraftX: 0,
                obstacles: [],
                gameSpeed: 2,
                lastObstacleTime: 0,
                touchStartY: 0,
                isTouching: false,
                clouds: [],
                stars: []
            };

            // DOM要素
            const gameContainer = document.getElementById('game-container');
            const startScreen = document.getElementById('start-screen');
            const gameOverScreen = document.getElementById('game-over-screen');
            const startButton = document.getElementById('start-button');
            const restartButton = document.getElementById('restart-button');
            const aircraft = document.getElementById('aircraft');
            const altitudeDisplay = document.getElementById('altitude-display');
            const scoreDisplay = document.getElementById('score-display');
            const finalScoreElement = document.getElementById('final-score');
            const maxAltitudeElement = document.getElementById('max-altitude');
            const touchArea = document.getElementById('touch-area');
            const upBtn = document.getElementById('up-btn');
            const downBtn = document.getElementById('down-btn');
            const starsContainer = document.getElementById('stars');

            // 星の生成
            function generateStars() {
                starsContainer.innerHTML = '';
                for (let i = 0; i < 100; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.width = `${Math.random() * 3 + 1}px`;
                    star.style.height = star.style.width;
                    star.style.left = `${Math.random() * 100}%`;
                    star.style.top = `${Math.random() * 100}%`;
                    star.style.opacity = Math.random() * 0.8 + 0.2;
                    starsContainer.appendChild(star);
                }
            }

            // 雲の生成
            function generateClouds() {
                gameState.clouds = [];
                for (let i = 0; i < 15; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'cloud';
                    cloud.style.width = `${Math.random() * 100 + 50}px`;
                    cloud.style.height = `${Math.random() * 40 + 20}px`;
                    cloud.style.left = `${Math.random() * 100}%`;
                    cloud.style.top = `${Math.random() * 100}%`;
                    cloud.style.opacity = Math.random() * 0.5 + 0.3;
                    cloud.style.zIndex = 2;
                    gameContainer.appendChild(cloud);
                    gameState.clouds.push(cloud);
                }
            }

            // ゲーム初期化
            function initGame() {
                gameState.isPlaying = true;
                gameState.score = 0;
                gameState.altitude = 0;
                gameState.maxAltitude = 0;
                gameState.aircraftY = 0;
                gameState.aircraftX = 0;
                gameState.obstacles = [];
                gameState.gameSpeed = 2;
                gameState.lastObstacleTime = 0;
                gameState.isTouching = false;

                // 障害物を削除
                document.querySelectorAll('.obstacle').forEach(el => el.remove());

                // 表示更新
                updateDisplays();
                aircraft.style.transform = 'translate(-50%, -50%)';
                
                // ゲーム画面表示
                startScreen.style.display = 'none';
                gameOverScreen.style.display = 'none';
            }

            // 表示更新
            function updateDisplays() {
                altitudeDisplay.textContent = `高度: ${Math.floor(gameState.altitude)}m`;
                scoreDisplay.textContent = `スコア: ${gameState.score}`;
            }

            // 障害物生成
            function createObstacle() {
                const obstacle = document.createElement('div');
                obstacle.className = 'obstacle';
                
                const gap = 150 + Math.random() * 100;
                const topHeight = Math.random() * (window.innerHeight - gap - 200) + 100;
                
                obstacle.style.width = '40px';
                obstacle.style.height = `${topHeight}px`;
                obstacle.style.left = `${window.innerWidth}px`;
                obstacle.style.top = '0';
                obstacle.style.zIndex = 5;
                
                const obstacleBottom = document.createElement('div');
                obstacleBottom.className = 'obstacle';
                obstacleBottom.style.width = '40px';
                obstacleBottom.style.height = `${window.innerHeight - topHeight - gap}px`;
                obstacleBottom.style.left = `${window.innerWidth}px`;
                obstacleBottom.style.bottom = '0';
                obstacleBottom.style.zIndex = 5;
                
                gameContainer.appendChild(obstacle);
                gameContainer.appendChild(obstacleBottom);
                
                gameState.obstacles.push({
                    element: obstacle,
                    bottomElement: obstacleBottom,
                    x: window.innerWidth,
                    topHeight: topHeight,
                    gap: gap,
                    passed: false
                });
            }

            // ゲームループ
            function gameLoop() {
                if (!gameState.isPlaying) return;

                // 障害物移動
                gameState.obstacles.forEach((obstacle, index) => {
                    obstacle.x -= gameState.gameSpeed;
                    obstacle.element.style.left = `${obstacle.x}px`;
                    obstacle.bottomElement.style.left = `${obstacle.x}px`;
                    
                    // 通過判定
                    if (!obstacle.passed && obstacle.x < window.innerWidth / 2 - 20) {
                        obstacle.passed = true;
                        gameState.score += 10;
                    }
                    
                    // 削除判定
                    if (obstacle.x < -50) {
                        obstacle.element.remove();
                        obstacle.bottomElement.remove();
                        gameState.obstacles.splice(index, 1);
                    }
                });

                // 障害物生成
                if (gameState.obstacles.length === 0 || gameState.obstacles[gameState.obstacles.length - 1].x < window.innerWidth - 300) {
                    createObstacle();
                }

                // ゲームスピードアップ
                if (gameState.score > 0 && gameState.score % 100 === 0) {
                    gameState.gameSpeed = 2 + Math.floor(gameState.score / 100) * 0.5;
                }

                // 高度更新
                gameState.altitude = Math.max(0, gameState.altitude + 0.2);
                gameState.maxAltitude = Math.max(gameState.maxAltitude, gameState.altitude);

                // 表示更新
                updateDisplays();

                // ゲームオーバー判定
                checkGameOver();

                requestAnimationFrame(gameLoop);
            }

            // ゲームオーバー判定
            function checkGameOver() {
                const aircraftRect = aircraft.getBoundingClientRect();
                const aircraftCenterX = aircraftRect.left + aircraftRect.width / 2;
                const aircraftCenterY = aircraftRect.top + aircraftRect.height / 2;

                // 障害物との衝突判定
                gameState.obstacles.forEach(obstacle => {
                    const obstacleRect = obstacle.element.getBoundingClientRect();
                    const obstacleBottomRect = obstacle.bottomElement.getBoundingClientRect();
                    
                    if (aircraftCenterX > obstacleRect.left && 
                        aircraftCenterX < obstacleRect.right &&
                        (aircraftCenterY < obstacleRect.bottom || aircraftCenterY > obstacleBottomRect.top)) {
                        endGame();
                    }
                });

                // 地面との衝突判定
                if (aircraftCenterY > window.innerHeight - 50) {
                    endGame();
                }
            }

            // ゲーム終了
            function endGame() {
                gameState.isPlaying = false;
                finalScoreElement.textContent = gameState.score;
                maxAltitudeElement.textContent = Math.floor(gameState.maxAltitude);
                gameOverScreen.style.display = 'flex';
            }

            // タッチイベント
            function handleTouchStart(e) {
                if (!gameState.isPlaying) return;
                gameState.isTouching = true;
                e.preventDefault();
            }

            function handleTouchMove(e) {
                if (!gameState.isPlaying || !gameState.isTouching) return;
                
                const touch = e.touches[0];
                const rect = gameContainer.getBoundingClientRect();
                const touchY = touch.clientY - rect.top;
                const targetY = touchY - aircraft.offsetHeight / 2;
                
                gameState.aircraftY = Math.max(0, Math.min(targetY, window.innerHeight - aircraft.offsetHeight));
                aircraft.style.transform = `translate(-50%, -50%) translateY(${gameState.aircraftY}px)`;
                
                e.preventDefault();
            }

            function handleTouchEnd() {
                gameState.isTouching = false;
            }

            // キーボード操作
            function handleKeyDown(e) {
                if (!gameState.isPlaying) return;
                
                if (e.key === 'ArrowUp' || e.key === 'w') {
                    gameState.aircraftY = Math.max(0, gameState.aircraftY - 20);
                    aircraft.style.transform = `translate(-50%, -50%) translateY(${gameState.aircraftY}px)`;
                } else if (e.key === 'ArrowDown' || e.key === 's') {
                    gameState.aircraftY = Math.min(window.innerHeight - aircraft.offsetHeight, gameState.aircraftY + 20);
                    aircraft.style.transform = `translate(-50%, -50%) translateY(${gameState.aircraftY}px)`;
                }
            }

            // ボタン操作
            function handleUpBtn() {
                if (gameState.isPlaying) {
                    gameState.aircraftY = Math.max(0, gameState.aircraftY - 20);
                    aircraft.style.transform = `translate(-50%, -50%) translateY(${gameState.aircraftY}px)`;
                }
            }

            function handleDownBtn() {
                if (gameState.isPlaying) {
                    gameState.aircraftY = Math.min(window.innerHeight - aircraft.offsetHeight, gameState.aircraftY + 20);
                    aircraft.style.transform = `translate(-50%, -50%) translateY(${gameState.aircraftY}px)`;
                }
            }

            // イベントリスナー
            startButton.addEventListener('click', () => {
                initGame();
                gameLoop();
            });

            restartButton.addEventListener('click', () => {
                initGame();
                gameLoop();
            });

            touchArea.addEventListener('touchstart', handleTouchStart);
            touchArea.addEventListener('touchmove', handleTouchMove);
            touchArea.addEventListener('touchend', handleTouchEnd);

            document.addEventListener('keydown', handleKeyDown);

            upBtn.addEventListener('click', handleUpBtn);
            downBtn.addEventListener('click', handleDownBtn);

            // 初期化
            generateStars();
            generateClouds();
            aircraft.style.transform = 'translate(-50%, -50%)';
        });
    </script>
</body>
</html>
