<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ことわざクロスワード</title>
<style>
  :root {
    --ink: #26313a;
    --muted: #667582;
    --paper: #f8f0df;
    --paper-deep: #e4cb9e;
    --line: #26313a;
    --thin: rgba(38,49,58,0.22);
    --blue: #2e77b8;
    --blue-soft: #dceffc;
    --green: #2f8a61;
    --green-soft: #e1f3e7;
    --red: #c84c43;
    --red-soft: #ffe4df;
    --gold: #d8a63c;
    --black: #1b2229;
    --shadow: rgba(18,24,30,0.28);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    min-height: 100dvh;
    overflow-x: hidden;
    color: var(--ink);
    background:
      linear-gradient(135deg, rgba(216,166,60,0.18), rgba(46,119,184,0.18)),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.055) 0 8px, rgba(0,0,0,0.035) 8px 16px),
      #27313a;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  button {
    font: inherit;
    touch-action: manipulation;
  }

  .app {
    width: min(1200px, 100%);
    height: 100dvh;
    min-height: 100dvh;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
    padding: 10px;
  }

  .topbar,
  .panel,
  .input-panel,
  .modal-card {
    border: 2px solid rgba(38,49,58,0.78);
    border-radius: 8px;
    box-shadow: 0 8px 24px var(--shadow);
  }

  .topbar {
    min-height: 70px;
    display: grid;
    grid-template-columns: minmax(210px, 1fr) repeat(4, auto);
    gap: 8px;
    align-items: center;
    padding: 9px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.06)),
      var(--paper);
  }

  .brand {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 48px;
    height: 48px;
    flex: 0 0 auto;
    display: grid;
    place-items: center;
    color: #fff;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background:
      radial-gradient(circle at 35% 25%, rgba(255,255,255,0.4), transparent 26%),
      linear-gradient(160deg, var(--green), var(--blue));
    font-size: 1.35rem;
    font-weight: 900;
  }

  .brand-title {
    min-width: 0;
    display: grid;
    gap: 2px;
  }

  .brand-title strong {
    font-size: 1.2rem;
    line-height: 1.1;
  }

  .brand-title span {
    color: var(--muted);
    font-size: 0.84rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat {
    min-width: 86px;
    min-height: 46px;
    display: grid;
    align-content: center;
    gap: 2px;
    padding: 6px 9px;
    text-align: center;
    border: 1px solid var(--thin);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
  }

  .stat span {
    color: var(--muted);
    font-size: 0.72rem;
    line-height: 1;
  }

  .stat b {
    font-size: 1rem;
    line-height: 1.12;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(330px, 1fr) minmax(300px, 360px);
    gap: 10px;
    align-items: stretch;
    min-height: 0;
  }

  .board-zone {
    min-width: 0;
    min-height: 0;
    display: grid;
    place-items: center;
  }

  .board-frame {
    width: min(100%, calc(100dvh - 300px), 660px);
    min-width: 310px;
    aspect-ratio: 1;
    padding: 8px;
    border: 3px solid #101820;
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.18), rgba(0,0,0,0.16)),
      #d9c49c;
    box-shadow: 0 14px 32px rgba(0,0,0,0.36);
  }

  #board {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    gap: 1px;
    background: var(--line);
    border: 3px solid var(--line);
  }

  .cell {
    position: relative;
    display: grid;
    place-items: center;
    min-width: 0;
    min-height: 0;
    padding: 0;
    border: 0;
    border-radius: 0;
    background: #fffdf7;
    color: var(--blue);
    cursor: pointer;
    font-weight: 900;
    font-size: clamp(0.84rem, 3.1vmin, 1.55rem);
    line-height: 1;
  }

  .cell.black {
    background:
      linear-gradient(135deg, rgba(255,255,255,0.08), transparent 36%),
      var(--black);
    cursor: default;
  }

  .cell.active {
    background: #ffe4a0;
    box-shadow: inset 0 0 0 3px var(--gold);
  }

  .cell.word {
    background: var(--blue-soft);
  }

  .cell.solved {
    color: var(--green);
    background: var(--green-soft);
  }

  .cell.error {
    color: var(--red);
    background: var(--red-soft);
  }

  .cell.revealed {
    color: var(--green);
  }

  .num {
    position: absolute;
    top: 2px;
    left: 3px;
    color: #586571;
    font-size: clamp(0.42rem, 1.15vmin, 0.66rem);
    font-weight: 800;
    line-height: 1;
  }

  .panel {
    min-width: 0;
    min-height: 0;
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
    gap: 10px;
    padding: 12px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.36), rgba(255,255,255,0.04)),
      var(--paper);
    overflow: hidden;
  }

  .current-card {
    display: grid;
    gap: 8px;
    padding: 10px;
    border: 1px solid var(--thin);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
  }

  .current-card h2 {
    margin: 0;
    font-size: 1rem;
  }

  .pattern {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .pattern span {
    min-width: 28px;
    height: 32px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(38,49,58,0.24);
    border-radius: 6px;
    background: #fffdf7;
    color: var(--blue);
    font-weight: 900;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 7px;
  }

  .btn,
  .char-btn {
    min-height: 40px;
    border: 2px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    background: linear-gradient(180deg, #fff8e8, var(--paper-deep));
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(38,49,58,0.44);
  }

  .btn.blue {
    color: #fff;
    background: linear-gradient(180deg, #4fa4df, var(--blue));
  }

  .btn.green {
    color: #fff;
    background: linear-gradient(180deg, #4fbf82, var(--green));
  }

  .btn.red {
    color: #fff;
    background: linear-gradient(180deg, #e66a61, var(--red));
  }

  .btn:active,
  .char-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(38,49,58,0.44);
  }

  .clues {
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    overflow: hidden;
  }

  .clue-column {
    min-width: 0;
    min-height: 0;
    overflow: auto;
  }

  .clue-column h2 {
    position: sticky;
    top: 0;
    z-index: 1;
    margin: 0 0 6px;
    padding: 3px 0 5px;
    background: var(--paper);
    font-size: 0.95rem;
  }

  .clue-list {
    display: grid;
    gap: 6px;
  }

  .clue {
    width: 100%;
    min-height: 48px;
    padding: 7px 8px;
    border: 1px solid var(--thin);
    border-radius: 8px;
    background: rgba(255,255,255,0.52);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.35;
    font-weight: 700;
  }

  .clue.active {
    color: #fff;
    background: var(--blue);
  }

  .clue.solved {
    color: var(--green);
    background: var(--green-soft);
  }

  .input-panel {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) minmax(300px, 620px);
    gap: 10px;
    align-items: center;
    min-height: 112px;
    padding: 10px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.04)),
      var(--paper-deep);
  }

  .hint-text {
    min-width: 0;
    color: #493824;
    font-weight: 760;
    line-height: 1.38;
  }

  .palette {
    display: grid;
    grid-template-columns: repeat(10, minmax(28px, 1fr));
    gap: 5px;
  }

  .char-btn {
    min-width: 0;
    min-height: 34px;
    padding: 0;
    font-size: 0.95rem;
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    place-items: center;
    padding: 16px;
    background: rgba(20, 24, 28, 0.55);
  }

  .modal.show {
    display: grid;
  }

  .modal-card {
    width: min(540px, 100%);
    padding: 18px;
    text-align: center;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.44), rgba(255,255,255,0.05)),
      var(--paper);
  }

  .modal-card strong {
    display: block;
    font-size: 1.85rem;
    line-height: 1.12;
  }

  .modal-card p {
    margin: 10px auto 0;
    max-width: 450px;
    color: #586571;
    line-height: 1.55;
  }

  .modal-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  @media (max-width: 920px) {
    body {
      overflow: auto;
    }

    .app {
      height: auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      grid-template-columns: 1fr repeat(2, auto);
      order: 1;
    }

    .topbar .stat:nth-of-type(n+4) {
      display: none;
    }

    .main {
      display: contents;
    }

    .board-zone {
      order: 2;
    }

    .input-panel {
      grid-template-columns: 1fr;
      order: 3;
    }

    .panel {
      overflow: visible;
      grid-template-rows: auto;
      order: 4;
    }

    .board-frame {
      width: min(96vw, 58dvh, 720px);
    }

    .clues {
      max-height: 270px;
    }

    .palette {
      grid-template-columns: repeat(8, minmax(0, 1fr));
    }
  }

  @media (max-width: 560px) {
    .app {
      gap: 7px;
      padding: 7px;
    }

    .topbar {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      min-height: 0;
    }

    .brand {
      grid-column: 1 / -1;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      font-size: 1.1rem;
    }

    .brand-title strong {
      font-size: 1.05rem;
    }

    .stat {
      min-width: 0;
      min-height: 38px;
      padding: 5px 4px;
    }

    .board-frame {
      width: min(92vw, 40dvh);
      min-width: 286px;
      padding: 5px;
    }

    .panel {
      padding: 8px;
      gap: 8px;
    }

    .current-card {
      padding: 8px;
    }

    .actions {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .btn {
      min-height: 34px;
      padding: 3px 4px;
      font-size: 0.78rem;
    }

    .clues {
      grid-template-columns: 1fr;
      max-height: 170px;
    }

    .input-panel {
      padding: 7px;
    }

    .palette {
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 5px;
    }

    .char-btn {
      min-height: 30px;
      font-size: 0.86rem;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">諺</div>
      <div class="brand-title">
        <strong>ことわざクロスワード</strong>
        <span id="statusText">ことわざの空欄をかなで埋めよう</span>
      </div>
    </div>
    <div class="stat"><span>TIME</span><b id="timerText">00:00</b></div>
    <div class="stat"><span>SOLVE</span><b id="solveText">0/0</b></div>
    <div class="stat"><span>MISS</span><b id="missText">0</b></div>
    <div class="stat"><span>HINT</span><b id="hintTextTop">0</b></div>
  </header>

  <main class="main">
    <section class="board-zone" aria-label="クロスワード盤面">
      <div class="board-frame">
        <div id="board" role="grid" aria-label="15x15 ことわざクロスワード盤面"></div>
      </div>
    </section>

    <aside class="panel">
      <section class="current-card">
        <h2 id="currentTitle">ヒントを選択</h2>
        <div id="currentClue">横または縦のヒントを選んでください。</div>
        <div class="pattern" id="pattern"></div>
      </section>

      <div class="actions">
        <button class="btn blue" id="checkBtn" type="button">チェック</button>
        <button class="btn green" id="hintBtn" type="button">一文字</button>
        <button class="btn" id="eraseBtn" type="button">消す</button>
        <button class="btn" id="nextBtn" type="button">次のヒント</button>
        <button class="btn" id="revealBtn" type="button">答え</button>
        <button class="btn red" id="newBtn" type="button">最初から</button>
      </div>

      <section class="clues">
        <div class="clue-column">
          <h2>ヨコ</h2>
          <div class="clue-list" id="acrossList"></div>
        </div>
        <div class="clue-column">
          <h2>タテ</h2>
          <div class="clue-list" id="downList"></div>
        </div>
      </section>
    </aside>
  </main>

  <footer class="input-panel">
    <div class="hint-text" id="hintText">盤面またはヒントを選んで、下の文字を押してください。Backspaceで消せます。</div>
    <div class="palette" id="palette" aria-label="かな入力"></div>
  </footer>
</div>

<div class="modal show" id="modal">
  <div class="modal-card">
    <strong id="modalTitle">ことわざクロスワード</strong>
    <p id="modalText">ことわざの一部が答えになっています。交差する文字を手がかりに、かなで埋めていきましょう。</p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
(() => {
  const SIZE = 15;
  const ENTRIES = [
    { id: "D1", dir: "down", row: 3, col: 7, answer: "かっぱのかわながれ", clue: "得意な人でも失敗すること。『河童の川流れ』" },
    { id: "A1", dir: "across", row: 9, col: 6, answer: "たなからぼたもち", clue: "思いがけない幸運。『棚からぼたもち』" },
    { id: "D2", dir: "down", row: 6, col: 11, answer: "えびでたいをつる", clue: "小さな元手で大きな利益。『海老で鯛を釣る』" },
    { id: "A2", dir: "across", row: 12, col: 8, answer: "ちりもつもれば", clue: "小さなものも積もれば大きくなる。" },
    { id: "A3", dir: "across", row: 3, col: 4, answer: "おににかなぼう", clue: "強いものがさらに強くなる。" },
    { id: "D3", dir: "down", row: 1, col: 5, answer: "ぶたにしんじゅ", clue: "価値が分からない相手にはもったいない。" },
    { id: "D4", dir: "down", row: 4, col: 13, answer: "まけるがかち", clue: "争わず譲る方がよいこともある。" },
    { id: "A4", dir: "across", row: 5, col: 0, answer: "ねこにこばん", clue: "価値が分からない相手にはもったいない。" },
    { id: "A5", dir: "across", row: 1, col: 4, answer: "あぶらにひ", clue: "勢いをさらに強める。『油に火』" },
    { id: "D5", dir: "down", row: 3, col: 0, answer: "さんねん", clue: "石の上にも〇〇〇〇。" },
    { id: "D6", dir: "down", row: 2, col: 2, answer: "やまのにぎわい", clue: "枯れ木も山の〇〇〇〇〇〇。" }
  ];

  const el = {
    board: document.getElementById("board"),
    acrossList: document.getElementById("acrossList"),
    downList: document.getElementById("downList"),
    currentTitle: document.getElementById("currentTitle"),
    currentClue: document.getElementById("currentClue"),
    pattern: document.getElementById("pattern"),
    palette: document.getElementById("palette"),
    status: document.getElementById("statusText"),
    timer: document.getElementById("timerText"),
    solve: document.getElementById("solveText"),
    miss: document.getElementById("missText"),
    hints: document.getElementById("hintTextTop"),
    hintText: document.getElementById("hintText"),
    check: document.getElementById("checkBtn"),
    hint: document.getElementById("hintBtn"),
    erase: document.getElementById("eraseBtn"),
    next: document.getElementById("nextBtn"),
    reveal: document.getElementById("revealBtn"),
    fresh: document.getElementById("newBtn"),
    modal: document.getElementById("modal"),
    modalTitle: document.getElementById("modalTitle"),
    modalText: document.getElementById("modalText"),
    modalActions: document.getElementById("modalActions")
  };

  const state = {
    solution: Array(SIZE * SIZE).fill(null),
    numbers: new Map(),
    cellEntries: Array.from({ length: SIZE * SIZE }, () => []),
    values: Array(SIZE * SIZE).fill(""),
    revealed: new Set(),
    errors: new Set(),
    solved: new Set(),
    activeId: ENTRIES[0].id,
    selected: -1,
    misses: 0,
    hints: 0,
    startedAt: 0,
    timerId: null
  };

  function indexOf(row, col) {
    return row * SIZE + col;
  }

  function rowOf(index) {
    return Math.floor(index / SIZE);
  }

  function colOf(index) {
    return index % SIZE;
  }

  function entryCells(entry) {
    const cells = [];
    for (let i = 0; i < entry.answer.length; i++) {
      const row = entry.row + (entry.dir === "down" ? i : 0);
      const col = entry.col + (entry.dir === "across" ? i : 0);
      cells.push(indexOf(row, col));
    }
    return cells;
  }

  function buildSolution() {
    state.solution.fill(null);
    state.cellEntries = Array.from({ length: SIZE * SIZE }, () => []);
    ENTRIES.forEach(entry => {
      entryCells(entry).forEach((index, offset) => {
        const char = entry.answer[offset];
        if (state.solution[index] && state.solution[index] !== char) {
          throw new Error("Crossword conflict");
        }
        state.solution[index] = char;
        state.cellEntries[index].push(entry.id);
      });
    });

    const starts = [...new Set(ENTRIES.map(entry => `${entry.row},${entry.col}`))]
      .map(key => {
        const [row, col] = key.split(",").map(Number);
        return { key, row, col };
      })
      .sort((a, b) => a.row - b.row || a.col - b.col);
    state.numbers = new Map(starts.map((start, i) => [start.key, i + 1]));
    ENTRIES.forEach(entry => {
      entry.number = state.numbers.get(`${entry.row},${entry.col}`);
    });
  }

  function activeEntry() {
    return ENTRIES.find(entry => entry.id === state.activeId) || ENTRIES[0];
  }

  function orderedEntries() {
    return ENTRIES.slice().sort((a, b) => {
      const dirA = a.dir === "across" ? 0 : 1;
      const dirB = b.dir === "across" ? 0 : 1;
      return a.number - b.number || dirA - dirB;
    });
  }

  function directionLabel(dir) {
    return dir === "across" ? "ヨコ" : "タテ";
  }

  function formatTime() {
    if (!state.startedAt) return "00:00";
    const total = Math.floor((Date.now() - state.startedAt) / 1000);
    return `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
  }

  function resetGame() {
    buildSolution();
    state.values = Array(SIZE * SIZE).fill("");
    state.revealed = new Set();
    state.errors = new Set();
    state.solved = new Set();
    state.activeId = orderedEntries()[0].id;
    state.selected = entryCells(activeEntry())[0];
    state.misses = 0;
    state.hints = 0;
    state.startedAt = Date.now();
    if (state.timerId) clearInterval(state.timerId);
    state.timerId = setInterval(updateTimer, 500);
    hideModal();
    updateAll();
    setHint("ことわざのヒントを選んで、かなを入れていきましょう。");
  }

  function updateTimer() {
    el.timer.textContent = formatTime();
  }

  function setHint(text) {
    el.hintText.textContent = text;
  }

  function selectEntry(id, preferredCell = null) {
    state.activeId = id;
    const cells = entryCells(activeEntry());
    if (preferredCell !== null && cells.includes(preferredCell)) state.selected = preferredCell;
    else state.selected = cells.find(index => !state.values[index]) ?? cells[0];
    state.errors.clear();
    updateAll();
  }

  function selectCell(index) {
    if (!state.solution[index]) return;
    const entries = state.cellEntries[index];
    if (!entries.length) return;
    const current = activeEntry();
    if (entries.includes(current.id)) {
      state.selected = index;
    } else {
      selectEntry(entries[0], index);
      return;
    }
    state.errors.clear();
    updateAll();
  }

  function inputChar(char) {
    const entry = activeEntry();
    const cells = entryCells(entry);
    if (!cells.includes(state.selected)) state.selected = cells[0];
    state.values[state.selected] = char;
    state.revealed.delete(state.selected);
    state.errors.delete(state.selected);
    const nextBlank = cells.find(index => !state.values[index]);
    const currentPos = cells.indexOf(state.selected);
    state.selected = nextBlank ?? cells[Math.min(currentPos + 1, cells.length - 1)];
    updateAll();
    if (isEntryCorrect(entry)) markEntrySolved(entry);
  }

  function eraseChar() {
    if (state.selected < 0 || state.revealed.has(state.selected)) return;
    state.values[state.selected] = "";
    state.errors.delete(state.selected);
    updateAll();
  }

  function isEntryComplete(entry) {
    return entryCells(entry).every(index => state.values[index]);
  }

  function isEntryCorrect(entry) {
    return entryCells(entry).every((index, offset) => state.values[index] === entry.answer[offset]);
  }

  function checkActive() {
    const entry = activeEntry();
    const cells = entryCells(entry);
    if (!isEntryComplete(entry)) {
      setHint("まだ空いているマスがあります。まず最後まで埋めてみましょう。");
      return;
    }
    let wrong = false;
    cells.forEach((index, offset) => {
      if (state.values[index] !== entry.answer[offset]) {
        state.errors.add(index);
        wrong = true;
      }
    });
    if (wrong) {
      state.misses++;
      setHint("赤いマスを見直しましょう。交差することわざも手がかりです。");
    } else {
      markEntrySolved(entry);
      setHint("正解です。次のことわざへ進みましょう。");
    }
    updateAll();
  }

  function markEntrySolved(entry) {
    if (state.solved.has(entry.id)) return;
    state.solved.add(entry.id);
    entryCells(entry).forEach(index => state.errors.delete(index));
    if (state.solved.size === ENTRIES.length) finishGame();
    else updateAll();
  }

  function revealOne() {
    const entry = activeEntry();
    const cells = entryCells(entry);
    const target = cells.find(index => state.values[index] !== state.solution[index]);
    if (target === undefined) {
      setHint("このヒントはもう埋まっています。");
      return;
    }
    state.values[target] = state.solution[target];
    state.revealed.add(target);
    state.errors.delete(target);
    state.selected = target;
    state.hints++;
    if (isEntryCorrect(entry)) markEntrySolved(entry);
    updateAll();
  }

  function revealEntry() {
    showModal("答えを表示しますか？", "選択中のことわざの答えをすべて入れます。ヒント回数に加算されます。", [
      { label: "表示する", className: "green", action: () => {
        const entry = activeEntry();
        entryCells(entry).forEach(index => {
          state.values[index] = state.solution[index];
          state.revealed.add(index);
          state.errors.delete(index);
        });
        state.hints++;
        markEntrySolved(entry);
        hideModal();
        updateAll();
      }},
      { label: "戻る", className: "", action: hideModal }
    ]);
  }

  function nextEntry() {
    const entries = orderedEntries();
    const currentIndex = entries.findIndex(entry => entry.id === state.activeId);
    for (let i = 1; i <= entries.length; i++) {
      const next = entries[(currentIndex + i) % entries.length];
      if (!state.solved.has(next.id)) {
        selectEntry(next.id);
        return;
      }
    }
    selectEntry(entries[(currentIndex + 1) % entries.length].id);
  }

  function finishGame() {
    if (state.timerId) clearInterval(state.timerId);
    updateAll();
    showModal("完成！", `タイム ${formatTime()}。ミス ${state.misses}、一文字ヒント ${state.hints}。ことわざ力、かなりいい感じです。`, [
      { label: "もう一度", className: "blue", action: resetGame }
    ]);
  }

  function updateStats() {
    el.solve.textContent = `${state.solved.size}/${ENTRIES.length}`;
    el.miss.textContent = state.misses;
    el.hints.textContent = state.hints;
    el.status.textContent = `${activeEntry().number} ${directionLabel(activeEntry().dir)} を解いています`;
    updateTimer();
  }

  function renderBoard() {
    const entry = activeEntry();
    const activeCells = new Set(entryCells(entry));
    el.board.innerHTML = "";
    for (let index = 0; index < SIZE * SIZE; index++) {
      const cell = document.createElement("button");
      cell.type = "button";
      cell.className = "cell";
      const char = state.solution[index];
      if (!char) {
        cell.classList.add("black");
        el.board.appendChild(cell);
        continue;
      }

      const startEntry = ENTRIES.find(e => e.row === rowOf(index) && e.col === colOf(index));
      if (startEntry) {
        const num = document.createElement("span");
        num.className = "num";
        num.textContent = startEntry.number;
        cell.appendChild(num);
      }

      if (activeCells.has(index)) cell.classList.add("word");
      if (index === state.selected) cell.classList.add("active");
      if (state.errors.has(index)) cell.classList.add("error");
      if (state.revealed.has(index)) cell.classList.add("revealed");
      if (state.cellEntries[index].every(id => state.solved.has(id))) cell.classList.add("solved");

      const value = state.values[index];
      if (value) cell.append(document.createTextNode(value));
      cell.addEventListener("click", () => selectCell(index));
      el.board.appendChild(cell);
    }
  }

  function renderClues() {
    el.acrossList.innerHTML = "";
    el.downList.innerHTML = "";
    orderedEntries().forEach(entry => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "clue";
      if (entry.id === state.activeId) button.classList.add("active");
      if (state.solved.has(entry.id)) button.classList.add("solved");
      button.innerHTML = `<b>${entry.number}.</b> ${entry.clue}<br><small>${entry.answer.length}文字</small>`;
      button.addEventListener("click", () => selectEntry(entry.id));
      (entry.dir === "across" ? el.acrossList : el.downList).appendChild(button);
    });
  }

  function renderCurrent() {
    const entry = activeEntry();
    el.currentTitle.textContent = `${entry.number}. ${directionLabel(entry.dir)} / ${entry.answer.length}文字`;
    el.currentClue.textContent = entry.clue;
    el.pattern.innerHTML = "";
    entryCells(entry).forEach(index => {
      const slot = document.createElement("span");
      slot.textContent = state.values[index] || "□";
      el.pattern.appendChild(slot);
    });
  }

  function renderPalette() {
    const chars = [];
    ENTRIES.forEach(entry => {
      [...entry.answer].forEach(char => {
        if (!chars.includes(char)) chars.push(char);
      });
    });
    el.palette.innerHTML = "";
    chars.forEach(char => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "char-btn";
      button.textContent = char;
      button.addEventListener("click", () => inputChar(char));
      el.palette.appendChild(button);
    });
  }

  function updateAll() {
    updateStats();
    renderBoard();
    renderClues();
    renderCurrent();
    renderPalette();
  }

  function showModal(title, text, actions) {
    el.modalTitle.textContent = title;
    el.modalText.textContent = text;
    el.modalActions.innerHTML = "";
    actions.forEach(action => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `btn ${action.className || ""}`;
      button.textContent = action.label;
      button.addEventListener("click", action.action);
      el.modalActions.appendChild(button);
    });
    el.modal.classList.add("show");
  }

  function hideModal() {
    el.modal.classList.remove("show");
  }

  el.check.addEventListener("click", checkActive);
  el.hint.addEventListener("click", revealOne);
  el.erase.addEventListener("click", eraseChar);
  el.next.addEventListener("click", nextEntry);
  el.reveal.addEventListener("click", revealEntry);
  el.fresh.addEventListener("click", () => {
    showModal("最初から始めますか？", "入力した文字はリセットされます。", [
      { label: "始める", className: "blue", action: resetGame },
      { label: "戻る", className: "", action: hideModal }
    ]);
  });

  document.addEventListener("keydown", event => {
    if (el.modal.classList.contains("show") && event.key !== "Escape") return;
    if (event.key === "Backspace" || event.key === "Delete") {
      event.preventDefault();
      eraseChar();
      return;
    }
    if (event.key === "Enter") {
      event.preventDefault();
      checkActive();
      return;
    }
    if (event.key === "Tab") {
      event.preventDefault();
      nextEntry();
      return;
    }
    if (event.key === "Escape") {
      event.preventDefault();
      hideModal();
      return;
    }
    if (event.key.length === 1 && state.solution.includes(event.key)) {
      event.preventDefault();
      inputChar(event.key);
    }
  }, { passive: false });

  buildSolution();
  state.activeId = orderedEntries()[0].id;
  state.selected = entryCells(activeEntry())[0];
  updateAll();
  showModal("ことわざクロスワード", "ヒントを選び、下のかなボタンで答えを入れます。交差する文字が大きな手がかりです。", [
    { label: "はじめる", className: "blue", action: resetGame }
  ]);
})();
</script>
</body>
