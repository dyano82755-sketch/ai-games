<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ことわざクロスワード</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        /* スタート画面 */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            z-index: 10;
        }

        #start-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #start-screen p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #555;
            line-height: 1.6;
        }

        #start-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
        }

        #start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.6);
        }

        /* ゲーム画面 */
        #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        #game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
        }

        #score, #timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            flex: 1;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            background: #e9ecef;
        }

        .cell.active {
            background: #48bb78;
            color: white;
            border-color: #38a169;
        }

        .cell.correct {
            background: #48bb78;
            color: white;
        }

        .cell.incorrect {
            background: #f56565;
            color: white;
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 0.6rem;
            color: #666;
        }

        #clues {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            flex: 1;
            overflow-y: auto;
        }

        #clues h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .clue-item {
            margin-bottom: 8px;
            padding: 8px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #48bb78;
        }

        .clue-item.active {
            background: #48bb78;
            color: white;
            border-left-color: white;
        }

        .clue-item.correct {
            background: #48bb78;
            color: white;
        }

        .clue-item.incorrect {
            background: #f56565;
            color: white;
        }

        /* ゲームオーバー画面 */
        #game-over-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb045 100%);
            z-index: 10;
        }

        #game-over-screen h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        #final-score {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #ff6b6b;
            font-weight: bold;
        }

        #restart-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
            transition: all 0.3s ease;
        }

        #restart-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(72, 187, 120, 0.6);
        }

        /* レスポンシブ対応 */
        @media (max-width: 500px) {
            #game-container {
                height: 95vh;
                border-radius: 15px;
            }
            
            #start-screen h1 {
                font-size: 2rem;
            }
            
            .cell {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- スタート画面 -->
        <div id="start-screen">
            <h1>ことわざクロスワード</h1>
            <p>5×5のマスにことわざを当てはめてみよう！<br>横と縦の2つのヒントから答えを導こう！</p>
            <button id="start-button">スタート</button>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen">
            <div id="game-header">
                <div id="score">スコア: 0</div>
                <div id="timer">時間: 60</div>
            </div>
            <div id="game-board"></div>
            <div id="clues">
                <h3>ヒント</h3>
                <div id="clue-list"></div>
            </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="game-over-screen">
            <h2>ゲームオーバー</h2>
            <div id="final-score">スコア: 0</div>
            <button id="restart-button">もう一度プレイ</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲームデータ
            const gameData = {
                board: [
                    ['一', '言', 'で', '二', '意'],
                    ['三', '心', '二', '意', '三'],
                    ['四', '海', '五', '湖', '六'],
                    ['七', '上', '八', '下', '九'],
                    ['十', '全', '十', '美', '十']
                ],
                clues: {
                    horizontal: [
                        { number: 1, clue: '一言で二意', answer: '一言二意' },
                        { number: 2, clue: '三心二意', answer: '三心二意' },
                        { number: 3, clue: '四海五湖', answer: '四海五湖' },
                        { number: 4, clue: '七上八下', answer: '七上八下' },
                        { number: 5, clue: '十全十美', answer: '十全十美' }
                    ],
                    vertical: [
                        { number: 1, clue: '一言で二意', answer: '一言二意' },
                        { number: 2, clue: '三心二意', answer: '三心二意' },
                        { number: 3, clue: '四海五湖', answer: '四海五湖' },
                        { number: 4, clue: '七上八下', answer: '七上八下' },
                        { number: 5, clue: '十全十美', answer: '十全十美' }
                    ]
                },
                currentClue: null,
                score: 0,
                timeLeft: 60,
                timer: null,
                selectedCells: [],
                activeDirection: 'horizontal'
            };

            // DOM要素
            const startScreen = document.getElementById('start-screen');
            const gameScreen = document.getElementById('game-screen');
            const gameOverScreen = document.getElementById('game-over-screen');
            const startButton = document.getElementById('start-button');
            const restartButton = document.getElementById('restart-button');
            const gameBoard = document.getElementById('game-board');
            const clueList = document.getElementById('clue-list');
            const scoreElement = document.getElementById('score');
            const timerElement = document.getElementById('timer');
            const finalScoreElement = document.getElementById('final-score');

            // ゲーム初期化
            function initGame() {
                createBoard();
                renderClues();
                startTimer();
                showGameScreen();
            }

            // ゲームボード作成
            function createBoard() {
                gameBoard.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    for (let j = 0; j < 5; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        cell.textContent = gameData.board[i][j];
                        cell.innerHTML += `<span class="cell-number">${i * 5 + j + 1}</span>`;
                        cell.addEventListener('click', () => handleCellClick(i, j));
                        gameBoard.appendChild(cell);
                    }
                }
            }

            // ヒント表示
            function renderClues() {
                clueList.innerHTML = '';
                const clues = gameData.clues.horizontal;
                clues.forEach(clue => {
                    const clueItem = document.createElement('div');
                    clueItem.className = 'clue-item';
                    clueItem.dataset.number = clue.number;
                    clueItem.innerHTML = `<span>${clue.number}.</span> ${clue.clue}`;
                    clueItem.addEventListener('click', () => {
                        // ヒント選択処理
                        document.querySelectorAll('.clue-item').forEach(item => {
                            item.classList.remove('active');
                        });
                        clueItem.classList.add('active');
                        gameData.currentClue = clue;
                    });
                    clueList.appendChild(clueItem);
                });
            }

            // セルクリック処理
            function handleCellClick(row, col) {
                const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
                const isSelected = cell.classList.contains('active');
                
                if (isSelected) {
                    // 選択解除
                    cell.classList.remove('active');
                    gameData.selectedCells = gameData.selectedCells.filter(
                        c => !(c.row === row && c.col === col)
                    );
                } else {
                    // 選択
                    cell.classList.add('active');
                    gameData.selectedCells.push({ row, col });
                }
            }

            // タイマー開始
            function startTimer() {
                clearInterval(gameData.timer);
                gameData.timeLeft = 60;
                updateTimer();
                gameData.timer = setInterval(() => {
                    gameData.timeLeft--;
                    updateTimer();
                    if (gameData.timeLeft <= 0) {
                        endGame();
                    }
                }, 1000);
            }

            // タイマー更新
            function updateTimer() {
                timerElement.textContent = `時間: ${gameData.timeLeft}`;
            }

            // ゲーム終了
            function endGame() {
                clearInterval(gameData.timer);
                finalScoreElement.textContent = `スコア: ${gameData.score}`;
                showGameOverScreen();
            }

            // 画面表示切り替え
            function showStartScreen() {
                startScreen.style.display = 'flex';
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'none';
            }

            function showGameScreen() {
                startScreen.style.display = 'none';
                gameScreen.style.display = 'flex';
                gameOverScreen.style.display = 'none';
            }

            function showGameOverScreen() {
                startScreen.style.display = 'none';
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'flex';
            }

            // イベントリスナー
            startButton.addEventListener('click', initGame);
            restartButton.addEventListener('click', () => {
                gameData.score = 0;
                scoreElement.textContent = 'スコア: 0';
                initGame();
            });

            // 初期表示
            showStartScreen();
        });
    </script>
</body>
</html>
