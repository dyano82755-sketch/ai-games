<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レトロ倉庫番</title>
<style>
  :root {
    --ink: #f7e7a8;
    --muted: #b7a878;
    --bg: #07101d;
    --panel: #101827;
    --panel-2: #172336;
    --line: #f0d878;
    --gold: #f3c745;
    --red: #d95745;
    --blue: #4aa6e8;
    --green: #58c66d;
    --shadow: rgba(0, 0, 0, 0.42);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    min-height: 100dvh;
    overflow: hidden;
    color: var(--ink);
    background:
      linear-gradient(180deg, #07162b 0 58%, #0b1020 58% 100%),
      var(--bg);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Hiragino Sans", "Yu Gothic", monospace;
  }

  button {
    font: inherit;
    touch-action: manipulation;
  }

  .app {
    width: min(1180px, 100%);
    height: 100dvh;
    min-height: 100dvh;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    padding: 8px;
  }

  .hud,
  .screen,
  .controls,
  .modal-card {
    border: 2px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 10px 28px var(--shadow);
  }

  .hud {
    min-height: 70px;
    display: grid;
    grid-template-columns: minmax(250px, 1fr) repeat(6, auto);
    gap: 8px;
    align-items: center;
    padding: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
      var(--panel);
  }

  .brand {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .crate-mark {
    width: 50px;
    height: 50px;
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 2px;
    padding: 4px;
    border: 2px solid var(--line);
    background: #050910;
  }

  .crate-mark span {
    background: #8b552e;
  }

  .crate-mark span:nth-child(1),
  .crate-mark span:nth-child(5),
  .crate-mark span:nth-child(7),
  .crate-mark span:nth-child(9),
  .crate-mark span:nth-child(13),
  .crate-mark span:nth-child(17),
  .crate-mark span:nth-child(19),
  .crate-mark span:nth-child(21),
  .crate-mark span:nth-child(25) {
    background: var(--gold);
  }

  .brand-title {
    min-width: 0;
    display: grid;
    gap: 2px;
  }

  .brand-title strong {
    font-size: 1.18rem;
    line-height: 1.08;
  }

  .brand-title span {
    max-width: 100%;
    color: var(--muted);
    font-size: 0.82rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stat {
    min-width: 78px;
    min-height: 46px;
    display: grid;
    align-content: center;
    gap: 2px;
    padding: 5px 8px;
    text-align: center;
    border: 1px solid rgba(240, 216, 120, 0.34);
    border-radius: 8px;
    background: rgba(5, 9, 16, 0.55);
  }

  .stat span {
    color: var(--muted);
    font-size: 0.64rem;
    line-height: 1;
  }

  .stat b {
    font-size: 1rem;
    line-height: 1.1;
  }

  .btn,
  .pad-btn,
  .cmd-btn {
    border: 2px solid var(--line);
    border-radius: 8px;
    color: var(--ink);
    background: linear-gradient(180deg, #2c3e52, #162334);
    cursor: pointer;
    font-weight: 900;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.52);
  }

  .btn {
    min-height: 44px;
    padding: 0 14px;
  }

  .btn.icon {
    width: 46px;
    padding: 0;
  }

  .btn.play,
  .cmd-btn.primary {
    color: #07100a;
    background: linear-gradient(180deg, #86e18d, #42a953);
  }

  .btn:active,
  .pad-btn:active,
  .cmd-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.52);
  }

  .screen {
    position: relative;
    min-height: 0;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 30%, rgba(60, 89, 126, 0.28), transparent 48%),
      #050910;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 340px;
    image-rendering: pixelated;
  }

  .message {
    position: absolute;
    left: 50%;
    bottom: 10px;
    width: min(740px, calc(100% - 24px));
    min-height: 40px;
    transform: translateX(-50%);
    display: grid;
    place-items: center;
    padding: 7px 12px;
    border: 2px solid rgba(240, 216, 120, 0.82);
    border-radius: 8px;
    background: rgba(5, 9, 16, 0.86);
    text-align: center;
    font-weight: 900;
  }

  .controls {
    min-height: 118px;
    display: grid;
    grid-template-columns: minmax(190px, 1fr) auto auto minmax(190px, 1fr);
    gap: 10px;
    align-items: center;
    padding: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
      var(--panel-2);
  }

  .mini-panel {
    min-width: 0;
    display: grid;
    gap: 5px;
    font-weight: 800;
    line-height: 1.28;
  }

  .mini-panel small {
    color: var(--muted);
    font-size: 0.78rem;
  }

  .dpad {
    width: 174px;
    height: 96px;
    display: grid;
    grid-template-columns: repeat(3, 54px);
    grid-template-rows: repeat(2, 44px);
    gap: 6px;
  }

  .pad-btn {
    min-width: 0;
    min-height: 0;
    font-size: 1.18rem;
  }

  .pad-btn.up {
    grid-column: 2;
    grid-row: 1;
  }

  .pad-btn.left {
    grid-column: 1;
    grid-row: 2;
  }

  .pad-btn.down {
    grid-column: 2;
    grid-row: 2;
  }

  .pad-btn.right {
    grid-column: 3;
    grid-row: 2;
  }

  .commands {
    display: grid;
    grid-template-columns: repeat(2, 92px);
    gap: 8px;
  }

  .cmd-btn {
    min-height: 48px;
    padding: 0 6px;
  }

  .bar-wrap {
    justify-self: end;
    width: min(260px, 100%);
    display: grid;
    gap: 6px;
  }

  .bar {
    width: 100%;
    height: 16px;
    overflow: hidden;
    border: 2px solid var(--line);
    border-radius: 8px;
    background: rgba(5, 9, 16, 0.66);
  }

  .bar span {
    display: block;
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #fff2a6);
    transition: width 140ms linear;
  }

  .modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    place-items: center;
    padding: 16px;
    background: rgba(0, 0, 0, 0.62);
  }

  .modal.show {
    display: grid;
  }

  .modal-card {
    width: min(590px, 100%);
    padding: 18px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
      var(--panel);
    text-align: center;
  }

  .modal-card h1 {
    margin: 0;
    font-size: 1.85rem;
    line-height: 1.1;
  }

  .modal-card p {
    margin: 10px auto 0;
    max-width: 510px;
    color: #d8c889;
    line-height: 1.55;
    font-weight: 720;
  }

  .modal-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  @media (max-width: 940px) {
    body {
      overflow: auto;
    }

    .app {
      height: auto;
      min-height: 100dvh;
      grid-template-rows: auto minmax(430px, 1fr) auto;
    }

    .hud {
      grid-template-columns: minmax(210px, 1fr) repeat(4, auto);
    }

    .hud .stat:nth-of-type(n+4) {
      display: none;
    }

    .controls {
      grid-template-columns: 1fr auto auto;
    }

    .bar-wrap {
      grid-column: 1 / -1;
      width: 100%;
      justify-self: stretch;
    }
  }

  @media (max-width: 590px) {
    .app {
      gap: 7px;
      padding: 7px;
      grid-template-rows: auto minmax(390px, 1fr) auto;
    }

    .hud {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      min-height: 0;
    }

    .brand {
      grid-column: 1 / -1;
    }

    .crate-mark {
      width: 42px;
      height: 42px;
    }

    .brand-title strong {
      font-size: 1.02rem;
    }

    .brand-title span {
      font-size: 0.74rem;
    }

    .stat {
      min-width: 0;
      min-height: 38px;
      padding: 4px 3px;
    }

    .stat span {
      font-size: 0.58rem;
    }

    .stat b {
      font-size: 0.82rem;
    }

    .btn {
      min-height: 38px;
      padding: 0 8px;
      font-size: 0.84rem;
    }

    .btn.icon {
      width: 40px;
    }

    .controls {
      grid-template-columns: 1fr;
      min-height: 0;
      gap: 8px;
    }

    .mini-panel {
      display: none;
    }

    .dpad {
      justify-self: center;
      width: 168px;
      height: 92px;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 42px);
    }

    .commands {
      justify-self: center;
      grid-template-columns: repeat(2, 86px);
    }

    .cmd-btn {
      min-height: 44px;
      font-size: 0.9rem;
    }

    .message {
      bottom: 8px;
      min-height: 36px;
      padding: 6px 8px;
      font-size: 0.82rem;
    }

    .modal-card h1 {
      font-size: 1.44rem;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header class="hud">
    <div class="brand">
      <div class="crate-mark" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="brand-title">
        <strong>レトロ倉庫番</strong>
        <span id="statusText">箱を押してゴールに運ぼう</span>
      </div>
    </div>
    <div class="stat"><span>STAGE</span><b id="stageText">1</b></div>
    <div class="stat"><span>BOX</span><b id="boxText">0/0</b></div>
    <div class="stat"><span>MOVE</span><b id="moveText">0</b></div>
    <div class="stat"><span>PUSH</span><b id="pushText">0</b></div>
    <button class="btn icon" id="muteBtn" type="button" aria-label="音を切り替え">♪</button>
    <button class="btn play" id="startBtn" type="button">START</button>
  </header>

  <main class="screen" aria-label="倉庫番ゲーム画面">
    <canvas id="gameCanvas"></canvas>
    <div class="message" id="messageText">STARTを押して開始</div>
  </main>

  <footer class="controls">
    <div class="mini-panel">
      <b>ミッション</b>
      <small id="missionText">すべての箱を丸いゴールへ置きます。</small>
    </div>
    <div class="dpad" aria-label="移動ボタン">
      <button class="pad-btn up" type="button" data-move="up" aria-label="上へ">▲</button>
      <button class="pad-btn left" type="button" data-move="left" aria-label="左へ">◀</button>
      <button class="pad-btn down" type="button" data-move="down" aria-label="下へ">▼</button>
      <button class="pad-btn right" type="button" data-move="right" aria-label="右へ">▶</button>
    </div>
    <div class="commands" aria-label="操作ボタン">
      <button class="cmd-btn primary" id="undoBtn" type="button">戻る</button>
      <button class="cmd-btn" id="resetBtn" type="button">やり直し</button>
    </div>
    <div class="bar-wrap">
      <div class="mini-panel">
        <b id="toolText">矢印/WASDで移動</b>
        <small id="bestText">BEST -</small>
      </div>
      <div class="bar" aria-label="箱の達成率"><span id="progressBar"></span></div>
    </div>
  </footer>
</div>

<div class="modal show" id="modal">
  <div class="modal-card">
    <h1 id="modalTitle">レトロ倉庫番</h1>
    <p id="modalText">箱は押せますが、引くことはできません。すべての箱を丸いゴールへ運ぶ、ファミコン風のじっくりパズルです。</p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const el = {
    stage: document.getElementById("stageText"),
    box: document.getElementById("boxText"),
    move: document.getElementById("moveText"),
    push: document.getElementById("pushText"),
    best: document.getElementById("bestText"),
    progress: document.getElementById("progressBar"),
    status: document.getElementById("statusText"),
    message: document.getElementById("messageText"),
    mission: document.getElementById("missionText"),
    start: document.getElementById("startBtn"),
    mute: document.getElementById("muteBtn"),
    undo: document.getElementById("undoBtn"),
    reset: document.getElementById("resetBtn"),
    modal: document.getElementById("modal"),
    modalTitle: document.getElementById("modalTitle"),
    modalText: document.getElementById("modalText"),
    modalActions: document.getElementById("modalActions")
  };

  const levels = [
    [
      "########",
      "#      #",
      "#  $ . #",
      "#  @   #",
      "#  $ . #",
      "#      #",
      "########"
    ],
    [
      "#########",
      "#       #",
      "#  $ .  #",
      "#  # #  #",
      "#  $ .  #",
      "#   @   #",
      "#########"
    ],
    [
      "##########",
      "#        #",
      "#  $  .  #",
      "#  $  .  #",
      "#   @    #",
      "#        #",
      "##########"
    ],
    [
      "###########",
      "#         #",
      "#  $ . $  #",
      "#    @    #",
      "#  $ . .  #",
      "#         #",
      "###########"
    ],
    [
      "############",
      "#          #",
      "#  $ .     #",
      "#          #",
      "#  $ .     #",
      "#  @       #",
      "#  $ .     #",
      "#          #",
      "#  $ .     #",
      "############"
    ]
  ];

  const colors = {
    bg: "#050910",
    floor: "#24324a",
    floor2: "#1c283b",
    wall: "#53667d",
    wallDark: "#263348",
    goal: "#f3c745",
    goalDark: "#8d6720",
    crate: "#9b5f35",
    crateDark: "#5f3828",
    crateDone: "#58c66d",
    crateDoneDark: "#2b7a3c",
    player: "#4aa6e8",
    playerDark: "#214d77",
    skin: "#f7d8a8",
    shadow: "rgba(0,0,0,0.35)"
  };

  const state = {
    running: false,
    muted: false,
    stage: 0,
    width: 0,
    height: 0,
    walls: new Set(),
    goals: new Set(),
    crates: new Set(),
    player: { x: 0, y: 0, drawX: 0, drawY: 0, dir: 1, step: 0 },
    moves: 0,
    pushes: 0,
    history: [],
    tileSize: 42,
    offsetX: 0,
    offsetY: 0,
    particles: [],
    floatTexts: [],
    audio: null
  };

  function keyOf(x, y) {
    return `${x},${y}`;
  }

  function parseKey(key) {
    return key.split(",").map(Number);
  }

  function normalizeRows(rows) {
    const width = Math.max(...rows.map(row => row.length));
    return rows.map(row => row.padEnd(width, "#"));
  }

  function loadStage(index) {
    const rows = normalizeRows(levels[index % levels.length]);
    state.stage = index % levels.length;
    state.width = rows[0].length;
    state.height = rows.length;
    state.walls = new Set();
    state.goals = new Set();
    state.crates = new Set();
    state.moves = 0;
    state.pushes = 0;
    state.history = [];
    state.particles = [];
    state.floatTexts = [];

    rows.forEach((row, y) => {
      [...row].forEach((char, x) => {
        if (char === "#") state.walls.add(keyOf(x, y));
        if (char === "." || char === "+" || char === "*") state.goals.add(keyOf(x, y));
        if (char === "$" || char === "*") state.crates.add(keyOf(x, y));
        if (char === "@" || char === "+") {
          state.player.x = x;
          state.player.y = y;
          state.player.drawX = x;
          state.player.drawY = y;
          state.player.dir = 1;
        }
      });
    });

    resizeCanvas();
    updateHud();
    setMessage(`STAGE ${state.stage + 1}。箱をゴールへ押しましょう。`);
  }

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const tileByW = (rect.width - 28) / Math.max(1, state.width);
    const tileByH = (rect.height - 72) / Math.max(1, state.height);
    state.tileSize = Math.max(28, Math.min(62, Math.floor(Math.min(tileByW, tileByH))));
    state.offsetX = Math.floor((rect.width - state.width * state.tileSize) / 2);
    state.offsetY = Math.max(16, Math.floor((rect.height - state.height * state.tileSize) / 2) - 8);
  }

  function startGame() {
    state.running = true;
    hideModal();
    loadStage(0);
    playTone(520, 0.08, "square");
    playTone(760, 0.12, "square", 0.06);
  }

  function move(dx, dy) {
    if (!state.running) {
      startGame();
      return;
    }
    const px = state.player.x;
    const py = state.player.y;
    const nx = px + dx;
    const ny = py + dy;
    const nextKey = keyOf(nx, ny);
    if (state.walls.has(nextKey)) {
      bump(dx, dy);
      setMessage("壁は押せません。");
      playTone(140, 0.05, "square");
      return;
    }

    const boxMoved = state.crates.has(nextKey);
    if (boxMoved) {
      const bx = nx + dx;
      const by = ny + dy;
      const beyondKey = keyOf(bx, by);
      if (state.walls.has(beyondKey) || state.crates.has(beyondKey)) {
        bump(dx, dy);
        setMessage("箱がつまっています。別の押し方を考えよう。");
        playTone(150, 0.06, "square");
        return;
      }
      saveHistory();
      state.crates.delete(nextKey);
      state.crates.add(beyondKey);
      state.pushes++;
      burst(bx, by, state.goals.has(beyondKey) ? colors.crateDone : colors.crate, 8);
      if (state.goals.has(beyondKey)) playTone(720, 0.08, "triangle");
      else playTone(320, 0.06, "square");
    } else {
      saveHistory();
      playTone(220, 0.035, "square");
    }

    state.player.x = nx;
    state.player.y = ny;
    state.player.dir = dx < 0 ? -1 : dx > 0 ? 1 : state.player.dir;
    state.player.step = 1;
    state.moves++;
    updateHud();
    if (isCleared()) finishStage();
    else setMessage(boxMoved ? "よし、箱を押しました。" : "一歩進みました。");
  }

  function bump(dx, dy) {
    state.player.drawX -= dx * 0.12;
    state.player.drawY -= dy * 0.12;
    state.player.step = 0.5;
  }

  function saveHistory() {
    state.history.push({
      player: { x: state.player.x, y: state.player.y, dir: state.player.dir },
      crates: [...state.crates],
      moves: state.moves,
      pushes: state.pushes
    });
    if (state.history.length > 300) state.history.shift();
  }

  function undo() {
    if (!state.running) return;
    const last = state.history.pop();
    if (!last) {
      setMessage("これ以上戻れません。");
      playTone(150, 0.05, "square");
      return;
    }
    state.player.x = last.player.x;
    state.player.y = last.player.y;
    state.player.dir = last.player.dir;
    state.crates = new Set(last.crates);
    state.moves = last.moves;
    state.pushes = last.pushes;
    updateHud();
    setMessage("1手戻しました。");
    playTone(420, 0.05, "triangle");
  }

  function resetStage() {
    if (!state.running) {
      startGame();
      return;
    }
    loadStage(state.stage);
    playTone(260, 0.08, "square");
  }

  function isCleared() {
    if (state.goals.size === 0) return false;
    return [...state.goals].every(goal => state.crates.has(goal));
  }

  function finishStage() {
    const bestKey = bestStorageKey();
    const currentBest = Number(localStorage.getItem(bestKey) || 0);
    if (!currentBest || state.moves < currentBest) {
      localStorage.setItem(bestKey, String(state.moves));
    }
    burst(state.player.x, state.player.y, "#f3c745", 24);
    if (state.stage < levels.length - 1) {
      showModal("STAGE CLEAR", `手数 ${state.moves}、押し ${state.pushes}。次の倉庫へ進みます。`, [
        { label: "NEXT", className: "play", action: () => {
          hideModal();
          loadStage(state.stage + 1);
          playTone(660, 0.1, "square");
        } }
      ]);
      return;
    }
    state.running = false;
    showModal("ALL CLEAR", `全${levels.length}面クリア！ 最終面は ${state.moves} 手でした。`, [
      { label: "もう一度", className: "play", action: startGame }
    ]);
    setMessage("ALL CLEAR!");
  }

  function bestStorageKey() {
    return `retroSokobanBest-${state.stage}`;
  }

  function updateHud() {
    const placed = [...state.crates].filter(crate => state.goals.has(crate)).length;
    el.stage.textContent = state.stage + 1;
    el.box.textContent = `${placed}/${state.goals.size}`;
    el.move.textContent = state.moves;
    el.push.textContent = state.pushes;
    el.progress.style.width = state.goals.size ? `${(placed / state.goals.size) * 100}%` : "0%";
    const best = Number(localStorage.getItem(bestStorageKey()) || 0);
    el.best.textContent = best ? `BEST ${best}` : "BEST -";
    el.status.textContent = placed === state.goals.size ? "全箱セット完了" : "箱を押してゴールに運ぼう";
    el.mission.textContent = `${state.goals.size}個の箱を丸いゴールへ。`;
    el.start.textContent = state.running ? "PLAY" : "START";
  }

  function setMessage(text) {
    el.message.textContent = text;
  }

  function draw(time) {
    drawBackground();
    drawBoard();
    drawCrates();
    drawPlayer(time);
    drawParticles(time);
    drawFloatTexts();
    requestAnimationFrame(draw);
  }

  function drawBackground() {
    const w = canvas.clientWidth || 800;
    const h = canvas.clientHeight || 500;
    ctx.fillStyle = "#050910";
    ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#162742";
    for (let i = 0; i < 18; i++) {
      const x = (i * 97) % Math.max(1, w);
      const y = 18 + (i * 41) % Math.max(1, h - 40);
      ctx.fillRect(x, y, 46, 3);
    }
    ctx.restore();
  }

  function tileRect(x, y) {
    const s = state.tileSize;
    return { x: state.offsetX + x * s, y: state.offsetY + y * s, s };
  }

  function drawBoard() {
    for (let y = 0; y < state.height; y++) {
      for (let x = 0; x < state.width; x++) {
        const key = keyOf(x, y);
        if (state.walls.has(key)) drawWall(x, y);
        else drawFloor(x, y, state.goals.has(key));
      }
    }
  }

  function drawFloor(x, y, goal) {
    const r = tileRect(x, y);
    ctx.fillStyle = (x + y) % 2 ? colors.floor : colors.floor2;
    ctx.fillRect(r.x, r.y, r.s, r.s);
    ctx.strokeStyle = "rgba(240,216,120,0.12)";
    ctx.lineWidth = 1;
    ctx.strokeRect(r.x, r.y, r.s, r.s);
    if (goal) {
      ctx.fillStyle = colors.goalDark;
      ctx.fillRect(r.x + r.s * 0.26, r.y + r.s * 0.26, r.s * 0.48, r.s * 0.48);
      ctx.fillStyle = colors.goal;
      ctx.fillRect(r.x + r.s * 0.34, r.y + r.s * 0.34, r.s * 0.32, r.s * 0.32);
    }
  }

  function drawWall(x, y) {
    const r = tileRect(x, y);
    ctx.fillStyle = colors.wallDark;
    ctx.fillRect(r.x, r.y, r.s, r.s);
    ctx.fillStyle = colors.wall;
    ctx.fillRect(r.x + 3, r.y + 3, r.s - 6, r.s - 6);
    ctx.fillStyle = "#1b2433";
    ctx.fillRect(r.x + 8, r.y + 8, r.s - 16, r.s - 16);
    ctx.strokeStyle = "#0d1523";
    ctx.lineWidth = 1;
    ctx.strokeRect(r.x, r.y, r.s, r.s);
  }

  function drawCrates() {
    state.crates.forEach(key => {
      const [x, y] = parseKey(key);
      const done = state.goals.has(key);
      drawCrate(x, y, done);
    });
  }

  function drawCrate(x, y, done) {
    const r = tileRect(x, y);
    const top = done ? colors.crateDone : colors.crate;
    const side = done ? colors.crateDoneDark : colors.crateDark;
    ctx.fillStyle = colors.shadow;
    ctx.fillRect(r.x + r.s * 0.12, r.y + r.s * 0.18, r.s * 0.78, r.s * 0.72);
    ctx.fillStyle = side;
    ctx.fillRect(r.x + r.s * 0.16, r.y + r.s * 0.2, r.s * 0.72, r.s * 0.66);
    ctx.fillStyle = top;
    ctx.fillRect(r.x + r.s * 0.18, r.y + r.s * 0.12, r.s * 0.64, r.s * 0.62);
    ctx.strokeStyle = "#2e2118";
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x + r.s * 0.18, r.y + r.s * 0.12, r.s * 0.64, r.s * 0.62);
    ctx.beginPath();
    ctx.moveTo(r.x + r.s * 0.24, r.y + r.s * 0.2);
    ctx.lineTo(r.x + r.s * 0.76, r.y + r.s * 0.68);
    ctx.moveTo(r.x + r.s * 0.76, r.y + r.s * 0.2);
    ctx.lineTo(r.x + r.s * 0.24, r.y + r.s * 0.68);
    ctx.stroke();
  }

  function drawPlayer(time) {
    const p = state.player;
    p.drawX += (p.x - p.drawX) * 0.32;
    p.drawY += (p.y - p.drawY) * 0.32;
    p.step *= 0.82;
    const r = tileRect(p.drawX, p.drawY);
    const s = r.s;
    const bob = Math.sin(time * 0.014) * 1.4 + p.step * 3;
    const x = r.x + s * 0.24;
    const y = r.y + s * 0.12 - bob;
    ctx.fillStyle = colors.shadow;
    ctx.fillRect(r.x + s * 0.24, r.y + s * 0.82, s * 0.56, s * 0.12);
    ctx.fillStyle = colors.player;
    ctx.fillRect(x + s * 0.1, y, s * 0.34, s * 0.24);
    ctx.fillStyle = colors.playerDark;
    ctx.fillRect(x + s * 0.02, y + s * 0.25, s * 0.5, s * 0.3);
    ctx.fillStyle = colors.skin;
    ctx.fillRect(x + s * 0.1, y + s * 0.08, s * 0.24, s * 0.12);
    ctx.fillStyle = colors.player;
    ctx.fillRect(x - s * 0.02, y + s * 0.58, s * 0.18, s * 0.22);
    ctx.fillRect(x + s * 0.34, y + s * 0.58, s * 0.18, s * 0.22);
    ctx.fillStyle = "#f1c17b";
    ctx.fillRect(x + (p.dir > 0 ? s * 0.48 : -s * 0.08), y + s * 0.34, s * 0.14, s * 0.12);
  }

  function burst(x, y, color, count) {
    const r = tileRect(x, y);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2.1;
      state.particles.push({
        x: r.x + r.s / 2,
        y: r.y + r.s / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 0.7,
        born: performance.now(),
        life: 460 + Math.random() * 260,
        color
      });
    }
  }

  function drawParticles(time) {
    state.particles = state.particles.filter(p => time - p.born < p.life);
    state.particles.forEach(p => {
      const age = (time - p.born) / p.life;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      ctx.save();
      ctx.globalAlpha = 1 - age;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 4, 4);
      ctx.restore();
    });
  }

  function drawFloatTexts() {
    const now = performance.now();
    state.floatTexts = state.floatTexts.filter(item => now - item.born < item.life);
    state.floatTexts.forEach(item => {
      const age = (now - item.born) / item.life;
      ctx.save();
      ctx.globalAlpha = 1 - age;
      ctx.font = "900 16px ui-monospace, monospace";
      ctx.textAlign = "center";
      ctx.strokeStyle = "#050910";
      ctx.lineWidth = 4;
      ctx.strokeText(item.text, item.x, item.y - age * 28);
      ctx.fillStyle = item.color;
      ctx.fillText(item.text, item.x, item.y - age * 28);
      ctx.restore();
    });
  }

  function showModal(title, text, actions) {
    el.modalTitle.textContent = title;
    el.modalText.textContent = text;
    el.modalActions.innerHTML = "";
    actions.forEach(action => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `btn ${action.className || ""}`;
      button.textContent = action.label;
      button.addEventListener("click", action.action);
      el.modalActions.appendChild(button);
    });
    el.modal.classList.add("show");
  }

  function hideModal() {
    el.modal.classList.remove("show");
  }

  function ensureAudio() {
    if (state.muted) return null;
    if (!state.audio) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      state.audio = new AudioContext();
    }
    if (state.audio.state === "suspended") state.audio.resume();
    return state.audio;
  }

  function playTone(freq, duration, type = "square", delay = 0) {
    const audio = ensureAudio();
    if (!audio) return;
    const start = audio.currentTime + delay;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.08, start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.start(start);
    osc.stop(start + duration + 0.03);
  }

  function keyToMove(key) {
    if (key === "arrowleft" || key === "a") return [-1, 0];
    if (key === "arrowright" || key === "d") return [1, 0];
    if (key === "arrowup" || key === "w") return [0, -1];
    if (key === "arrowdown" || key === "s") return [0, 1];
    return null;
  }

  document.addEventListener("keydown", event => {
    const key = event.key.toLowerCase();
    const dir = keyToMove(key);
    if (dir) {
      event.preventDefault();
      move(dir[0], dir[1]);
      return;
    }
    if (key === "z" || key === "backspace") {
      event.preventDefault();
      undo();
      return;
    }
    if (key === "r") {
      event.preventDefault();
      resetStage();
      return;
    }
    if (key === "enter" || key === " ") {
      event.preventDefault();
      if (!state.running) startGame();
    }
  }, { passive: false });

  document.querySelectorAll("[data-move]").forEach(button => {
    button.addEventListener("click", () => {
      const moveName = button.dataset.move;
      const dir = {
        left: [-1, 0],
        right: [1, 0],
        up: [0, -1],
        down: [0, 1]
      }[moveName];
      move(dir[0], dir[1]);
    });
  });

  el.start.addEventListener("click", () => {
    if (!state.running) startGame();
  });
  el.undo.addEventListener("click", undo);
  el.reset.addEventListener("click", resetStage);
  el.mute.addEventListener("click", () => {
    state.muted = !state.muted;
    el.mute.textContent = state.muted ? "×" : "♪";
    el.mute.setAttribute("aria-label", state.muted ? "音を出す" : "音を消す");
  });
  window.addEventListener("resize", resizeCanvas);

  showModal("レトロ倉庫番", "箱は押せますが、引くことはできません。すべての箱を丸いゴールへ運びましょう。Z/Backspaceで1手戻し、Rでやり直しです。", [
    { label: "START", className: "play", action: startGame }
  ]);

  loadStage(0);
  resizeCanvas();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
