<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海賊船アドベンチャー (Gemini改良版)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #1e90ff, #00008b);
      color: white;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 80vh;
      background: #0066cc;
      border: 4px solid #8B4513;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* 画面オーバーレイ (スタート / ゲームオーバー / クリア) */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10;
      text-align: center;
    }

    #gameOverScreen, #gameClearScreen {
      display: none;
    }

    h1 { font-size: 2.5rem; margin-bottom: 20px; color: #FFD700; text-shadow: 2px 2px 4px #000; }
    p { font-size: 1.2rem; margin: 10px 0; }

    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 1.2rem;
      background: #FFD700;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { background: #FFA500; transform: scale(1.05); }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 5;
    }

    #ui div {
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
    }

    /* ゲーム要素 */
    #playerShip {
      position: absolute;
      font-size: 3rem;
      z-index: 3;
      /* 中心を軸に回転させる */
      transform-origin: center center; 
      transition: transform 0.1s ease-out;
    }

    .island {
      position: absolute;
      font-size: 4rem; /* 島を少し大きく */
      z-index: 2;
    }

    .treasure {
      position: absolute;
      font-size: 2rem;
      z-index: 2;
      animation: pulse 1s infinite;
    }

    .enemy {
      position: absolute;
      font-size: 2.5rem;
      z-index: 2;
      animation: float 2s infinite ease-in-out;
    }

    .bullet {
      position: absolute;
      font-size: 1.5rem;
      z-index: 4;
    }

    /* コントロール */
    #controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      z-index: 5;
      padding: 0 20px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      user-select: none;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
    .control-btn:active { background: rgba(255, 255, 255, 0.5); }

    #fireBtn { width: 70px; height: 70px; font-size: 2.5rem; background: rgba(255, 0, 0, 0.4); border-color: #ffcccc; }
    #fireBtn:active { background: rgba(255, 0, 0, 0.7); }

    /* アップグレードパネル */
    #upgradePanel {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      z-index: 5;
      display: none;
      border: 2px solid #FFD700;
    }

    #upgradePanel button {
      padding: 8px 15px;
      font-size: 0.9rem;
      margin-top: 0;
    }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0); } }
    
    .game-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="gameContainer">
    
    <div id="startScreen" class="screen-overlay">
      <h1>海賊船アドベンチャー</h1>
      <p>目標: 海に散らばる宝箱をすべて回収せよ！</p>
      <p>※島(🏝️)にはぶつかるので注意</p>
      <p>PC: WASDで移動、Spaceで発射</p>
      <button id="startBtn">大航海へ出発</button>
    </div>

    <div id="gameOverScreen" class="screen-overlay">
      <h1 style="color: #ff4444;">船が沈没した...</h1>
      <p>回収した宝箱: <span id="finalTreasures">0</span> / 15</p>
      <button id="restartBtn">リトライ</button>
    </div>

    <div id="gameClearScreen" class="screen-overlay">
      <h1 style="color: #44ff44;">伝説の海賊王！</h1>
      <p>すべての宝を回収し、海を制覇した！</p>
      <p>最終HP: <span id="clearHp">0</span></p>
      <button id="clearRestartBtn">もう一度遊ぶ</button>
    </div>

    <div id="ui">
      <div>HP: <span id="hp">100</span></div>
      <div>所持金: <span id="money">0</span> 💰</div>
      <div>宝箱: <span id="treasures">0</span> / 15</div>
    </div>

    <div class="game-field" id="gameField"></div>

    <div id="controls">
      <div class="control-btn" id="leftBtn">←</div>
      <div class="control-btn" id="upBtn">↑</div>
      <div class="control-btn" id="downBtn">↓</div>
      <div class="control-btn" id="rightBtn">→</div>
      <div class="control-btn" id="fireBtn">💣</div>
    </div>

    <div id="upgradePanel">
      <button id="upgradeHp">HP回復・強化 (50💰)</button>
      <button id="upgradeSpeed">船速アップ (100💰)</button>
    </div>
  </div>

  <script>
    const gameState = {
      player: { x: 400, y: 300, vx: 0, vy: 0, angle: 0, speed: 3, hp: 100, money: 0, treasures: 0, maxTreasures: 15 },
      enemies: [], bullets: [], treasures: [], islands: [],
      isGameRunning: false, keys: {}, lastTime: 0,
      touchControls: { up: false, down: false, left: false, right: false, fire: false }
    };

    const DOM = {
      container: document.getElementById('gameContainer'), field: document.getElementById('gameField'),
      start: document.getElementById('startScreen'), gameOver: document.getElementById('gameOverScreen'), gameClear: document.getElementById('gameClearScreen'),
      hp: document.getElementById('hp'), money: document.getElementById('money'), treasures: document.getElementById('treasures'),
      finalT: document.getElementById('finalTreasures'), clearHp: document.getElementById('clearHp'),
      upgPanel: document.getElementById('upgradePanel')
    };

    function initGame() {
      gameState.player = { x: 400, y: 300, vx: 1, vy: 0, angle: 0, speed: 3, hp: 100, money: 0, treasures: 0, maxTreasures: 15 };
      gameState.enemies = []; gameState.bullets = []; gameState.treasures = []; gameState.islands = [];
      DOM.field.innerHTML = ''; updateUI(); DOM.upgPanel.style.display = 'none';

      // 島の配置 (当たり判定用に少し調整)
      for (let i = 0; i < 6; i++) {
        createEntity('island', '🏝️', Math.random() * 650 + 50, Math.random() * 450 + 50, gameState.islands);
      }
      for (let i = 0; i < gameState.player.maxTreasures; i++) {
        createEntity('treasure', '💰', Math.random() * 700 + 30, Math.random() * 500 + 30, gameState.treasures);
      }
      for (let i = 0; i < 5; i++) {
        let e = createEntity('enemy', '🏴‍☠️', Math.random() * 700 + 50, Math.random() * 500 + 50, gameState.enemies);
        e.hp = 50; e.speed = 1 + Math.random();
      }

      const ship = document.createElement('div');
      ship.id = 'playerShip'; ship.textContent = '🚢';
      DOM.field.appendChild(ship);
      gameState.player.element = ship;
    }

    function createEntity(className, icon, x, y, array) {
      const el = document.createElement('div');
      el.className = className; el.textContent = icon;
      el.style.left = `${x}px`; el.style.top = `${y}px`;
      DOM.field.appendChild(el);
      const obj = { x, y, element: el };
      array.push(obj);
      return obj;
    }

    function updateUI() {
      DOM.hp.textContent = gameState.player.hp; DOM.money.textContent = gameState.player.money;
      DOM.treasures.textContent = gameState.player.treasures;
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('clearRestartBtn').addEventListener('click', startGame);

    function startGame() {
      DOM.start.style.display = 'none'; DOM.gameOver.style.display = 'none'; DOM.gameClear.style.display = 'none';
      gameState.isGameRunning = true; initGame(); requestAnimationFrame(gameLoop);
    }

    ['upBtn', 'downBtn', 'leftBtn', 'rightBtn', 'fireBtn'].forEach(id => {
      const btn = document.getElementById(id);
      const key = id.replace('Btn', '');
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); gameState.touchControls[key] = true; });
      btn.addEventListener('touchend', (e) => { e.preventDefault(); gameState.touchControls[key] = false; });
      btn.addEventListener('mousedown', () => gameState.touchControls[key] = true);
      btn.addEventListener('mouseup', () => gameState.touchControls[key] = false);
    });

    window.addEventListener('keydown', e => { gameState.keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { gameState.keys[e.key.toLowerCase()] = false; });

    let lastFireTime = 0;
    function gameLoop(timestamp) {
      if (!gameState.isGameRunning) return;
      
      if ((gameState.keys[' '] || gameState.touchControls.fire) && timestamp - lastFireTime > 300) {
        fireBullet(); lastFireTime = timestamp;
      }

      movePlayer(); moveEnemies(); updateBullets(); checkCollisions(); updateUI();
      requestAnimationFrame(gameLoop);
    }

    function movePlayer() {
      const p = gameState.player;
      let nextX = p.x; let nextY = p.y;
      let moved = false;

      if (gameState.keys['w'] || gameState.touchControls.up) { nextY -= p.speed; p.vy = -1; p.vx = 0; moved = true; p.angle = -90; }
      if (gameState.keys['s'] || gameState.touchControls.down) { nextY += p.speed; p.vy = 1; p.vx = 0; moved = true; p.angle = 90; }
      if (gameState.keys['a'] || gameState.touchControls.left) { nextX -= p.speed; p.vx = -1; p.vy = 0; moved = true; p.angle = 180; }
      if (gameState.keys['d'] || gameState.touchControls.right) { nextX += p.speed; p.vx = 1; p.vy = 0; moved = true; p.angle = 0; }

      // 島との当たり判定（移動先で判定）
      let hitIsland = false;
      for (let island of gameState.islands) {
        if (Math.hypot(nextX - island.x, nextY - island.y) < 50) hitIsland = true;
      }

      if (!hitIsland) {
        p.x = Math.max(10, Math.min(750, nextX));
        p.y = Math.max(10, Math.min(550, nextY));
      }

      p.element.style.left = `${p.x}px`;
      p.element.style.top = `${p.y}px`;
      if(moved) p.element.style.transform = `rotate(${p.angle}deg)`;
    }

    function moveEnemies() {
      gameState.enemies.forEach(e => {
        const angle = Math.atan2(gameState.player.y - e.y, gameState.player.x - e.x);
        let nextX = e.x + Math.cos(angle) * e.speed;
        let nextY = e.y + Math.sin(angle) * e.speed;
        
        let hitIsland = false;
        for (let island of gameState.islands) {
          if (Math.hypot(nextX - island.x, nextY - island.y) < 40) hitIsland = true;
        }

        if(!hitIsland) { e.x = nextX; e.y = nextY; }
        e.element.style.left = `${e.x}px`; e.element.style.top = `${e.y}px`;
      });
    }

    function fireBullet() {
      const p = gameState.player;
      const b = createEntity('bullet', '🔥', p.x + 15, p.y + 15, gameState.bullets);
      // 向いている方向に飛ぶようにベクトルを設定
      b.vx = p.vx === 0 && p.vy === 0 ? 1 : p.vx; 
      b.vy = p.vy;
    }

    function updateBullets() {
      for (let i = gameState.bullets.length - 1; i >= 0; i--) {
        const b = gameState.bullets[i];
        b.x += b.vx * 8; b.y += b.vy * 8;
        if (b.x < -20 || b.x > 820 || b.y < -20 || b.y > 620) {
          b.element.remove(); gameState.bullets.splice(i, 1);
        } else {
          b.element.style.left = `${b.x}px`; b.element.style.top = `${b.y}px`;
        }
      }
    }

    function checkCollisions() {
      const p = gameState.player;
      
      // 宝箱回収
      for (let i = gameState.treasures.length - 1; i >= 0; i--) {
        if (Math.hypot(p.x - gameState.treasures[i].x, p.y - gameState.treasures[i].y) < 40) {
          gameState.treasures[i].element.remove(); gameState.treasures.splice(i, 1);
          p.money += 20; p.treasures++;
        }
      }

      // クリア判定
      if (p.treasures >= p.maxTreasures) {
        gameState.isGameRunning = false;
        DOM.clearHp.textContent = p.hp;
        DOM.gameClear.style.display = 'flex';
        return;
      }

      // 被弾
      gameState.enemies.forEach(e => {
        if (Math.hypot(p.x - e.x, p.y - e.y) < 40) {
          p.hp -= 1; // 連続で当たるのでダメージ減らして継続ダメージ化
          if (p.hp <= 0) {
            gameState.isGameRunning = false;
            DOM.finalT.textContent = p.treasures;
            DOM.gameOver.style.display = 'flex';
          }
        }
      });

      // 弾の命中
      for (let i = gameState.bullets.length - 1; i >= 0; i--) {
        for (let j = gameState.enemies.length - 1; j >= 0; j--) {
          const b = gameState.bullets[i]; const e = gameState.enemies[j];
          if (b && e && Math.hypot(b.x - e.x, b.y - e.y) < 35) {
            e.hp -= 25;
            b.element.remove(); gameState.bullets.splice(i, 1);
            if (e.hp <= 0) {
              e.element.remove(); gameState.enemies.splice(j, 1);
              p.money += 30;
              // 敵を再配置
              setTimeout(() => {
                if(gameState.isGameRunning) {
                  let ne = createEntity('enemy', '🏴‍☠️', Math.random() * 700, Math.random() * 500, gameState.enemies);
                  ne.hp = 50; ne.speed = 1.5;
                }
              }, 2000);
            }
            break;
          }
        }
      }

      // アップグレードUI表示
      DOM.upgPanel.style.display = (p.money >= 50) ? 'flex' : 'none';
    }

    // アップグレード処理
    document.getElementById('upgradeHp').addEventListener('click', () => {
      if (gameState.player.money >= 50) { gameState.player.money -= 50; gameState.player.hp += 30; updateUI(); }
    });
    document.getElementById('upgradeSpeed').addEventListener('click', () => {
      if (gameState.player.money >= 100) { gameState.player.money -= 100; gameState.player.speed += 1; updateUI(); }
    });
  </script>
</body>
</html>
