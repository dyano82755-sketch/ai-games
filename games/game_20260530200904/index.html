<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ローグライクダンジョン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 20%);
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00eeff, 0 0 20px #00eeff;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffcc00;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin: 20px 0;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 10px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-weight: bold;
            color: #ffcc00;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            font-weight: bold;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        #gameBoard {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1px;
            width: 100%;
            height: 70%;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .cell {
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        .wall {
            background: linear-gradient(135deg, #4a4a4a 0%, #2a2a2a 100%);
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .floor {
            background: rgba(255, 255, 255, 0.02);
        }

        .player {
            background: radial-gradient(circle, #ffcc00 0%, #ff6b00 100%);
            border-radius: 50%;
            box-shadow: 0 0 15px #ffcc00;
            z-index: 10;
            animation: pulse 1.5s infinite;
        }

        .enemy {
            background: radial-gradient(circle, #ff3366 0%, #cc0033 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px #ff3366;
        }

        .treasure {
            background: radial-gradient(circle, #ffcc00 0%, #ff9900 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px #ffcc00;
        }

        .exit {
            background: radial-gradient(circle, #00ffcc 0%, #0099cc 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffcc;
        }

        .key {
            background: radial-gradient(circle, #ffcc00 0%, #ff9900 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px #ffcc00;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
            max-width: 500px;
        }

        .hidden {
            display: none;
        }

        .mobile-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .mobile-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #gameOverScreen h2 {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
        }

        #gameOverScreen p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startScreen h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            color: #00eeff;
        }

        #startScreen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.6;
        }

        #startScreen .controls {
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .stats {
                flex-direction: column;
                gap: 10px;
                font-size: 1rem;
            }
            
            .mobile-controls {
                gap: 10px;
            }
            
            .mobile-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="screen">
            <h1>ローグライクダンジョン</h1>
            
            <div class="stats">
                <div class="stat">
                    <span>レベル</span>
                    <span id="level" class="stat-value">1</span>
                </div>
                <div class="stat">
                    <span>体力</span>
                    <span id="health" class="stat-value">100</span>
                </div>
                <div class="stat">
                    <span>ゴール</span>
                    <span id="goal" class="stat-value">0/5</span>
                </div>
            </div>

            <div id="gameBoard"></div>

            <div class="instructions">
                <p>矢印キーまたはタッチ操作で移動。敵に触るとダメージ。宝箱を収集してゴールを目指せ！</p>
            </div>

            <div class="mobile-controls hidden" id="mobileControls">
                <div class="mobile-btn" id="upBtn">↑</div>
                <div class="mobile-btn" id="leftBtn">←</div>
                <div class="mobile-btn" id="rightBtn">→</div>
                <div class="mobile-btn" id="downBtn">↓</div>
            </div>

            <div class="controls">
                <button id="startBtn">ゲーム開始</button>
                <button id="restartBtn" class="hidden">再挑戦</button>
            </div>
        </div>

        <div id="startScreen">
            <h1>ローグライクダンジョン</h1>
            <p>ダンジョンを探索して宝箱を集め、敵を避けながらゴールを目指せ！</p>
            <p>矢印キーまたは画面のボタンで移動できます。</p>
            <div class="controls">
                <button id="startGameBtn">ゲーム開始</button>
            </div>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h2>ゲームオーバー</h2>
            <p id="gameOverText">ダンジョンを探索してしまった...</p>
            <div class="controls">
                <button id="playAgainBtn">もう一度プレイ</button>
            </div>
        </div>
    </div>

    <script>
        // ゲーム状態管理
        const gameState = {
            currentScreen: 'start',
            level: 1,
            health: 100,
            treasures: 0,
            maxTreasures: 5,
            player: { x: 7, y: 7 },
            enemies: [],
            treasuresCollected: [],
            board: [],
            gameRunning: false
        };

        // DOM要素
        const gameBoard = document.getElementById('gameBoard');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const startGameBtn = document.getElementById('startGameBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const levelDisplay = document.getElementById('level');
        const healthDisplay = document.getElementById('health');
        const goalDisplay = document.getElementById('goal');
        const mobileControls = document.getElementById('mobileControls');
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // ゲームボードの初期化
        function initializeBoard() {
            gameBoard.innerHTML = '';
            gameState.board = [];
            
            for (let y = 0; y < 15; y++) {
                const row = [];
                for (let x = 0; x < 15; x++) {
                    // 壁を設定
                    if (x === 0 || y === 0 || x === 14 || y === 14) {
                        row.push('wall');
                    } else if (Math.random() < 0.2) {
                        // ランダムな壁
                        row.push('wall');
                    } else {
                        row.push('floor');
                    }
                    createCell(x, y, row[x]);
                }
                gameState.board.push(row);
            }
            
            // プレイヤーを配置
            gameState.player = { x: 7, y: 7 };
            updatePlayerPosition();
            
            // 敵を配置
            gameState.enemies = [];
            for (let i = 0; i < 3 + gameState.level; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * 13) + 1;
                    y = Math.floor(Math.random() * 13) + 1;
                } while (gameState.board[y][x] === 'wall' || (x === 7 && y === 7));
                gameState.enemies.push({ x, y });
                createEnemy(x, y);
            }
            
            // 宝箱を配置
            gameState.treasuresCollected = [];
            for (let i = 0; i < gameState.maxTreasures; i++) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * 13) + 1;
                    y = Math.floor(Math.random() * 13) + 1;
                } while (gameState.board[y][x] === 'wall' || 
                         (x === 7 && y === 7) || 
                         gameState.enemies.some(e => e.x === x && e.y === y));
                gameState.treasuresCollected.push({ x, y, collected: false });
                createTreasure(x, y);
            }
            
            // ゴールを配置
            let exitX, exitY;
            do {
                exitX = Math.floor(Math.random() * 13) + 1;
                exitY = Math.floor(Math.random() * 13) + 1;
            } while (gameState.board[exitY][exitX] === 'wall' || 
                     (exitX === 7 && exitY === 7) || 
                     gameState.enemies.some(e => e.x === exitX && e.y === exitY) ||
                     gameState.treasuresCollected.some(t => t.x === exitX && t.y === exitY));
            createExit(exitX, exitY);
        }

        // セルの作成
        function createCell(x, y, type) {
            const cell = document.createElement('div');
            cell.className = `cell ${type}`;
            cell.dataset.x = x;
            cell.dataset.y = y;
            gameBoard.appendChild(cell);
            return cell;
        }

        // プレイヤーの更新
        function updatePlayerPosition() {
            const playerCell = document.querySelector(`.cell[data-x="${gameState.player.x}"][data-y="${gameState.player.y}"]`);
            if (playerCell) {
                playerCell.textContent = '👤';
            }
        }

        // 敵の作成
        function createEnemy(x, y) {
            const enemyCell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
            if (enemyCell) {
                enemyCell.textContent = '👹';
            }
        }

        // 宝箱の作成
        function createTreasure(x, y) {
            const treasureCell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
            if (treasureCell) {
                treasureCell.textContent = '💎';
            }
        }

        // ゴールの作成
        function createExit(x, y) {
            const exitCell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
            if (exitCell) {
                exitCell.textContent = '🚪';
            }
        }

        // プレイヤーの移動
        function movePlayer(dx, dy) {
            if (!gameState.gameRunning) return;
            
            const newX = gameState.player.x + dx;
            const newY = gameState.player.y + dy;
            
            // 壁や範囲外のチェック
            if (newX < 0 || newY < 0 || newX >= 15 || newY >= 15) return;
            if (gameState.board[newY][newX] === 'wall') return;
            
            // プレイヤーを移動
            gameState.player.x = newX;
            gameState.player.y = newY;
            updatePlayerPosition();
            
            // 敵との衝突チェック
            checkEnemyCollision();
            
            // 宝箱との衝突チェック
            checkTreasureCollision();
            
            // ゴールとの衝突チェック
            checkExitCollision();
        }

        // 敵との衝突チェック
        function checkEnemyCollision() {
            const enemyIndex = gameState.enemies.findIndex(e => e.x === gameState.player.x && e.y === gameState.player.y);
            if (enemyIndex !== -1) {
                gameState.health -= 20;
                healthDisplay.textContent = gameState.health;
                
                if (gameState.health <= 0) {
                    endGame(false);
                } else {
                    // 敵を移動
                    moveEnemy(enemyIndex);
                }
            }
        }

        // 敵の移動
        function moveEnemy(index) {
            const enemy = gameState.enemies[index];
            const directions = [
                { x: 0, y: -1 }, { x: 1, y: 0 }, { x: 0, y: 1 }, { x: -1, y: 0 }
            ];
            
            // ランダムに移動
            const direction = directions[Math.floor(Math.random() * directions.length)];
            const newX = enemy.x + direction.x;
            const newY = enemy.y + direction.y;
            
            if (newX >= 0 && newY >= 0 && newX < 15 && newY < 15 && gameState.board[newY][newX] !== 'wall') {
                enemy.x = newX;
                enemy.y = newY;
                updateEnemyPosition(index);
            }
        }

        // 敵の位置更新
        function updateEnemyPosition(index) {
            const enemy = gameState.enemies[index];
            const enemyCell = document.querySelector(`.cell[data-x="${enemy.x}"][data-y="${enemy.y}"]`);
            if (enemyCell) {
                enemyCell.textContent = '👹';
            }
        }

        // 宝箱との衝突チェック
        function checkTreasureCollision() {
            const treasureIndex = gameState.treasuresCollected.findIndex(t => 
                !t.collected && t.x === gameState.player.x && t.y === gameState.player.y
            );
            
            if (treasureIndex !== -1) {
                gameState.treasuresCollected[treasureIndex].collected = true;
                gameState.treasures++;
                goalDisplay.textContent = `${gameState.treasures}/${gameState.maxTreasures}`;
                
                // 宝箱を消す
                const treasureCell = document.querySelector(`.cell[data-x="${gameState.player.x}"][data-y="${gameState.player.y}"]`);
                if (treasureCell) {
                    treasureCell.textContent = '';
                }
                
                // 全ての宝箱を収集したかチェック
                if (gameState.treasures >= gameState.maxTreasures) {
                    // レベルアップ
                    gameState.level++;
                    levelDisplay.textContent = gameState.level;
                    gameState.treasures = 0;
                    goalDisplay.textContent = `${gameState.treasures}/${gameState.maxTreasures}`;
                    
                    // 次のレベルに進む
                    setTimeout(() => {
                        initializeBoard();
                    }, 1000);
                }
            }
        }

        // ゴールとの衝突チェック
        function checkExitCollision() {
            // ゴールの位置を確認（簡単な方法で）
            const exitCell = document.querySelector(`.cell[data-x="${gameState.player.x}"][data-y="${gameState.player.y}"]`);
            if (exitCell && exitCell.textContent === '🚪') {
                // レベルクリア
                gameState.level++;
                levelDisplay.textContent = gameState.level;
                gameState.treasures = 0;
                goalDisplay.textContent = `${gameState.treasures}/${gameState.maxTreasures}`;
                
                // 次のレベルに進む
                setTimeout(() => {
                    initializeBoard();
                }, 1000);
            }
        }

        // ゲーム終了
        function endGame(isWin) {
            gameState.gameRunning = false;
            gameOverScreen.classList.remove('hidden');
            
            if (isWin) {
                document.getElementById('gameOverText').textContent = `レベル${gameState.level}クリア！`;
            } else {
                document.getElementById('gameOverText').textContent = '体力が尽きた...';
            }
        }

        // ゲーム開始
        function startGame() {
            gameState.currentScreen = 'game';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameState.gameRunning = true;
            gameState.health = 100;
            healthDisplay.textContent = gameState.health;
            gameState.level = 1;
            levelDisplay.textContent = gameState.level;
            gameState.treasures = 0;
            goalDisplay.textContent = `${gameState.treasures}/${gameState.maxTreasures}`;
            
            initializeBoard();
            
            // タッチコントロールを表示
            if (window.innerWidth <= 768) {
                mobileControls.classList.remove('hidden');
            }
        }

        // ゲームリスタート
        function restartGame() {
            gameState.currentScreen = 'game';
            gameOverScreen.classList.add('hidden');
            gameState.gameRunning = true;
            gameState.health = 100;
            healthDisplay.textContent = gameState.health;
            gameState.level = 1;
            levelDisplay.textContent = gameState.level;
            gameState.treasures = 0;
            goalDisplay.textContent = `${gameState.treasures}/${gameState.maxTreasures}`;
            
            initializeBoard();
        }

        // イベントリスナー
        startBtn.addEventListener('click', startGame);
        startGameBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);
        playAgainBtn.addEventListener('click', restartGame);

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (gameState.currentScreen !== 'game') return;
            
            switch(e.key) {
                case 'ArrowUp':
                    movePlayer(0, -1);
                    break;
                case 'ArrowDown':
                    movePlayer(0, 1);
                    break;
                case 'ArrowLeft':
                    movePlayer(-1, 0);
                    break;
                case 'ArrowRight':
                    movePlayer(1, 0);
                    break;
            }
        });

        // モバイルコントロール
        upBtn.addEventListener('click', () => movePlayer(0, -1));
        downBtn.addEventListener('click', () => movePlayer(0, 1));
        leftBtn.addEventListener('click', () => movePlayer(-1, 0));
        rightBtn.addEventListener('click', () => movePlayer(1, 0));

        // 初期化
        window.addEventListener('load', () => {
            // 初期状態を設定
            if (window.innerWidth <= 768) {
                mobileControls.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
