<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Monster Collect DX</title>
<style>
body { margin:0; background:#111; color:#fff; font-family:sans-serif; text-align:center; touch-action:none; }
#ui { padding:10px; background:#222; font-size:14px; font-weight:bold; }
#party { margin-top:5px; color:#FFD700; font-size:18px; letter-spacing: 5px; }
canvas { background:#000; display:block; margin:10px auto; border:2px solid #555; border-radius:4px; }
.ctrl { display:grid; grid-template-columns:repeat(3, 60px); gap:8px; justify-content:center; margin-top:10px; }
button { padding:15px; font-size:20px; border-radius:10px; background:#444; color:#fff; border:none; box-shadow: 0 4px #222; cursor:pointer; }
button:active { background:#666; box-shadow: 0 0 #222; transform: translateY(4px); }
.log { color: #aaa; font-size: 12px; margin-top: 10px; height: 1.5em; }
</style>
</head>
<body>
<div id="ui">
  <div id="stats">HP:100/100 LV:1 Floor:1</div>
  <div id="party">仲間: なし</div>
</div>
<canvas id="game" width="360" height="360"></canvas>
<div class="log" id="logMsg">ダンジョンに足を踏み入れた...</div>

<div class="ctrl">
  <div></div><button onclick="move(0,-1)">▲</button><div></div>
  <button onclick="move(-1,0)">◀</button>
  <button onclick="move(0,0)" style="font-size:14px; background:#2a2a2a;">待機</button>
  <button onclick="move(1,0)">▶</button>
  <div></div><button onclick="move(0,1)">▼</button><div></div>
</div>

<script>
const c = document.getElementById("game"), ctx = c.getContext("2d");
const TILE = 24, SIZE = 15;
let state;

// モンスターの図鑑（元のAIロジックを流用）
const MONSTERS = {
  "🦇": { name:"コウモリ", type:"slime", hpBase:10, atk:3, rate:0.4, bonus:{hp:10, atk:1} },
  "🐺": { name:"ウルフ", type:"wolf", hpBase:20, atk:5, rate:0.2, bonus:{hp:20, atk:3} },
  "🐉": { name:"ドラゴン", type:"archer", hpBase:35, atk:8, rate:0.05, bonus:{hp:50, atk:8} }
};

function rnd(n){ return Math.floor(Math.random()*n) }
function log(msg){ document.getElementById("logMsg").textContent = msg; }

function restart(){
  state = { floor:1, lv:1, baseHp:100, baseAtk:10, x:1, y:1, enemies:[], party:[] };
  calcStats();
  state.hp = state.maxHp;
  genFloor();
}

function calcStats(){
  state.maxHp = state.baseHp;
  state.atk = state.baseAtk;
  for(let icon of state.party){
    state.maxHp += MONSTERS[icon].bonus.hp;
    state.atk += MONSTERS[icon].bonus.atk;
  }
}

function genFloor(){
  state.enemies = [];
  state.map = [];
  for(let y=0; y<SIZE; y++){
    state.map[y] = [];
    for(let x=0; x<SIZE; x++){
      // 壁の生成
      state.map[y][x] = (x===0 || y===0 || x===SIZE-1 || y===SIZE-1 || Math.random()<0.12) ? 1 : 0;
    }
  }
  // 初期位置と出口の確保
  state.map[1][1] = 0;
  state.x = 1; state.y = 1;
  state.exit = {x: SIZE-2, y: SIZE-2};
  state.map[state.exit.y][state.exit.x] = 0;

  // 敵の配置
  let count = 4 + state.floor;
  let spawnPool = ["🦇","🦇","🐺","🐉"];
  for(let i=0; i<count; i++){
    let icon = spawnPool[rnd(spawnPool.length)];
    state.enemies.push({
      x: rnd(SIZE-2)+1, y: rnd(SIZE-2)+1,
      icon: icon,
      type: MONSTERS[icon].type,
      hp: MONSTERS[icon].hpBase + (state.floor * 2),
      maxHp: MONSTERS[icon].hpBase + (state.floor * 2)
    });
  }
  draw();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  
  // マップ描画
  for(let y=0; y<SIZE; y++){
    for(let x=0; x<SIZE; x++){
      ctx.fillStyle = state.map[y][x] ? "#2c3e50" : "#1a1a1a";
      ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
    }
  }
  
  // 出口（敵が0なら開く）
  if(state.enemies.length === 0){
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(state.exit.x*TILE+4, state.exit.y*TILE+4, 16, 16);
  } else {
    ctx.fillStyle = "#555"; // 閉じている
    ctx.fillRect(state.exit.x*TILE+8, state.exit.y*TILE+8, 8, 8);
  }

  ctx.font = "18px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 敵描画
  for(const e of state.enemies){
    ctx.fillText(e.icon, e.x*TILE + TILE/2, e.y*TILE + TILE/2);
    // HPバー
    ctx.fillStyle = "red";
    ctx.fillRect(e.x*TILE+2, e.y*TILE+TILE-4, 20 * (e.hp/e.maxHp), 3);
  }
  
  // プレイヤー描画
  ctx.fillText("🧙‍♂️", state.x*TILE + TILE/2, state.y*TILE + TILE/2);

  // UI更新
  document.getElementById("stats").textContent = 
    `HP:${state.hp}/${state.maxHp}  LV:${state.lv}  階:${state.floor}  攻:${state.atk}  敵:${state.enemies.length}`;
  document.getElementById("party").textContent = 
    `仲間: ${state.party.length > 0 ? state.party.join("") : "なし"}`;
}

function move(dx,dy){
  let nx = state.x + dx, ny = state.y + dy;
  
  // 壁チェック
  if(state.map[ny]?.[nx] === 1) return;

  // 攻撃チェック
  let enemy = state.enemies.find(e => e.x === nx && e.y === ny);
  if(enemy){
    enemy.hp -= state.atk;
    log(`${MONSTERS[enemy.icon].name}に ${state.atk}ダメージ！`);
    
    if(enemy.hp <= 0){
      state.enemies = state.enemies.filter(v => v !== enemy);
      log(`${MONSTERS[enemy.icon].name}を倒した！`);
      
      // 仲間になる判定
      if(Math.random() < MONSTERS[enemy.icon].rate){
        if(state.party.length < 3){
          state.party.push(enemy.icon);
          log(`✨ ${MONSTERS[enemy.icon].name} が仲間になった！(HP/攻UP)`);
          calcStats();
          state.hp = state.maxHp; // 仲間になったら全回復
        }
      }
    }
  } else {
    // 移動
    state.x = nx; state.y = ny;
  }
  
  enemyTurn();

  // ゴール判定
  if(state.x === state.exit.x && state.y === state.exit.y && state.enemies.length === 0){
    state.floor++;
    state.lv++;
    state.baseHp += 10;
    state.baseAtk += 2;
    calcStats();
    state.hp = state.maxHp;
    log(`地下${state.floor}階へ進んだ！`);
    genFloor();
    return;
  }
  draw();
}

function enemyTurn(){
  for(const e of state.enemies){
    let dx = state.x - e.x, dy = state.y - e.y;
    let dist = Math.abs(dx) + Math.abs(dy);

    // 隣接時は攻撃
    if(dist === 1){
      let eAtk = MONSTERS[e.icon].atk + state.floor;
      state.hp -= eAtk;
      log(`${MONSTERS[e.icon].name}の攻撃！ ${eAtk}ダメージ！`);
      if(state.hp <= 0){ 
        alert(`力尽きた... 到達階層: ${state.floor}F`); 
        restart(); 
        return; 
      }
      continue;
    }

    // AIロジック (参考元の動きを継承)
    if(e.type === "slime"){
      if(dist < 5){
        if(Math.abs(dx) > Math.abs(dy)) e.x += Math.sign(dx);
        else e.y += Math.sign(dy);
      }
    } else if(e.type === "wolf"){
      for(let i=0; i<2; i++){
        let nx = state.x - e.x, ny = state.y - e.y;
        if(Math.abs(nx) + Math.abs(ny) === 1) break; // 密着したら止まる
        if(Math.abs(nx) > Math.abs(ny)) e.x += Math.sign(nx);
        else e.y += Math.sign(ny);
      }
    } else if(e.type === "archer"){
      if(dist < 4){
        let eAtk = MONSTERS[e.icon].atk;
        state.hp -= eAtk; // ドラゴンの遠距離ブレス
        log(`ドラゴンの炎！ ${eAtk}ダメージ！`);
        if(state.hp <= 0){ alert("力尽きた..."); restart(); return; }
      } else {
        if(Math.abs(dx) > Math.abs(dy)) e.x += Math.sign(dx);
        else e.y += Math.sign(dy);
      }
    }
  }
}

// PCキーボード操作
window.addEventListener("keydown", e => {
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  if(e.key === "ArrowUp" || e.key === "w") move(0,-1);
  if(e.key === "ArrowDown" || e.key === "s") move(0,1);
  if(e.key === "ArrowLeft" || e.key === "a") move(-1,0);
  if(e.key === "ArrowRight" || e.key === "d") move(1,0);
  if(e.key === " ") move(0,0); // スペースで待機
});

restart();
</script>
</body>
</html>
