<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オートリオ 4人対戦</title>
<style>
  :root {
    --bg-color: #0b132b;
    --panel-bg: #1c2541;
    --board-bg: #3a506b;
    --text-main: #f0f4f8;
    --accent: #f6c945;
    
    /* 4プレイヤーのテーマカラー */
    --p1-color: #df5142; /* 赤: Player */
    --p2-color: #45a4e8; /* 青: CPU 1 */
    --p3-color: #5cc66e; /* 緑: CPU 2 */
    --p4-color: #8c70ff; /* 紫: CPU 3 */
    
    --line: #5bc0be;
    --shadow: rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0; padding: 0;
    background: var(--bg-color);
    color: var(--text-main);
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Rounded Gothic", "Meiryo", sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; overflow-x: hidden;
  }

  .app-container {
    width: min(800px, 100%); flex: 1; display: flex; flex-direction: column;
    padding: 10px; gap: 12px;
  }

  /* --- ヘッダー --- */
  .hud {
    background: var(--panel-bg);
    border: 3px solid var(--line); border-radius: 12px;
    padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 4px 10px var(--shadow);
  }

  .turn-indicator {
    font-size: 1.3rem; font-weight: 900; padding: 6px 16px; border-radius: 8px;
    background: #fff; transition: background-color 0.3s, color 0.3s;
  }
  .turn-p1 { color: var(--p1-color); box-shadow: 0 0 10px var(--p1-color); }
  .turn-p2 { color: var(--p2-color); box-shadow: 0 0 10px var(--p2-color); }
  .turn-p3 { color: var(--p3-color); box-shadow: 0 0 10px var(--p3-color); }
  .turn-p4 { color: var(--p4-color); box-shadow: 0 0 10px var(--p4-color); }

  /* --- CPU情報エリア (上部) --- */
  .cpu-area {
    display: flex; justify-content: space-between; gap: 10px; width: 100%;
  }
  .cpu-box {
    flex: 1; background: var(--panel-bg); border: 2px solid #3a506b; border-radius: 8px;
    padding: 8px; text-align: center; transition: all 0.2s;
  }
  .cpu-box.active { transform: translateY(-5px); background: #2a3a5c; }
  
  .cpu-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
  .cpu-box.p2.active { border-color: var(--p2-color); box-shadow: 0 0 10px rgba(69, 164, 232, 0.5); }
  .cpu-box.p3.active { border-color: var(--p3-color); box-shadow: 0 0 10px rgba(92, 198, 110, 0.5); }
  .cpu-box.p4.active { border-color: var(--p4-color); box-shadow: 0 0 10px rgba(140, 112, 255, 0.5); }
  .cpu-box.p2 .cpu-name { color: var(--p2-color); }
  .cpu-box.p3 .cpu-name { color: var(--p3-color); }
  .cpu-box.p4 .cpu-name { color: var(--p4-color); }

  .cpu-inventory-text {
    font-size: 0.75rem; color: var(--text-main); line-height: 1.4;
  }

  /* --- メインエリア（ボード） --- */
  .play-area {
    display: flex; justify-content: center; align-items: center;
    flex: 1; padding: 10px 0;
  }

  .board {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 10px; background: var(--board-bg); padding: 15px; border-radius: 16px;
    box-shadow: 0 10px 30px var(--shadow); width: min(450px, 95vw); aspect-ratio: 1;
  }

  .cell {
    background: var(--panel-bg); border-radius: 12px; position: relative;
    cursor: pointer; transition: background-color 0.2s;
    display: flex; justify-content: center; align-items: center;
  }
  .cell:hover { background: rgba(255, 255, 255, 0.1); }

  /* --- プレイヤー持ち駒 (下部) --- */
  .player-inventory {
    display: flex; justify-content: center; gap: 20px;
    background: var(--panel-bg); padding: 15px; border-radius: 12px;
    border: 3px solid var(--p1-color); width: 100%;
  }

  .piece-stack {
    position: relative; cursor: pointer; transition: transform 0.2s;
    display: flex; justify-content: center; align-items: center;
    width: 60px; height: 60px;
  }
  .piece-stack.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(100%); }
  .piece-stack.selected { transform: scale(1.2); filter: drop-shadow(0 0 8px #fff); }

  .count-badge {
    position: absolute; bottom: -5px; right: -5px;
    background: #fff; color: #000; font-size: 0.9rem; font-weight: bold;
    border-radius: 50%; width: 24px; height: 24px; display: flex;
    justify-content: center; align-items: center; border: 2px solid #000;
    z-index: 10;
  }

  /* --- 駒のデザイン --- */
  .ring {
    position: absolute; border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .ring-0 { width: 80%; height: 80%; border: 10px solid transparent; }
  .ring-1 { width: 50%; height: 50%; border: 8px solid transparent; }
  .ring-2 { width: 22%; height: 22%; background-color: transparent; }

  /* 色分け */
  .p1-ring-0, .p1-ring-1 { border-color: var(--p1-color); } .p1-ring-2 { background-color: var(--p1-color); }
  .p2-ring-0, .p2-ring-1 { border-color: var(--p2-color); } .p2-ring-2 { background-color: var(--p2-color); }
  .p3-ring-0, .p3-ring-1 { border-color: var(--p3-color); } .p3-ring-2 { background-color: var(--p3-color); }
  .p4-ring-0, .p4-ring-1 { border-color: var(--p4-color); } .p4-ring-2 { background-color: var(--p4-color); }

  /* --- ボタン・モーダル --- */
  .btn {
    padding: 8px 16px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px;
    cursor: pointer; color: #000; background: var(--accent); box-shadow: 0 4px 0 #ccaa00;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; justify-content: center; align-items: center; z-index: 100;
  }
  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--panel-bg); border: 4px solid var(--accent); border-radius: 16px;
    padding: 30px; text-align: center; max-width: 450px; width: 90%;
  }
  .modal-title { font-size: 2rem; margin: 0 0 15px 0; }
  .modal-desc { font-size: 1rem; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; text-align: left;}

  @media (max-width: 600px) {
    .cpu-box { padding: 5px; }
    .cpu-name { font-size: 0.8rem; }
    .cpu-inventory-text { font-size: 0.65rem; }
    .board { padding: 10px; gap: 8px; }
    .ring-0 { border-width: 6px; }
    .ring-1 { border-width: 5px; }
    .player-inventory { padding: 10px; gap: 15px; }
    .piece-stack { width: 50px; height: 50px; }
    .turn-indicator { font-size: 1rem; padding: 4px 10px; }
  }
</style>
</head>
<body>

<div class="app-container">
  <header class="hud">
    <div style="font-size: 1.2rem; font-weight: bold; color: var(--accent);">⭕ オートリオ</div>
    <div class="turn-indicator turn-p1" id="turn-display">🔴 あなたの番</div>
    <button class="btn" onclick="showRules()">ルール</button>
  </header>

  <div class="cpu-area">
    <div class="cpu-box p2" id="cpu-2">
      <div class="cpu-name">CPU 1</div>
      <div class="cpu-inventory-text" id="inv-text-2">大:3 中:3 小:3</div>
    </div>
    <div class="cpu-box p3" id="cpu-3">
      <div class="cpu-name">CPU 2</div>
      <div class="cpu-inventory-text" id="inv-text-3">大:3 中:3 小:3</div>
    </div>
    <div class="cpu-box p4" id="cpu-4">
      <div class="cpu-name">CPU 3</div>
      <div class="cpu-inventory-text" id="inv-text-4">大:3 中:3 小:3</div>
    </div>
  </div>

  <main class="play-area">
    <div class="board" id="board">
      </div>
  </main>

  <div class="player-inventory" id="inv-p1">
    <div class="piece-stack" id="p1-0" onclick="selectPiece(0)">
      <div class="ring ring-0 p1-ring-0" style="position: relative; width: 100%; height: 100%; transform: none; top: 0; left: 0;"></div>
      <div class="count-badge" id="p1-count-0">3</div>
    </div>
    <div class="piece-stack" id="p1-1" onclick="selectPiece(1)">
      <div class="ring ring-1 p1-ring-1" style="position: relative; width: 60%; height: 60%; transform: none; top: 0; left: 0;"></div>
      <div class="count-badge" id="p1-count-1">3</div>
    </div>
    <div class="piece-stack" id="p1-2" onclick="selectPiece(2)">
      <div class="ring ring-2 p1-ring-2" style="position: relative; width: 30%; height: 30%; transform: none; top: 0; left: 0;"></div>
      <div class="count-badge" id="p1-count-2">3</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal-box">
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-desc" id="modal-result-desc" style="text-align: center;"></div>
    <button class="btn" onclick="initGame()" style="width: 100%; font-size: 1.2rem; padding: 14px;">もう一度遊ぶ</button>
  </div>
</div>

<div class="modal-overlay" id="rule-modal">
  <div class="modal-box">
    <h2 class="modal-title" style="color: var(--accent);">📖 ルール (4人対戦)</h2>
    <div class="modal-desc">
      <p>自分（赤）の輪を、以下の<b>どれか1つの条件</b>で3つ揃えたら勝ちです！</p>
      <ul>
        <li><b>同心円:</b> 同じマスの「大・中・小」をすべて自分の色にする。</li>
        <li><b>同じサイズ:</b> 同じサイズの輪を、タテ・ヨコ・ナナメのどれかに3つ並べる。</li>
        <li><b>昇順・降順:</b> 「大・中・小」または「小・中・大」の順で、タテ・ヨコ・ナナメに3つ並べる。</li>
      </ul>
      <p style="color: var(--accent); font-weight: bold;">操作方法:</p>
      <p>下の持ち駒から置きたいサイズを選び、盤面の空いている場所をクリックしてください。</p>
    </div>
    <button class="btn" onclick="closeRules()" style="width: 100%;">閉じる</button>
  </div>
</div>

<script>
// --- ゲーム状態管理 ---
// 1: Player(Red), 2: CPU1(Blue), 3: CPU2(Green), 4: CPU3(Purple)
let currentPlayer = 1; 
let selectedSize = -1; // 0: L, 1: M, 2: S
let gameOver = false;
let isProcessing = false;

// 持ち駒 [L, M, S]
let inventory = {
  1: [3, 3, 3],
  2: [3, 3, 3],
  3: [3, 3, 3],
  4: [3, 3, 3]
};

// ボード [row][col][size] = player (0:空, 1~4:プレイヤー)
let board = [];

function initGame() {
  document.getElementById('result-modal').classList.remove('show');
  
  currentPlayer = 1;
  selectedSize = -1;
  gameOver = false;
  isProcessing = false;
  inventory = { 1: [3, 3, 3], 2: [3, 3, 3], 3: [3, 3, 3], 4: [3, 3, 3] };
  
  // 3x3マス、それぞれに大・中・小の3スロット
  board = Array(3).fill(null).map(() => Array(3).fill(null).map(() => [0, 0, 0]));

  createBoardUI();
  updateUI();
}

function createBoardUI() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.onclick = () => placePiece(r, c);
      cell.id = `cell-${r}-${c}`;
      boardEl.appendChild(cell);
    }
  }
}

const PLAYER_NAMES = {
  1: '🔴 あなた',
  2: '🔵 CPU 1',
  3: '🟢 CPU 2',
  4: '🟣 CPU 3'
};

function updateUI() {
  // ターン表示
  const turnDisplay = document.getElementById('turn-display');
  turnDisplay.textContent = `${PLAYER_NAMES[currentPlayer]}の番`;
  turnDisplay.className = `turn-indicator turn-p${currentPlayer}`;

  // プレイヤー(P1)のインベントリ更新
  for (let s = 0; s < 3; s++) {
    const stack = document.getElementById(`p1-${s}`);
    const count = inventory[1][s];
    document.getElementById(`p1-count-${s}`).textContent = count;
    
    stack.className = 'piece-stack';
    if (currentPlayer !== 1 || count === 0 || gameOver || isProcessing) {
      stack.classList.add('disabled');
    }
    if (currentPlayer === 1 && s === selectedSize) {
      stack.classList.add('selected');
    }
  }

  // CPU(P2, P3, P4)のインベントリ＆アクティブ表示更新
  for (let p = 2; p <= 4; p++) {
    const box = document.getElementById(`cpu-${p}`);
    box.className = `cpu-box p${p} ${currentPlayer === p ? 'active' : ''}`;
    const inv = inventory[p];
    document.getElementById(`inv-text-${p}`).textContent = `大:${inv[0]} 中:${inv[1]} 小:${inv[2]}`;
  }

  // ボードの描画
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const cell = document.getElementById(`cell-${r}-${c}`);
      cell.innerHTML = ''; 
      
      for (let s = 0; s < 3; s++) {
        const owner = board[r][c][s];
        if (owner !== 0) {
          const ring = document.createElement('div');
          ring.className = `ring ring-${s} p${owner}-ring-${s}`;
          cell.appendChild(ring);
        }
      }
    }
  }
}

function selectPiece(size) {
  if (gameOver || isProcessing || currentPlayer !== 1 || inventory[1][size] === 0) return;
  
  if (selectedSize === size) selectedSize = -1;
  else selectedSize = size;
  
  updateUI();
}

function placePiece(r, c) {
  if (gameOver || isProcessing || currentPlayer !== 1 || selectedSize === -1) return;
  
  // 既に置かれていたらキャンセル
  if (board[r][c][selectedSize] !== 0) return;
  
  executeMove(r, c, selectedSize);
}

function executeMove(r, c, s) {
  board[r][c][s] = currentPlayer;
  inventory[currentPlayer][s]--;
  
  if (checkWin(currentPlayer)) {
    gameOver = true;
    updateUI();
    setTimeout(() => showVictory(currentPlayer), 300);
  } else {
    nextTurn();
  }
}

// ターン進行（置ける駒がないプレイヤーはスキップ）
function hasValidMoves(player) {
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      for (let s = 0; s < 3; s++) {
        if (board[r][c][s] === 0 && inventory[player][s] > 0) return true;
      }
    }
  }
  return false;
}

function nextTurn() {
  let found = false;
  // 順番を次に回し、置けるプレイヤーを探す
  for (let i = 0; i < 4; i++) {
    currentPlayer = (currentPlayer % 4) + 1;
    if (hasValidMoves(currentPlayer)) {
      found = true;
      break;
    }
  }

  // 誰も置けない場合は引き分け
  if (!found) {
    gameOver = true;
    updateUI();
    setTimeout(showDraw, 300);
    return;
  }

  selectedSize = -1;
  
  if (currentPlayer !== 1) {
    isProcessing = true;
    updateUI();
    setTimeout(cpuPlay, 800); // CPUの思考時間演出
  } else {
    isProcessing = false;
    updateUI();
  }
}

// --- 勝利判定ロジック ---
function checkWin(p) {
  // 1. 同心円 (同じマスに大中小)
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      if (board[r][c][0] === p && board[r][c][1] === p && board[r][c][2] === p) return true;
    }
  }

  // 2. 同じサイズの3目並べ
  for (let s = 0; s < 3; s++) {
    for (let i = 0; i < 3; i++) {
      if (board[i][0][s] === p && board[i][1][s] === p && board[i][2][s] === p) return true; // ヨコ
      if (board[0][i][s] === p && board[1][i][s] === p && board[2][i][s] === p) return true; // タテ
    }
    if (board[0][0][s] === p && board[1][1][s] === p && board[2][2][s] === p) return true; // ナナメ \
    if (board[0][2][s] === p && board[1][1][s] === p && board[2][0][s] === p) return true; // ナナメ /
  }

  // 3. 昇順・降順 (大中小 or 小中大)
  for (let i = 0; i < 3; i++) {
    // ヨコ
    if (board[i][0][0] === p && board[i][1][1] === p && board[i][2][2] === p) return true;
    if (board[i][0][2] === p && board[i][1][1] === p && board[i][2][0] === p) return true;
    // タテ
    if (board[0][i][0] === p && board[1][i][1] === p && board[2][i][2] === p) return true;
    if (board[0][i][2] === p && board[1][i][1] === p && board[2][i][0] === p) return true;
  }
  // ナナメ \
  if (board[0][0][0] === p && board[1][1][1] === p && board[2][2][2] === p) return true;
  if (board[0][0][2] === p && board[1][1][1] === p && board[2][2][0] === p) return true;
  // ナナメ /
  if (board[0][2][0] === p && board[1][1][1] === p && board[2][0][2] === p) return true;
  if (board[0][2][2] === p && board[1][1][1] === p && board[2][0][0] === p) return true;

  return false;
}

// --- CPU AI ロジック ---
function cpuPlay() {
  if (gameOver) return;

  // 可能な手をすべてリストアップ
  let validMoves = [];
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      for (let s = 0; s < 3; s++) {
        if (board[r][c][s] === 0 && inventory[currentPlayer][s] > 0) {
          validMoves.push({ r, c, s });
        }
      }
    }
  }

  if (validMoves.length === 0) {
    nextTurn(); return;
  }

  // 1. 自分が勝てる手があるかチェック（最優先）
  for (let move of validMoves) {
    board[move.r][move.c][move.s] = currentPlayer;
    let win = checkWin(currentPlayer);
    board[move.r][move.c][move.s] = 0;
    if (win) {
      executeMove(move.r, move.c, move.s); return;
    }
  }

  // 2. 相手が次に勝つリーチ状態ならブロックする
  for (let opp = 1; opp <= 4; opp++) {
    if (opp === currentPlayer) continue;
    
    // 相手が置ける場所をチェック
    let oppMoves = [];
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        for (let s = 0; s < 3; s++) {
          if (board[r][c][s] === 0 && inventory[opp][s] > 0) {
            oppMoves.push({ r, c, s });
          }
        }
      }
    }
    
    // 相手が勝てる手を見つけたら、自分がそのサイズを持っているか確認してブロック
    for (let move of oppMoves) {
      board[move.r][move.c][move.s] = opp;
      let win = checkWin(opp);
      board[move.r][move.c][move.s] = 0;
      if (win) {
        // 同じ場所・同じサイズを自分が持っていればブロック！
        if (inventory[currentPlayer][move.s] > 0) {
          executeMove(move.r, move.c, move.s); return;
        }
      }
    }
  }

  // 3. 特に危険がなければランダムに置く
  let randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
  executeMove(randomMove.r, randomMove.c, randomMove.s);
}

// --- モーダル表示 ---
function showVictory(player) {
  const title = document.getElementById('modal-title');
  const desc = document.getElementById('modal-result-desc');
  
  if (player === 1) {
    title.textContent = "You Win! 🎉";
    title.style.color = "var(--p1-color)";
    desc.textContent = "見事な勝利です！";
  } else {
    title.textContent = "You Lose... 💀";
    title.style.color = `var(--p${player}-color)`;
    desc.textContent = `${PLAYER_NAMES[player]} の勝利です。`;
  }
  document.getElementById('result-modal').classList.add('show');
}

function showDraw() {
  const title = document.getElementById('modal-title');
  title.textContent = "引き分け 🤝";
  title.style.color = "#fff";
  document.getElementById('modal-result-desc').textContent = "全員が置ける駒がなくなりました。";
  document.getElementById('result-modal').classList.add('show');
}

function showRules() {
  document.getElementById('rule-modal').classList.add('show');
}

function closeRules() {
  document.getElementById('rule-modal').classList.remove('show');
}

// アプリ起動
window.onload = initGame;

</script>
</body>
</html>
