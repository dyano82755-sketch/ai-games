<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>オートリオ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #start-screen, #game-screen, #game-over-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease;
        }

        #game-screen {
            display: none;
        }

        #game-over-screen {
            display: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .screen-content {
            padding: 20px;
        }

        .btn {
            background: linear-gradient(to bottom, #ff8a00, #e52e71);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        #score-display {
            font-size: 2rem;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        #game-board {
            width: 100%;
            height: 60vh;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .block {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
        }

        .block:hover {
            transform: scale(1.05);
        }

        .block-1 { background: linear-gradient(135deg, #ff9a9e, #fad0c4); }
        .block-2 { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
        .block-3 { background: linear-gradient(135deg, #ffecd2, #fcb090); }
        .block-4 { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
        .block-5 { background: linear-gradient(135deg, #d4fc79, #96e6a1); }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
        }

        #start-screen {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        #game-over-screen {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .highlight {
            color: #ff8a00;
            font-weight: bold;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 2rem;
            }
            
            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
            
            .block {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- スタート画面 -->
        <div id="start-screen">
            <div class="screen-content">
                <h1>🎯 オートリオ 🎯</h1>
                <div class="instructions">
                    <p>同じ絵文字のブロックを3つ以上つなげて消そう！</p>
                    <p>スワイプまたはクリックでブロックを移動</p>
                    <p>スコアが増えるほど難しくなるよ！</p>
                </div>
                <button id="start-btn" class="btn">スタート</button>
                <div class="instructions">
                    <p>スコア <span class="highlight">1000</span> でレベルアップ！</p>
                    <p>レベルが上がると <span class="highlight">ブロックが増える</span>よ！</p>
                </div>
            </div>
        </div>

        <!-- ゲーム画面 -->
        <div id="game-screen">
            <div id="score-display">スコア: 0</div>
            <div id="game-board"></div>
            <div class="controls">
                <div class="control-btn" id="left-btn">⬅️</div>
                <div class="control-btn" id="up-btn">⬆️</div>
                <div class="control-btn" id="down-btn">⬇️</div>
                <div class="control-btn" id="right-btn">➡️</div>
            </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="game-over-screen">
            <div class="screen-content">
                <h1>ゲームオーバー</h1>
                <p id="final-score">スコア: 0</p>
                <p id="final-level">レベル: 1</p>
                <button id="restart-btn" class="btn">もう一度</button>
                <button id="menu-btn" class="btn">メニュー</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ゲーム状態管理
            const gameState = {
                score: 0,
                level: 1,
                board: [],
                boardSize: 8,
                blockTypes: ['🍎', '🍌', '🍇', '🍓', '🍒'],
                isPlaying: false,
                gameLoop: null
            };

            // DOM要素
            const startScreen = document.getElementById('start-screen');
            const gameScreen = document.getElementById('game-screen');
            const gameOverScreen = document.getElementById('game-over-screen');
            const startBtn = document.getElementById('start-btn');
            const restartBtn = document.getElementById('restart-btn');
            const menuBtn = document.getElementById('menu-btn');
            const scoreDisplay = document.getElementById('score-display');
            const finalScore = document.getElementById('final-score');
            const finalLevel = document.getElementById('final-level');
            const gameBoard = document.getElementById('game-board');
            const leftBtn = document.getElementById('left-btn');
            const rightBtn = document.getElementById('right-btn');
            const upBtn = document.getElementById('up-btn');
            const downBtn = document.getElementById('down-btn');

            // ゲーム開始
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);
            menuBtn.addEventListener('click', showStartScreen);

            // ボタン操作
            leftBtn.addEventListener('click', () => moveBlock(-1, 0));
            rightBtn.addEventListener('click', () => moveBlock(1, 0));
            upBtn.addEventListener('click', () => moveBlock(0, -1));
            downBtn.addEventListener('click', () => moveBlock(0, 1));

            // タッチ操作
            let touchStartX = 0;
            let touchStartY = 0;

            gameBoard.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                e.preventDefault();
            });

            gameBoard.addEventListener('touchmove', (e) => {
                e.preventDefault();
            });

            gameBoard.addEventListener('touchend', (e) => {
                if (touchStartX === 0 && touchStartY === 0) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // 横方向
                    if (diffX > 0) {
                        moveBlock(1, 0);
                    } else {
                        moveBlock(-1, 0);
                    }
                } else {
                    // 縦方向
                    if (diffY > 0) {
                        moveBlock(0, 1);
                    } else {
                        moveBlock(0, -1);
                    }
                }
                
                touchStartX = 0;
                touchStartY = 0;
            });

            // マウス操作
            gameBoard.addEventListener('mousedown', (e) => {
                const rect = gameBoard.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const blockWidth = gameBoard.offsetWidth / gameState.boardSize;
                const blockHeight = gameBoard.offsetHeight / gameState.boardSize;
                
                const col = Math.floor(x / blockWidth);
                const row = Math.floor(y / blockHeight);
                
                if (row >= 0 && row < gameState.boardSize && col >= 0 && col < gameState.boardSize) {
                    // クリックされたブロックを移動
                    moveBlock(col - Math.floor(gameState.boardSize / 2), row - Math.floor(gameState.boardSize / 2));
                }
            });

            // ゲーム開始
            function startGame() {
                gameState.score = 0;
                gameState.level = 1;
                gameState.board = [];
                updateScore();
                
                startScreen.style.display = 'none';
                gameScreen.style.display = 'flex';
                gameOverScreen.style.display = 'none';
                gameState.isPlaying = true;
                
                createBoard();
                renderBoard();
                startGameLoop();
            }

            // ゲームオーバー画面表示
            function showGameOver() {
                gameState.isPlaying = false;
                cancelAnimationFrame(gameState.gameLoop);
                
                finalScore.textContent = `スコア: ${gameState.score}`;
                finalLevel.textContent = `レベル: ${gameState.level}`;
                
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'flex';
            }

            // ゲームボード作成
            function createBoard() {
                gameState.board = [];
                for (let row = 0; row < gameState.boardSize; row++) {
                    gameState.board[row] = [];
                    for (let col = 0; col < gameState.boardSize; col++) {
                        gameState.board[row][col] = getRandomBlock();
                    }
                }
            }

            // ランダムなブロック生成
            function getRandomBlock() {
                const type = Math.floor(Math.random() * gameState.blockTypes.length);
                return gameState.blockTypes[type];
            }

            // ボード描画
            function renderBoard() {
                gameBoard.innerHTML = '';
                
                const blockWidth = gameBoard.offsetWidth / gameState.boardSize;
                const blockHeight = gameBoard.offsetHeight / gameState.boardSize;
                
                for (let row = 0; row < gameState.boardSize; row++) {
                    for (let col = 0; col < gameState.boardSize; col++) {
                        const block = document.createElement('div');
                        block.className = `block block-${Math.floor(Math.random() * 5) + 1}`;
                        block.textContent = gameState.board[row][col];
                        block.style.left = `${col * blockWidth}px`;
                        block.style.top = `${row * blockHeight}px`;
                        block.style.width = `${blockWidth}px`;
                        block.style.height = `${blockHeight}px`;
                        gameBoard.appendChild(block);
                    }
                }
            }

            // ブロック移動
            function moveBlock(deltaX, deltaY) {
                if (!gameState.isPlaying) return;
                
                // 簡易的な移動処理
                const newBoard = JSON.parse(JSON.stringify(gameState.board));
                let moved = false;
                
                // 一時的にブロックを移動
                for (let row = 0; row < gameState.boardSize; row++) {
                    for (let col = 0; col < gameState.boardSize; col++) {
                        if (newBoard[row][col] !== '') {
                            const newRow = row + deltaY;
                            const newCol = col + deltaX;
                            
                            if (newRow >= 0 && newRow < gameState.boardSize && 
                                newCol >= 0 && newCol < gameState.boardSize) {
                                newBoard[newRow][newCol] = newBoard[row][col];
                                newBoard[row][col] = '';
                                moved = true;
                            }
                        }
                    }
                }
                
                if (moved) {
                    gameState.board = newBoard;
                    renderBoard();
                    checkMatches();
                    // スコア加算
                    gameState.score += 10;
                    updateScore();
                }
            }

            // マッチチェック
            function checkMatches() {
                let scoreIncrease = 0;
                const matchedBlocks = new Set();
                
                // 横方向のマッチ
                for (let row = 0; row < gameState.boardSize; row++) {
                    for (let col = 0; col < gameState.boardSize - 2; col++) {
                        const block = gameState.board[row][col];
                        if (block !== '' && 
                            block === gameState.board[row][col + 1] && 
                            block === gameState.board[row][col + 2]) {
                            for (let i = 0; i < 3; i++) {
                                matchedBlocks.add(`${row},${col + i}`);
                            }
                            scoreIncrease += 100;
                        }
                    }
                }
                
                // 縦方向のマッチ
                for (let col = 0; col < gameState.boardSize; col++) {
                    for (let row = 0; row < gameState.boardSize - 2; row++) {
                        const block = gameState.board[row][col];
                        if (block !== '' && 
                            block === gameState.board[row + 1][col] && 
                            block === gameState.board[row + 2][col]) {
                            for (let i = 0; i < 3; i++) {
                                matchedBlocks.add(`${row + i},${col}`);
                            }
                            scoreIncrease += 100;
                        }
                    }
                }
                
                if (matchedBlocks.size > 0) {
                    // マッチしたブロックを消す
                    matchedBlocks.forEach(pos => {
                        const [row, col] = pos.split(',').map(Number);
                        gameState.board[row][col] = '';
                    });
                    
                    gameState.score += scoreIncrease;
                    updateScore();
                    
                    // 新しいブロックを生成
                    setTimeout(() => {
                        fillEmptySpaces();
                        renderBoard();
                    }, 300);
                }
                
                // レベルアップチェック
                if (gameState.score >= gameState.level * 500) {
                    gameState.level++;
                    updateScore();
                }
                
                // ゲームオーバーチェック
                if (isGameOver()) {
                    showGameOver();
                }
            }

            // 空きスペースを埋める
            function fillEmptySpaces() {
                for (let col = 0; col < gameState.boardSize; col++) {
                    for (let row = gameState.boardSize - 1; row >= 0; row--) {
                        if (gameState.board[row][col] === '') {
                            // 上のブロックを下に移動
                            for (let r = row - 1; r >= 0; r--) {
                                if (gameState.board[r][col] !== '') {
                                    gameState.board[row][col] = gameState.board[r][col];
                                    gameState.board[r][col] = '';
                                    break;
                                }
                            }
                            // 新しいブロックを生成
                            if (gameState.board[row][col] === '') {
                                gameState.board[row][col] = getRandomBlock();
                            }
                        }
                    }
                }
            }

            // ゲームオーバーチェック
            function isGameOver() {
                // 簡易的なゲームオーバーチェック
                return gameState.score > 10000; // 仮の条件
            }

            // スコア更新
            function updateScore() {
                scoreDisplay.textContent = `スコア: ${gameState.score} | レベル: ${gameState.level}`;
            }

            // ゲームループ
            function startGameLoop() {
                function gameLoop() {
                    if (gameState.isPlaying) {
                        // ランダムな動作
                        if (Math.random() < 0.05) {
                            moveBlock(
                                Math.floor(Math.random() * 3) - 1,
                                Math.floor(Math.random() * 3) - 1
                            );
                        }
                        gameState.gameLoop = requestAnimationFrame(gameLoop);
                    }
                }
                gameLoop();
            }

            // 初期画面表示
            function showStartScreen() {
                startScreen.style.display = 'flex';
                gameScreen.style.display = 'none';
                gameOverScreen.style.display = 'none';
            }

            // 初期状態
            showStartScreen();
        });
    </script>
</body>
</html>
